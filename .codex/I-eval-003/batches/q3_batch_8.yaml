  - claim_id: Q3-T1-053
    section: "Long-term Outcomes"
    sentence: "One analysis notes that roughly 60% of the Canadian workforce is potentially highly exposed to AI, but about half of those workers may actually benefit from it.[8]"
    cited_evidence:
      - evidence_id: ev_004
        bibliography_num: 8
        url: "https://www.linkedin.com/posts/marc-frenette-ph-d-19752a224_ai-genai-futureofwork-activity-7422271124887056386-iAAH"
        tier: T4
        span: '0-500'
        title: "AI's Impact on Canada's Labour Market: Early Evidence"
        span_text: |
          Is AI substantially reshaping Canada’s labour market? Our new study says: not yet… The widespread availability of ChatGPT starting in November 2022 — and the rapid adoption of GenAI tools since then — has fuelled both excitement and concern about the future of human labour. Our previous work suggested that roughly 60% of the workforce is potentially highly exposed to AI, but that about half of those workers may actually benefit from AI. However, that earlier study did not examine how employment trends were evolving over time. In a newly released Statistics Canada article authored by [Tahsin Mehdi](https://ca.linkedin.com/in/tahsinmehdi?trk=public_post-text) and me, we track 10 years of employment and job vacancy data (up to the end of 2025) to search for early evidence of AI‑related labour market disruption. We break down occupations in two ways: 1. By potential exposure and complementarity using the IMF’s C‑AIOE index, adapted to Canada: - Highly Exposed & Highly Complementary with AI - Highly Exposed & Less Complementary (highest potential risk) - Low Exposure to AI 2. Coding‑intensive (higher potential risk) vs. other occupations Coding-intensive occupations include data scientists, cybersecurity specialists, business systems specialists, information, systems specialists, database analysts and data administrators, computer systems developers and programmers, software engineers and designers, software developers and programmers, web designers, and web developers and program
    # tier1_to_fill: claim_type, materiality, citation_context_match, verdict, rationale, reviewer_confidence

