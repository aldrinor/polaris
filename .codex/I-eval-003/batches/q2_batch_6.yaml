          Issue 2026-16 In brief What happened? The Canada‑United States‑Mexico Agreement (CUSMA) will have its first mandatory joint review on July 1, 2026, six years after its entry into force. While the review is not a comprehensive renegotiation of the agreement, it provides an opportunity for the parties to assess how CUSMA is functioning, consider recommendations for potential updates and influence how the agreement is administered and enforced, including whether targeted changes or commitments are pursued. On March 31, 2026, the Office of the United States Trade Representative (USTR) released its 2026 National Trade Estimate report, which outlines trade concerns that the US has with Canada — both market access barriers and non‑market practices. These concerns could play a significant role in the review’s priorities. Why is it relevant? The joint review presents both significant risks and potential opportunities for Canadian companies doing business with the US. Specific grievances between the parties can translate into negotiating leverage, focused enforcement, or changes that affect day‑to‑day compliance. Even small, focused changes in trade policy (e.g. how tariff‑rate quotas (TRQs) are administered, border procedures, government procurement rules, digital measures) can affect Canadian, US and Mexican supply chains, affecting product eligibility, total import costs, contract terms and documentation. Actions to consider To prepare for the CUSMA joint review, businesses should s
