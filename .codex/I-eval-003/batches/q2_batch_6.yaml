          CUSMA is up for review in 2026, and here's what Trump might want Canada and the U.S. will launch formal talks to review free-trade deal in mid-January A mandatory review of the Canada-U.S.-Mexico-Agreement on trade kicks into high gear next year as U.S. President Donald Trump continues his campaign to realign global trade and poach key industries from America's closest neighbours. Negotiations on the trade pact, better known as CUSMA, were a stress test for Ottawa during the first Trump administration. The trade talks were tense at times, but ultimately the pact that replaced the North American Free Trade Agreement was hailed a success in all three countries. Since the president's return to office, however, confidence in CUSMA's future has waned. During a meeting with Prime Minister Mark Carney at the White House, Trump called the deal "transitional" and said it may have served its purpose. Trade with Canada may not be front of mind for Trump, said Fen Osler Hampson, a professor of international affairs at Carleton University in Ottawa and co-chair of the Expert Group on Canada-U.S. Relations. It's more like the "proverbial iceberg," he said. "It's what you don't see that matters. And that's the kind of hidden economic wiring of a very deep and highly interdependent relationship." The review of CUSMA began in the United States with public consultations in September. The Trump administration is expected to send a report to the U.S. Congress early in the new year outlining the
