  - claim_id: CG-Q1-T1-018
    sentence: "That is why the best sovereign design for federal use is usually **one or a few pooled national cores** rather than many boutique installations. \\\\\\\\ue200cite\\\\\\\\ue202turn31view1\\\\\\\\ue202turn31view2\\\\\\\\ue202turn33view0\\\\\\\\ue201\\\\ \\\\ ```mermaid\\\\ xychart-beta\\\\ title \\\\\\\\\\\"Modeled sovereign cost by cluster size at 80% utilization\\\\\\\\\\\"\\\\ x-axis [64, 128, 256, 512, 1024]\\\\ y-axis \\\\\\\\\\\"US$/GPU-hour\\\\\\\\\\\" 0 --\\u003e 12\\\\ bar [9.7, 5.8, 4.4, 3.4, 2.8]\\\\ ```\\\\ \\\\ A compact sensitivity view is below.\\\\ \\\\ | Sensitivity variable | Base case | Alternative | Modeled effect | Why it matters |\\\\ |---|---:|---:|---:|---|\\\\ | Power price | 13\\\\\\\\u00a2/kWh CAD | 6.5\\\\\\\\u00a2/kWh CAD | roughly **\\\\\\\\u2013US$0.06 to \\\\\\\\u20130.10/GPU-hour** at 80% utilization | Important, but much less important than utilization or scale |\\\\ | Utilization | 40% | 80% | roughly **\\\\\\\\u2013US$2.8/GPU-hour** in the 1,024-GPU base case | The single biggest driver of sovereign economics |\\\\ | Amortization term | 3 years | 7 years | roughly **\\\\\\\\u2013US$1.2/GPU-hour** at 80% utilization | Refresh policy is a first-order budget choice |\\\\ | Cluster size | 128 GPUs | 1,024 GPUs | roughly **\\\\\\\\u2013US$3.0/GPU-hour** at 80% utilization | Security and staffing overheads punish small sovereign builds |\\\\ | Model size / memory pressure | H100 80 GB | H200 141 GB / Blackwell | lower model sharding pressure; lower cost per token if software stack is optimized | Frontier quality can outweigh simple $/GPU-hour comparisons |\\\\ | Egress / legal-review cost | low | high | can turn a cloud-first design unattractive even if raw compute is cheap | Usually second-order for training, but material for repeated checkpoint repatriation or sensitive cross-border workflows |\\\\ \\\\ For a concrete TCO lens, a **512-GPU sovereign core** in this model is about **US$61 million over 5 years**, versus approximately **US$123 million** for 512 H100 GPUs kept busy at 80% utilization on AWS on-demand, **US$78 million** at the AWS Capacity-Block example rate, **US$99 million** at the GCP DWS example rate, and **US$221\\\\\\\\u2013265 million** at the Azure H100 list-price snapshots retrieved here."
    has_numeric_fact: true

