  - claim_id: CG-Q1-T1-024
    sentence: "This means a Canadian government department can absolutely comply in cloud, but the legal and communications burden is higher when the architecture relies on foreign corporate control paths. \\\\\\\\ue200cite\\\\\\\\ue202turn41search1\\\\\\\\ue202turn41search3\\\\\\\\ue202turn42search8\\\\\\\\ue202turn41search0\\\\\\\\ue202turn41search10\\\\\\\\ue202turn41search12\\\\\\\\ue201\\\\ \\\\ ## Risk matrix and recommended architecture options\\\\ \\\\ The highest-confidence risk picture is below.\\\\ \\\\ | Risk | Sovereign cluster | U.S.-headquartered hyperscaler in Canadian region | Mitigation priority |\\\\ |---|---|---|---|\\\\ | Under-utilization / stranded capital | **High** | **Low** | Pool sovereignty nationally; do not build per-department clusters |\\\\ | Time-to-capacity | **High** | **Medium** | Lease existing domestic capacity where possible; keep cloud burst path |\\\\ | Jurisdiction / extraterritorial legal process | **Low to medium** | **Medium to high** | Segment data and models by sensitivity; prefer sovereign for the most sensitive tiers |\\\\ | Misconfiguration / operational fatigue | **Medium to high** | **Medium** | Use hardened landing zones, continuous assurance, and shared security services |\\\\ | Vendor lock-in / platform dependence | **Medium** | **High** | Open model formats, containerized runtimes, standard schedulers, export-tested checkpoints |\\\\ | Refresh / obsolescence risk | **High** | **Low to medium** | Shorter refresh cycles for sovereign core; use cloud for access to new silicon |\\\\ | Power / tariff / interconnection risk | **Medium to high** | **Low from the department\\\\\\\\u2019s perspective** | Power contracts, siting optionality, and staged build-out |\\\\ \\\\ The default architecture for 2026 should be **hybrid sovereign core plus hyperscaler burst**."
    has_numeric_fact: true

