  - claim_id: CG-Q1-T1-020
    sentence: "Any sovereign Canadian build that procures the same HGX-class systems can match these **node-level** specs, but cloud providers still lead on **portfolio breadth, refresh cadence, and managed reservation/cluster software**. \\\\\\\\ue200cite\\\\\\\\ue202turn12search1\\\\\\\\ue202turn18search2\\\\\\\\ue202turn18search17\\\\\\\\ue202turn39search0\\\\\\\\ue202turn39search6\\\\\\\\ue202turn39search14\\\\\\\\ue202turn8search0\\\\\\\\ue202turn8search1\\\\\\\\ue202turn15search0\\\\\\\\ue202turn15search1\\\\\\\\ue202turn15search4\\\\\\\\ue202turn14view1\\\\\\\\ue201\\\\ \\\\ For inference and production quality, the most important metric is often not raw FLOPS but **cost per token at a given latency**. NVIDIA now publicly frames H100 inference around approximately **US$0.09 per million tokens** for GPT-OSS-120B in an optimized Hopper stack and B200 around **US$0.02 per million tokens** in optimized Blackwell deployments."
