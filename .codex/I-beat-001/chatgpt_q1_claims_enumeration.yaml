  - claim_id: CG-Q1-T1-001
    sentence: "# CHATGPT Deep Research - Q1 **Question:** What is the cost-quality-jurisdiction trade-off between Canada operating its own sovereign frontier-LLM compute (SCALE-AI funded clusters, Quebec hydro) versus relying on US-headquartered hyperscalers (Azure, AWS, GCP) for federal-government AI workloads in 2026? --- Sovereign Frontier-LLM Compute Versus Hyperscaler Reliance for Federal AI Workloads in 2026\\\\ \\\\ ## Executive summary\\\\ \\\\ For Canadian federal AI workloads in 2026, the central trade-off is not simply \\\\\\\\u201ccheap sovereign compute\\\\\\\\u201d versus \\\\\\\\u201cexpensive cloud.\\\\\\\\u201d The real trade-off is **high-fixed-cost sovereignty with lower marginal cost** versus **high-variable-cost hyperscale access with better frontier quality, faster deployment, and richer managed controls**."
    has_numeric_fact: true

  - claim_id: CG-Q1-T1-002
    sentence: "Canada\\\\\\\\u2019s sovereign-compute push is now concrete: the \\\\\\\\ue200entity\\\\\\\\ue202[\\\\\\\\\\\"organization\\\\\\\\\\\",\\\\\\\\\\\"Government of Canada\\\\\\\\\\\",\\\\\\\\\\\"federal government of Canada\\\\\\\\\\\"]\\\\\\\\ue201 has committed up to C$700 million for private-sector compute capacity, up to C$1 billion for public supercomputing, and up to C$300 million for an AI Compute Access Fund; the AI Sovereign Compute Infrastructure Program alone will provide about C$890 million to the build layer beginning in fiscal 2026\\\\\\\\u201327. \\\\\\\\ue200cite\\\\\\\\ue202turn31view0\\\\\\\\ue202turn31view1\\\\\\\\ue202turn31view2\\\\\\\\ue201\\\\ \\\\ On cost, a **nationally pooled sovereign cluster** can be materially cheaper than public-cloud list pricing **only when utilization is kept high and the fixed operating burden is shared across many users**."
    has_numeric_fact: true

  - claim_id: CG-Q1-T1-003
