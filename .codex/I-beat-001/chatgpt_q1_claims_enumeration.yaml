  - claim_id: CG-Q1-T1-005
    sentence: "Canada\\\\\\\\u2019s sovereign programs are substantial, but they are still in ramp-up, and one of the few public sovereign-factory examples in \\\\\\\\ue200entity\\\\\\\\ue202[\\\\\\\\\\\"state\\\\\\\\\\\",\\\\\\\\\\\"Quebec\\\\\\\\\\\",\\\\\\\\\\\"province in Canada\\\\\\\\\\\"]\\\\\\\\ue201\\\\\\\\u2014a TELUS facility in Rimouski\\\\\\\\u2014said in May 2026 that its first sovereign AI factory was already fully sold out. \\\\\\\\ue200cite\\\\\\\\ue202turn8search0\\\\\\\\ue202turn8search1\\\\\\\\ue202turn39search0\\\\\\\\ue202turn39search6\\\\\\\\ue202turn39search14\\\\\\\\ue202turn15search0\\\\\\\\ue202turn15search1\\\\\\\\ue202turn15search4\\\\\\\\ue202turn32search3\\\\\\\\ue202turn32search19\\\\\\\\ue201\\\\ \\\\ On jurisdiction, **Canadian data residency is not the same thing as Canadian legal sovereignty**."
