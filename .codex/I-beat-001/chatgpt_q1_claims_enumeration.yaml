  - claim_id: CG-Q1-T1-026
    sentence: "In the model here, 64\\\\\\\\u2013128 GPUs cost about **US$5.8\\\\\\\\u20139.7/GPU-hour** even at high utilization, and performance-refresh risk is severe unless the enclave is deliberately small and narrowly scoped. \\\\\\\\ue200cite\\\\\\\\ue202turn42search12\\\\\\\\ue202turn31view1\\\\\\\\ue202turn31view2\\\\\\\\ue201\\\\ \\\\ ```mermaid\\\\ flowchart LR\\\\ A[Unclassified pilots and bursty experimentation] --\\u003e B[Canadian-region public cloud]\\\\ C[Protected B production AI] --\\u003e D[Public cloud with residency, dedicated capacity, external keys, guardrails]\\\\ E[PBHVA, controlled goods, sensitive model weights, strategic fine-tunes] --\\u003e F[Canadian sovereign core]\\\\ D -. overflow or latest-silicon burst .-\\u003e B\\\\ F -. temporary burst for scale or refresh .-\\u003e B\\\\ B -. repatriate approved checkpoints and artifacts .-\\u003e F\\\\ ```\\\\ \\\\ A concise option summary follows.\\\\ \\\\ | Option | Best use | Pros | Cons | Estimated cost range |\\\\ |---|---|---|---|---|\\\\ | Hybrid sovereign core plus hyperscaler burst | **Recommended default** for federal frontier-AI portfolio | Best balance of sovereignty, economics, and access to new silicon | Requires coherent workload segmentation and multi-platform ops discipline | Sovereign core roughly **US$3.5\\\\\\\\u20136/GPUh** at healthy utilization, plus burst at cloud rates |\\\\ | Canada-region hyperscaler with dedicated capacity and external keys | Fastest path for pilots, broad PBMM production, and newest hardware | Lowest deployment friction; richest managed services; best refresh cadence | Residual CLOUD Act / FISA nexus; egress and lock-in risk | Roughly **US$4.3\\\\\\\\u201314.8/GPUh** in retrieved public examples, depending on provider and commitment model |\\\\ | Air-gapped or heavily isolated sovereign enclave | Only for highest-sensitivity workloads | Strongest control over residency, admin paths, and legal process | Expensive at small scale; slowest refresh; lowest elasticity | Roughly **US$5.8\\\\\\\\u20139.7/GPUh** for 128\\\\\\\\u201364 GPUs in this model |\\\\ \\\\ ## Assumptions, sources, and gaps\\\\ \\\\ The cost model in this report is deliberately conservative and transparent."
    has_numeric_fact: true

