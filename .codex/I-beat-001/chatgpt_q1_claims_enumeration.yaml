  - claim_id: CG-Q1-T1-006
    sentence: "A Canadian-owned and Canadian-governed sovereign cluster does not eliminate lawful foreign-access risk altogether, because Canada can still execute requests through its Mutual Legal Assistance in Criminal Matters Act, but it does **shift control, audit rights, and legal process toward Canadian institutions**. \\\\\\\\ue200cite\\\\\\\\ue202turn42search1\\\\\\\\ue202turn42search2\\\\\\\\ue202turn20search0\\\\\\\\ue202turn20search6\\\\\\\\ue202turn20search12\\\\\\\\ue202turn19search2\\\\\\\\ue202turn19search12\\\\\\\\ue202turn19search14\\\\\\\\ue202turn42search9\\\\\\\\ue201\\\\ \\\\ The procurement answer for 2026 is therefore not \\\\\\\\u201call sovereign\\\\\\\\u201d or \\\\\\\\u201call hyperscaler.\\\\\\\\u201d The best default is a **hybrid sovereign-core architecture**: keep the most sensitive model weights, fine-tuning corpora, evaluation pipelines, and long-running production inference on Canadian-governed infrastructure; use existing federal cloud contracts for burst, experimentation, and access to the newest accelerators."
    has_numeric_fact: true

  - claim_id: CG-Q1-T1-007
    sentence: "Second, the cost of power and the scarcity of immediately available domestic capacity are becoming more binding. \\\\\\\\ue200url\\\\\\\\ue202Hydro-Qu\\\\\\\\u00e9bec\\\\\\\\ue202https://www.hydroquebec.com\\\\\\\\ue201 proposed in February 2026 that all new data centres over 5 MW in \\\\\\\\ue200entity\\\\\\\\ue202[\\\\\\\\\\\"state\\\\\\\\\\\",\\\\\\\\\\\"Quebec\\\\\\\\\\\",\\\\\\\\\\\"province in Canada\\\\\\\\\\\"]\\\\\\\\ue201 move to a new average rate of about **13\\\\\\\\u00a2/kWh**, approximately double what current large-power customers pay, and said data-centre electricity use in the province could rise sevenfold by 2035 to more than 1,000 MW. \\\\\\\\ue200cite\\\\\\\\ue202turn31view1\\\\\\\\ue202turn31view2\\\\\\\\ue202turn33view0\\\\\\\\ue201\\\\ \\\\ That matters because the sovereign option is strongest only when federal demand is **aggregated**."
    has_numeric_fact: true

