name: codex-visual-required
# Per CLAUDE.md §3.0 (6th artifact for UI PRs) + .codex/visual_audit_rubric.md
# + docs/ui_harness_research_2026_05_25.md (AAB pattern adoption).
#
# This workflow makes the visual-review gate a REQUIRED check on PRs that
# touch user-visible UI surface (web/app/**, web/components/**). The
# writer agent cannot bypass via prompts; bypassing requires editing this
# workflow which is gated by CODEOWNERS (Out of Scope for Claude per
# CHARTER §"Out of Scope").
#
# Authoritative parse rule mirrors codex-required.yml (PRD2-P1-001):
# the LAST `verdict: APPROVE|REQUEST_CHANGES` line in the artifact file
# wins.
#
# Cross-binding strategy (P0-iter1 + P0-diff-iter1 fix): the gate
# verifies the audit was performed against THIS PR's evidence by binding
# three SHAs:
#   1. rubric_sha256              → matches .codex/visual_audit_rubric.md in working tree
#   2. ui_surface_tree_sha256     → matches deterministic hash of web/app/** + web/components/**
#                                    (replaces pr_head_sha — that approach had a self-
#                                    referential hash fixed-point: committing the audit
#                                    changed HEAD, so the recorded HEAD could never match
#                                    the actual PR HEAD)
#   3. screenshots_manifest_sha256 → matches the manifest committed alongside the audit
# Each must be present and match; a stale audit from a prior commit is
# rejected. The UI surface hash is stable across the audit-commit step
# because committing audit artifacts under .codex/ + outputs/ does NOT
# touch web/app/** or web/components/**.
#
# Issue-id derivation: per P1-iter1 fix, this gate runs on ALL PRs
# touching UI surface, not just bot/<id> branches. For bot/<id>
# branches, the issue_id is parsed from the branch name (matching
# codex-required.yml). For non-bot UI PRs (operator-authored), the
# issue_id MUST be declared via the audit file's path under
# `.codex/<issue_id>/codex_visual_audit.txt` — the gate enumerates
# present audit files and verifies at least one matches the PR's HEAD
# SHA. Operator-authored UI PRs still produce a visual audit; the gate
# does not skip on author identity.

on:
  pull_request:
    branches: [polaris, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  codex-visual-required:
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect_ui_surface_changed
        id: ui_surface
        # The visual gate runs ONLY when the PR touches user-visible
        # surface. Non-UI PRs (docs, infra, src/polaris_v6 backend that
        # doesn't render) skip cleanly. The path list MUST stay narrow —
        # widening it without changing the audit set creates noise.
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
          ui_surface="false"
          # UI surfaces that mandate visual audit:
          #   web/app/**           — Next.js routes
          #   web/components/**    — shared visual components
          # NOT included (changes here do NOT require a visual gate):
          #   web/lib/**           — non-visual helpers
          #   web/tests/**         — test scaffolds
          #   web/middleware.ts    — routing logic
          if echo "$changed" | grep -E '^(web/app/|web/components/)' >/dev/null; then
            ui_surface="true"
          fi
          echo "ui_surface=$ui_surface" >> "$GITHUB_OUTPUT"
          echo "Detected UI surface change: $ui_surface"
          echo "Changed files:"
          echo "$changed" | sed 's/^/  /'

      - name: extract_issue_id
        id: issue
        if: steps.ui_surface.outputs.ui_surface == 'true'
        # P1-iter1 fix: gate ALL UI PRs (bot/ or otherwise), do NOT skip
        # on author identity. For bot/<I-*> branches the issue_id is
        # extracted from the branch name (matches codex-required.yml
        # schema). For non-bot UI PRs (operator-authored), the
        # issue_id is derived from the audit file path under
        # `.codex/<issue_id>/codex_visual_audit.txt` — the gate scans
        # for the audit and matches the PR's HEAD SHA to confirm
        # binding.
        run: |
          set -euo pipefail
          if [[ "$HEAD_REF" =~ ^bot/(I-[a-z0-9]{2,8}-[0-9]{3}(-followup|[a-z])?)(-[a-z0-9_-]+)?$ ]]; then
            issue_id="${BASH_REMATCH[1]}"
            printf 'issue_id=%s\n' "$issue_id" >> "$GITHUB_OUTPUT"
            printf 'derivation=branch_name\n' >> "$GITHUB_OUTPUT"
            echo "Validated bot-PR head ref: $HEAD_REF -> issue_id=$issue_id"
          elif [[ "$HEAD_REF" =~ ^bot/(pr-(a|a2|a3|b|b2|c|d|e|f)|cleanup-pr-(1|2|3a|3b|3c|4|5|6|7|8))(-[a-z0-9_-]+)?$ ]]; then
            # Infra-branch allowlist: skip the visual gate cleanly.
            # These branches use their own review trail (PR-D/F brief).
            echo "Infrastructure bot branch '$HEAD_REF'; skipping codex-visual-required gate"
            printf 'issue_id=\n' >> "$GITHUB_OUTPUT"
            printf 'derivation=skip_infra\n' >> "$GITHUB_OUTPUT"
            exit 0
          else
            # Non-bot UI PR — derive issue_id from audit file path. The
            # PR author must commit the audit at
            # `.codex/<issue_id>/codex_visual_audit.txt` with a matching
            # `pr_head_sha:` line.
            printf 'issue_id=\n' >> "$GITHUB_OUTPUT"
            printf 'derivation=path_scan\n' >> "$GITHUB_OUTPUT"
            echo "Non-bot UI PR: issue_id will be derived from audit file presence"
          fi

      - name: verify_visual_artifact
        id: verify
        if: steps.ui_surface.outputs.ui_surface == 'true' && steps.issue.outputs.derivation != 'skip_infra'
        env:
          ISSUE_ID: ${{ steps.issue.outputs.issue_id }}
          DERIVATION: ${{ steps.issue.outputs.derivation }}
        # The audit is `.codex/<issue_id>/codex_visual_audit.txt`. The
        # gate parses LAST verdict line + verifies three SHA bindings:
        #   1. rubric_sha256 matches working-tree rubric
        #   2. pr_head_sha matches $HEAD_SHA
        #   3. screenshots_manifest_sha256 matches a committed
        #      manifest at outputs/visual_review_gate/<id>/iter_N/manifest.json
        # All three must match for verdict: APPROVE to count.
        run: |
          set -euo pipefail

          if [ "$DERIVATION" = "path_scan" ]; then
            # Non-bot UI PR — find the audit file whose pr_head_sha
            # matches this PR's HEAD_SHA.
            mapfile -t candidates < <(find .codex -mindepth 2 -maxdepth 2 -name "codex_visual_audit.txt" | sort)
            if [ "${#candidates[@]}" -eq 0 ]; then
              echo "ERROR: PR touches UI surface but no .codex/<id>/codex_visual_audit.txt found"
              echo "Run: python scripts/visual_review_gate.py --issue-id <id> --routes <routes>"
              exit 1
            fi
            VISUAL=""
            for c in "${candidates[@]}"; do
              if grep -F "pr_head_sha: $HEAD_SHA" "$c" >/dev/null 2>&1; then
                VISUAL="$c"
                ISSUE_ID="$(basename "$(dirname "$c")")"
                echo "Matched audit by pr_head_sha: $VISUAL (issue_id=$ISSUE_ID)"
                break
              fi
            done
            if [ -z "$VISUAL" ]; then
              echo "ERROR: no audit file declares 'pr_head_sha: $HEAD_SHA'."
              echo "Found candidates (none matched current PR HEAD):"
              printf '  %s\n' "${candidates[@]}"
              echo ""
              echo "Re-run scripts/visual_review_gate.py against the current HEAD."
              exit 1
            fi
          else
            VISUAL=".codex/${ISSUE_ID}/codex_visual_audit.txt"
            if [ ! -f "$VISUAL" ]; then
              echo "ERROR: missing $VISUAL"
              echo "This PR touches user-visible UI surface."
              echo ""
              echo "Generate the artifact locally:"
              echo "  1. Build production bundle: cd web && npm run build"
              echo "  2. Start production server: cd web && npm run start"
              echo "  3. Run gate:"
              echo "       python scripts/visual_review_gate.py \\"
              echo "         --issue-id $ISSUE_ID \\"
              echo "         --routes <comma-separated routes touched by this PR>"
              echo "  4. The gate writes .codex/$ISSUE_ID/codex_visual_audit.txt"
              echo "  5. Commit + push."
              exit 1
            fi
          fi

          # 1. Parse FINAL `verdict:` line (mirrors PRD2-P1-001).
          final="$(grep -E '^verdict:[[:space:]]+(APPROVE|REQUEST_CHANGES)$' "$VISUAL" | tail -1 || true)"
          if [ -z "$final" ]; then
            echo "ERROR: $VISUAL contains no final verdict line"
            exit 1
          fi
          if [ "$final" != "verdict: APPROVE" ]; then
            echo "ERROR: $VISUAL final verdict is NOT APPROVE: $final"
            echo "Either fix visual issues and re-run, or reach iter 5 to force-APPROVE."
            exit 1
          fi

          # 2. Verify rubric_sha256 declaration matches working tree.
          # P2-iter1 fix: every block's declaration must match.
          rubric_sha_actual="$(sha256sum .codex/visual_audit_rubric.md | awk '{print $1}')"
          declared_rubric_shas="$(grep -E '^rubric_sha256:[[:space:]]+[a-f0-9]{64}$' "$VISUAL" | awk '{print $2}' | sort -u || true)"
          if [ -z "$declared_rubric_shas" ]; then
            echo "ERROR: $VISUAL declares no rubric_sha256 line"
            exit 1
          fi
          for s in $declared_rubric_shas; do
            if [ "$s" != "$rubric_sha_actual" ]; then
              echo "ERROR: rubric_sha256 drift — audit declared $s, working tree is $rubric_sha_actual"
              echo "Re-run scripts/visual_review_gate.py with the current rubric."
              exit 1
            fi
          done

          # 3. Verify ui_surface_tree_sha256 matches the deterministic
          # hash of web/app/** + web/components/** in this PR's working
          # tree. (P0-iter1 fix replaced by P0-diff-iter1 fix.)
          # The previous design recorded `pr_head_sha = git rev-parse HEAD`
          # but the audit must then be committed, which changes HEAD —
          # an impossible fixed point. The new binding is to the UI
          # surface CONTENT which is invariant across the audit-commit.
          declared_tree_sha="$(grep -E '^ui_surface_tree_sha256:[[:space:]]+[a-f0-9]{64}$' "$VISUAL" | awk '{print $2}' | tail -1 || true)"
          if [ -z "$declared_tree_sha" ]; then
            echo "ERROR: $VISUAL declares no ui_surface_tree_sha256 line"
            exit 1
          fi
          # Compute current ui_surface_tree_sha via scripts/compute_ui_surface_sha.py
          # — same algorithm visual_review_gate.py uses (single source
          # of truth; helper script avoids YAML literal-block-scalar
          # collision with embedded Python).
          actual_tree_sha="$(python3 scripts/compute_ui_surface_sha.py)"
          if [ "$declared_tree_sha" != "$actual_tree_sha" ]; then
            echo "ERROR: ui_surface_tree_sha256 mismatch"
            echo "  declared (in audit): $declared_tree_sha"
            echo "  actual (PR tree):    $actual_tree_sha"
            echo "Re-run scripts/visual_review_gate.py — UI surface changed between audit and PR commit."
            exit 1
          fi

          # 4. Verify screenshots_manifest_sha256 matches the committed
          # manifest. The script writes the manifest at
          # outputs/visual_review_gate/<id>/iter_N/manifest.json; the
          # audit declares its SHA256. The PR commits the manifest
          # alongside the audit so the binding is reproducible.
          declared_manifest="$(grep -E '^screenshots_manifest_sha256:[[:space:]]+[a-f0-9]{64}$' "$VISUAL" | awk '{print $2}' | tail -1 || true)"
          if [ -z "$declared_manifest" ]; then
            echo "ERROR: $VISUAL declares no screenshots_manifest_sha256 line"
            exit 1
          fi
          # Find the matching manifest.json under outputs/visual_review_gate/<id>/iter_*/
          mapfile -t manifest_candidates < <(find "outputs/visual_review_gate/${ISSUE_ID}" -name "manifest.json" 2>/dev/null | sort -r || true)
          matched_manifest=""
          for m in "${manifest_candidates[@]}"; do
            mhash="$(sha256sum "$m" | awk '{print $1}')"
            if [ "$mhash" = "$declared_manifest" ]; then
              matched_manifest="$m"
              echo "Matched manifest: $m"
              break
            fi
          done
          if [ -z "$matched_manifest" ]; then
            echo "ERROR: screenshots_manifest_sha256 declared in audit ($declared_manifest)"
            echo "       does not match any manifest at outputs/visual_review_gate/${ISSUE_ID}/iter_*/manifest.json"
            echo "Commit the manifest produced by scripts/visual_review_gate.py alongside the audit."
            exit 1
          fi

          # 5. Walk the manifest: verify each screenshot file exists on
          # disk AND its content SHA matches the manifest entry's sha256.
          # Also verify the manifest is non-empty (Codex iter-2 P1 #2 fix).
          # Helper script lives at scripts/verify_screenshot_manifest.py
          # so the workflow YAML stays parseable (heredoc Python collides
          # with YAML literal-block-scalar indentation).
          screenshots_dir="$(dirname "$matched_manifest")"
          python3 scripts/verify_screenshot_manifest.py "$matched_manifest" "$screenshots_dir"

          # 6. Route-coverage check (Codex iter-3 P1 fix): verify every
          # `web/app/<segments>/page.tsx` change in this PR maps to a
          # route present in the manifest. `web/components/**` and
          # layout/template/loading/error/not-found are advisory — they
          # affect undetermined pages so operator declares coverage in
          # the brief.
          git diff --name-only "${BASE_SHA}...${HEAD_SHA}" > /tmp/changed_files.txt
          python3 scripts/verify_route_coverage.py \
            --manifest "$matched_manifest" \
            --changed-files /tmp/changed_files.txt

          echo "OK: $VISUAL APPROVE; rubric SHA + pr_head_sha + manifest + screenshots + route coverage all match"

      - name: skip_summary
        if: steps.ui_surface.outputs.ui_surface != 'true' || steps.issue.outputs.derivation == 'skip_infra'
        env:
          UI_SURFACE: ${{ steps.ui_surface.outputs.ui_surface }}
          DERIVATION: ${{ steps.issue.outputs.derivation }}
          HEAD_REF_FOR_LOG: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$UI_SURFACE" != "true" ]; then
            echo "codex-visual-required: skipped (no web/app/** or web/components/** changes)"
          else
            echo "codex-visual-required: skipped (infra branch '$HEAD_REF_FOR_LOG')"
          fi
