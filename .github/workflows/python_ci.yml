# Deep Cove Research — Python quality CI (Phase 0: REPORT-ONLY).
# This workflow is INFORMATIONAL and must NOT block merges yet: the test suite is not green
# out-of-the-box (see docs/review_readiness/baseline_test_state.md) and there are ~530 docstring
# gaps. It establishes the enforcement spine; it is ratcheted to a REQUIRED check only in Phase 3,
# after a stable green baseline exists. Actions are SHA-pinned (supply-chain hygiene).
name: python-ci (report-only)

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [chore/review-readiness-phase0]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    continue-on-error: true  # PHASE 0: never blocks. Remove when ratcheted to required (Phase 3).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
      - name: Install quality tools
        run: python -m pip install --upgrade pip ruff mypy interrogate
      - name: Ruff lint (report-only)
        run: ruff check src scripts || true
      - name: Ruff format check (report-only)
        run: ruff format --check src scripts || true
      - name: Mypy (report-only, scoped to src/polaris_graph)
        run: mypy || true
      - name: Interrogate docstring coverage (report-only)
        run: interrogate -v src/polaris_graph || true

  # Phase 3B / S3: supply-chain + hygiene scanning. REPORT-ONLY.
  # continue-on-error + `|| true` on every step => never blocks a merge.
  # See docs/review_readiness/ci_scanning.md. Do NOT remove continue-on-error
  # or promote to a required check until the flakiness bar
  # (docs/review_readiness/flakiness_policy.md §1) is met.
  supply_chain_scan:
    runs-on: ubuntu-latest
    continue-on-error: true  # PHASE 3B: never blocks. Report-only.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
      # Tools are installed here in CI (they are not vendored / pre-installed).
      # No scan results are committed to the repo; output is produced by the runner.
      - name: Install scanning tools
        run: python -m pip install --upgrade pip pip-audit pip-licenses detect-secrets || true
      - name: Install project deps (best-effort, for accurate dep/license/vuln scans)
        # Best-effort: if resolution fails the scans below still run against
        # whatever is installed; report-only means a partial scan is acceptable.
        run: pip install -r requirements.txt || true
      # --- Dependency integrity (installed-tree consistency) ---
      - name: Dependency integrity — pip check (report-only)
        run: pip check || true
      # --- Dependency vulnerability scan (known CVEs) ---
      - name: Dependency vuln scan — pip-audit (report-only)
        run: pip-audit -r requirements.txt || true
      # --- License scan ---
      - name: License scan — pip-licenses (report-only)
        run: pip-licenses --format=markdown --with-urls || true
      # --- Secret scan ---
      - name: Secret scan — detect-secrets (report-only)
        run: detect-secrets scan --all-files > detect-secrets.report.json || true
      - name: Show secret-scan summary (report-only)
        run: cat detect-secrets.report.json || true
