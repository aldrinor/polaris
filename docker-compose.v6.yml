# I-carney-005 — POLARIS v6 production stack (Carney demo).
#
# Stack: caddy + redis + api + worker + webui.
# Legacy pipeline-B compose (docker-compose.yml) stays untouched per
# I-carney-005 acceptance criterion 8.
#
# I-rdy-015 (#511): Caddy fronts the stack — it is the ONLY host-published
# surface (:80 + :443). `api` and `webui` are Docker-network internal
# (no host `ports:` mapping) so :8000 / :3000 are not publicly reachable.
#
# Bring up:  docker compose -f docker-compose.v6.yml up -d
# Tear down: docker compose -f docker-compose.v6.yml down -v   (NB: drops volumes)

services:
  caddy:
    # I-rdy-015 (#511): TLS termination + reverse proxy + Let's Encrypt.
    # The ONLY service that publishes ports to the host.
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy_data persists the provisioned cert + ACME account — MUST
      # survive restarts or every restart re-requests a cert and risks the
      # Let's Encrypt rate limit.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webui
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.v6
    command: api
    env_file:
      - .env
    environment:
      POLARIS_V6_REDIS_URL: redis://redis:6379/0
      POLARIS_V6_RUN_DB: /app/state/v6_runs.sqlite
      GNUPGHOME: /app/gpg
      # POLARIS_GPG_KEY_ID is read from .env via env_file
    volumes:
      - shared_state:/app/state
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data:/app/data
      # P1-006: writable GPG homedir bind-mount.
      - ${POLARIS_GPG_HOMEDIR:-~/.gnupg-polaris}:/app/gpg
      # I-carney-004 P1: mount /etc/polaris/static_accounts.yaml into the
      # container so verify_app_startup() can find the auth substrate.
      # Read-only bind; host file is 640 root:root, container reads as root.
      - ${POLARIS_ETC_DIR:-/etc/polaris}:/etc/polaris:ro
    # I-rdy-015 (#511): no host `ports:` — api is reached only by webui +
    # worker over the Docker network as `api:8000`. `expose` documents the
    # internal port; it is NOT published to the host.
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  worker:
    build:
      context: .
      dockerfile: Dockerfile.v6
    command: worker
    # I-cd-001 / #494: the worker is a Dramatiq consumer with no HTTP server.
    # Override the api-oriented Dockerfile.v6 HEALTHCHECK (:8000/health) with a
    # redis-reachability check, else the worker reports "unhealthy" forever
    # despite running fine — and api/webui that depend on it can be held back.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('redis', 6379), 3)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      POLARIS_V6_REDIS_URL: redis://redis:6379/0
      POLARIS_V6_RUN_DB: /app/state/v6_runs.sqlite
      GNUPGHOME: /app/gpg
    volumes:
      - shared_state:/app/state
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data:/app/data
      - ${POLARIS_GPG_HOMEDIR:-~/.gnupg-polaris}:/app/gpg
      - ${POLARIS_ETC_DIR:-/etc/polaris}:/etc/polaris:ro
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  webui:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # P1-B from Codex diff iter-2: Next.js bakes rewrites() destinations
        # at build time, so INTERNAL_API_URL must be a build arg. NOT
        # prefixed NEXT_PUBLIC_, so it does NOT leak into the client bundle —
        # only the server-side routes manifest sees it.
        INTERNAL_API_URL: http://api:8000
    environment:
      NODE_ENV: production
    # I-rdy-015 (#511): no host `ports:` — webui is reached only by caddy
    # over the Docker network as `webui:3000`.
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  shared_state:
  caddy_data:
  caddy_config:
