# Deep Cove Research — pre-commit hooks (Phase 0). Mirrors the CI quality tools so issues are
# caught locally before push. Install with: pre-commit install
# Phase 0 posture: ruff auto-fixes + format; the heavier checks live in CI (report-only).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 75b98813cfb7e663870a28c74366a1e99d7bfe79  # v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(third_party|outputs|baseline)/
      - id: ruff-format
        exclude: ^(third_party|outputs|baseline)/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c  # v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(third_party|outputs|baseline)/
      - id: end-of-file-fixer
        exclude: ^(third_party|outputs|baseline)/
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: detect-private-key
