      - "Dramatiq + Redis worker pool running"
      - "Queue acceptance test passes:"
      - "  - Cancel in-flight LLM job within 5s; partial state persisted"
      - "  - Retry failed retrieval; trace_id preserved"
      - "  - Survive worker SIGKILL; resume on new worker"
      - "  - Job status visible to orchestrator"
      - "  - Trace ID propagates to OpenTelemetry"
      - "If Dramatiq fails: Celery + Redis substituted and tested"
    required_artifacts:
      - "src/queue/dramatiq_workers.py (or celery_workers.py)"
      - "tests/queue/test_acceptance.py"
      - "manifest with test pass output"
    blocking_consequence: "Phase 1 job queue + SSE work blocked"

