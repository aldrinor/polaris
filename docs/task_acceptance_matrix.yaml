  task_0_7:
    title: "SGLang vs vLLM bakeoff (one engine frozen)"
    owner: "claude"
    estimate_hours: 12
    green_criteria:
      - "Bakeoff run on dev cluster (Task 0.3) with: identical hardware, identical model (V4 Flash), 5 representative POLARIS prompts × 50 iterations"
      - "Measured: throughput tok/s, latency P50/P95/P99, prefix-cache hit rate, KV cache pressure, error rate"
      - "docs/engine_decision.md committed with chosen engine + rationale + measured deltas"
