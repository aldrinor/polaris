    notes:
      - "Next.js 16 chosen over 15 — body of agent prompt said latest stable, do NOT downgrade. Next 16.2.4 is current stable."
      - "shadcn preset is `base-nova` (Base UI primitives), not legacy Radix Slot. Practical impact: render={<Link/>} + nativeButton={false} not asChild."
      - "npm audit reports 2 moderate vulns (transitive postcss<8.5.10 via Next bundle). Build-time only, not exploitable at runtime. Resolves when Next ships postcss bump."
    blocking_consequence: "All frontend work in Phase 1+ blocked (NOW UNBLOCKED)"

