    blocking_consequence: "Tasks 0.7, 0.8, 0.10 cannot start"

  task_0_4:
    title: "Frontend scaffold (Next.js 16 + React 19 + shadcn 4.6 MIT + Tailwind v4)"
    owner: "claude (with frontend-developer agent)"
    estimate_hours: 16
    status: "COMPLETED 2026-05-01"
    green_criteria:
      - "web/ directory created and `npm run build` succeeds"
      - "TypeScript 5 + strict mode enabled"
      - "shadcn/ui CLI initialized with MIT license confirmed (verbatim text in web/THIRD_PARTY_LICENSES.md)"
