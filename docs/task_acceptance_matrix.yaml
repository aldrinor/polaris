      - "Sign-in shell renders (web/app/sign-in/page.tsx)"
      - "Lint + format CI configured (.github/workflows/web_ci.yml)"
    required_artifacts:
      - "web/package.json (Next 16.2.4, React 19.2.4, shadcn 4.6.0)"
      - "web/tsconfig.json"
      - "web/eslint.config.mjs (Next 16 + ESLint 9 flat config; supersedes legacy .eslintrc.json)"
