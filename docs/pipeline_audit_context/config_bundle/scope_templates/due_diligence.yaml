# Due-diligence domain scope template — HONEST-REBUILD Phase 2c.
#
# Used when the user is researching a company, product, market, or
# competitive landscape for investment / M&A / partnership decisions.
# The corpus is broader than clinical: accepts SEC filings, analyst
# reports, patents, and news, but requires provenance for every claim
# and excludes anonymous / unattributed sources entirely.

domain: due_diligence
description: >
  Broad-source corpus for investment / business due diligence.
  Requires provenance for every claim; excludes anonymous sources.

inclusion_criteria:
  - SEC filings (10-K, 10-Q, 8-K, S-1, DEF 14A).
  - Analyst reports from named banks / research firms with disclosure.
  - Patents (USPTO, EPO, WIPO).
  - Regulatory correspondence (FDA CRLs, FTC second requests, DOJ filings).
  - Company press releases (with explicit provenance tag).
  - Named industry-analyst commentary (Gartner, Forrester, ICER, etc.).
  - Peer-reviewed journal articles on the technology / mechanism.
  - Named business-news articles (Reuters, Bloomberg, FT, WSJ).

exclusion_criteria:
  - Anonymous forum posts.
  - Unattributed blog posts.
  - Content farms and SEO-optimized summary sites.
  - Social-media posts without author verification.
  - Press releases without attribution or date.

expected_tier_distribution:
  # Due diligence intentionally accepts a wider mix than clinical —
  # the point is to cover the landscape. The gate ensures no single
  # low-provenance tier dominates.
  - tier: T3
    min_fraction: 0.20
    max_fraction: 0.50
    rationale: >
      Regulatory filings (SEC, FDA, FTC, DOJ) and patents — primary
      documents of record.
  - tier: T5
    min_fraction: 0.10
    max_fraction: 0.35
    rationale: >
      Named industry-analyst reports with disclosed methodology and
      company press releases.
  - tier: T1
    min_fraction: 0.05
    max_fraction: 0.30
    rationale: >
      Peer-reviewed research on the technology or mechanism.
  - tier: T6
    min_fraction: 0.05
    max_fraction: 0.30
    rationale: >
      Named business-news articles and attributed commentary.
  - tier: T4
    min_fraction: 0.00
    max_fraction: 0.20
    rationale: >
      Narrative industry reviews and white papers.
  - tier: T2
    min_fraction: 0.00
    max_fraction: 0.15
    rationale: >
      Systematic market reviews.
  - tier: T7
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Early-signal sources (conference presentations, preprints).

date_range:
  start: "2019-01-01"
  end: null

geography: []
languages:
  - en
excluded_sponsors: []
