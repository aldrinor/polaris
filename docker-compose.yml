version: '3.8'

services:
  web:
    build: .
    ports:
      - "${POLARIS_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - POLARIS_DEPLOYMENT_MODE=${POLARIS_DEPLOYMENT_MODE:-cloud}
      - POLARIS_VERSION=${POLARIS_VERSION:-0.9.0}
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./state:/app/state
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8100}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # Optional: Local search engine (sovereign mode)
  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./config/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8888}
    profiles:
      - sovereign
    restart: unless-stopped

  # Optional: Local LLM serving (sovereign mode)
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "${VLLM_PORT:-8200}:8000"
    environment:
      # I-cd-010 / GH#625: Carney demo evaluator artifact fallback (Gemma 4
      # 31B-it INT4 AWQ W4A16). Full --quantization compressed-tensors +
      # --tensor-parallel-size 4 + GPU resource block wiring deferred to
      # I-cd-038 deployment. Active deployments set VLLM_MODEL explicitly.
      - MODEL=${VLLM_MODEL:-ebircak/gemma-4-31B-it-4bit-W4A16-AWQ}
      - TENSOR_PARALLEL_SIZE=${VLLM_TENSOR_PARALLEL:-1}
      - MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-32768}
      - GPU_MEMORY_UTILIZATION=0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - sovereign
    restart: unless-stopped

volumes:
  chroma_data:
