# Workforce / AI-and-labor domain completeness checklist (I-beatboth-011 idx 39, #1289).
#
# WHY THIS FILE EXISTS: a workforce / AI-labor-market question (DRB-II idx 56, "drb_72")
# had NO checklist, so load_checklist("workforce") returned [] -> the completeness gate
# scored 0/0 topics -> a vacuous covered_fraction=1.0 that the strict gate
# (PG_BENCHMARK_STRICT_GATES) correctly REFUSES to let self-certify
# (completeness_vacuous_zero_denominator) -> release_allowed=False. This file supplies the
# real DENOMINATOR (the topics a reviewer of an AI-and-jobs report expects to see covered).
#
# FAITHFULNESS NOTE (§-1.3): this only supplies the completeness DENOMINATOR. It never touches
# strict_verify / NLI / the 4-role D8 audit / span-grounding, never drops or alters a verified
# claim, and adds no cap/floor/target. It does NOT silence the not_applicable branch and does
# NOT disable the strict gate — it simply gives a non-zero, honest set of topics to measure
# coverage against. Honest scope: a hand-authored checklist is A coverage signal, NOT the
# 9,415-rubric DRB-II expert recall set.
#
# Topics are drawn from the modern AI-and-labor economics literature (Acemoglu & Restrepo task
# framework; Autor on polarization; Brynjolfsson et al. on generative-AI productivity; the ILO /
# OECD exposure studies). Keywords match the QUESTION and report prose, lowercased by the loader.

domain: workforce

topics:
  - id: task_displacement_vs_reinstatement
    label: Task displacement vs. reinstatement (automation vs. new-task creation)
    keywords:
      - "displacement effect"
      - "reinstatement effect"
      - "task framework"
      - "automation"
      - "labor share"
      - "new tasks"
      - "job destruction"
      - "job creation"
    expand_queries:
      - "{topic} AI automation displacement reinstatement labor tasks"

  - id: occupational_exposure_measurement
    label: Occupational exposure / which jobs are exposed to AI
    keywords:
      - "occupational exposure"
      - "ai exposure"
      - "exposure to automation"
      - "routine tasks"
      - "task content"
      - "occupations at risk"
      - "exposure index"
      - "susceptible to automation"
    expand_queries:
      - "{topic} occupational exposure to AI measurement which jobs"

  - id: wage_and_inequality_effects
    label: Wage levels, wage polarization and inequality effects
    keywords:
      - "wage"
      - "earnings"
      - "wage inequality"
      - "polarization"
      - "wage premium"
      - "income distribution"
      - "labor market inequality"
      - "wage stagnation"
    expand_queries:
      - "{topic} AI automation wages inequality polarization earnings"

  - id: skill_complementarity_and_reskilling
    label: Skill complementarity, upskilling and reskilling
    keywords:
      - "complementarity"
      - "skill"
      - "reskilling"
      - "upskilling"
      - "human capital"
      - "training"
      - "skill-biased"
      - "augmentation"
    expand_queries:
      - "{topic} AI skill complementarity reskilling upskilling augmentation"

  - id: firm_level_adoption_and_productivity
    label: Firm-level AI adoption and labor productivity
    keywords:
      - "ai adoption"
      - "firm-level"
      - "productivity"
      - "labor productivity"
      - "technology adoption"
      - "diffusion"
      - "output per worker"
      - "total factor productivity"
    expand_queries:
      - "{topic} firm AI adoption labor productivity diffusion"

  - id: sectoral_impacts
    label: Sectoral / industry-specific labor impacts
    keywords:
      - "manufacturing"
      - "services"
      - "customer support"
      - "sector"
      - "industry"
      - "white-collar"
      - "knowledge work"
      - "clerical"
    expand_queries:
      - "{topic} AI labor impact by sector industry occupation"

  - id: generative_ai_specific_evidence
    label: Generative-AI-specific labor evidence (LLMs, post-2022)
    keywords:
      - "generative ai"
      - "large language model"
      - "llm"
      - "chatgpt"
      - "copilot"
      - "generative"
      - "foundation model"
      - "field experiment"
    expand_queries:
      - "{topic} generative AI LLM labor productivity field experiment"

  - id: policy_and_labor_institutions
    label: Policy, labor institutions and worker protections
    keywords:
      - "policy"
      - "regulation"
      - "labor institutions"
      - "social safety net"
      - "unemployment"
      - "collective bargaining"
      - "worker protection"
      - "labor market policy"
    expand_queries:
      - "{topic} AI labor policy regulation worker protection institutions"
