# Clinical domain completeness checklist — R-6 Gap-3.
#
# For a drug-efficacy/safety research question, these are the topics a
# reviewer would expect to see covered. If retrieval didn't surface
# evidence for a topic, the pipeline triggers a targeted retrieval
# pass BEFORE synthesis rather than shipping an incomplete report.
#
# Each topic has:
#   - keywords: regex-safe terms whose presence in any evidence
#       direct_quote counts as "covered".
#   - applies_if: optional list of terms that must appear in the
#       research question for this topic to apply (so we don't demand
#       "pancreatitis" coverage on a cardiovascular-only question).
#   - requires_drug_intervention: optional. BUG-7 (I-arch-006, #1262). When
#       true, the topic is a DRUG/INTERVENTION-pharmacology topic and only
#       applies when the QUESTION is actually about a drug/intervention,
#       decided by a robust config-driven recognizer (scope_gate
#       _intervention_present = drug names + WHO/USAN INN stems) OR one of the
#       topic's own `applies_if` class anchors in the question — NOT the
#       routing label or an incidental substring in retrieved evidence. This
#       stops the GLP-1/drug checklist (incl. the CRITICAL contraindications
#       topic that gates abort_critical_topic_uncovered) from spuriously
#       applying to NON-drug clinical questions (gut-microbiota, Parkinson's,
#       metal-ions). On recognizer-unavailability a CRITICAL topic fails CLOSED
#       (stays applicable + discloses); a non-critical one keeps the legacy
#       substring behaviour. Default false -> byte-identical to pre-BUG-7.
#   - expand_queries: list of Serper/S2 queries to fire if the topic
#       is uncovered. Kept short.

domain: clinical

topics:
  - id: efficacy_primary
    label: Primary-endpoint efficacy
    # BUG-7 (#1262): drug-efficacy endpoint topic. Only applies when the question
    # is about a drug/intervention (robust recognizer), not every clinical
    # question — a gut-microbiota / Parkinson's question has no drug primary
    # endpoint to demand.
    requires_drug_intervention: true
    keywords:
      - "weight loss"
      - "mean weight"
      - "weight reduction"
      - "a1c"
      - "hba1c"
      - "glycemic"
      - "reduction"
      - "mace"
      - "mortality"
    expand_queries:
      - "{drug} primary endpoint efficacy randomized controlled trial"

  - id: safety_adverse_events
    label: Adverse events / safety
    # BUG-7 (#1262): drug adverse-event topic — gate on drug/intervention
    # presence so it is not demanded of a non-drug clinical question.
    requires_drug_intervention: true
    keywords:
      - "adverse event"
      - "adverse reaction"
      - "nausea"
      - "vomiting"
      - "diarrhea"
      - "side effect"
      - "discontinuation"
      - "serious adverse"
    expand_queries:
      - "{drug} adverse events safety profile"
      - "{drug} serious adverse events discontinuation"

  - id: contraindications
    label: Contraindications / warnings
    # I-arch-004 F11 (#1249): clinical-safety-critical. A clinical report that ships
    # with ZERO contraindication/boxed-warning coverage is a clinical-safety hole; an
    # uncovered critical topic HOLDS release (abort_critical_topic_uncovered) instead
    # of shipping the advisory ok_incomplete_corpus. Only the clinical sweep enforces
    # this (env kill-switch PG_SWEEP_CRITICAL_COMPLETENESS_HOLD, default ON).
    critical: true
    # BUG-7 (I-arch-006, #1262): a DRUG/INTERVENTION contraindication topic. It
    # previously had NO `applies_if`, so it applied to EVERY clinical question
    # — including non-drug ones (gut-microbiota, Parkinson's) — yielding a false
    # "covered" inflation AND a spurious abort_critical_topic_uncovered. Now gated
    # on the robust drug/intervention recognizer: it applies whenever a drug/
    # intervention is recognised in the question (specific drug name OR INN stem),
    # and stays NON-applicable for genuinely non-drug clinical questions. It keeps
    # NO `applies_if` (no class restriction) so it applies to EVERY drug question,
    # not just GLP-1. On recognizer-unavailability this CRITICAL topic fails CLOSED
    # (stays applicable + discloses) so a real safety abort is never silently
    # disabled.
    requires_drug_intervention: true
    keywords:
      - "contraindicated"
      - "contraindication"
      - "warning"
      - "boxed warning"
      - "black box"
      - "not recommended"
      - "avoid"
    expand_queries:
      - "{drug} contraindications boxed warning FDA"

  - id: class_specific_risks_glp1
    label: GLP-1 class-typical risks (pancreatitis, gallbladder, thyroid)
    # BUG-7 (#1262): GLP-1 class-pharmacology topic. The `applies_if` GLP-1 list
    # is a CLASS RESTRICTION (only GLP-1 drugs), so this topic applies iff a drug/
    # intervention is recognised AND the GLP-1 class anchor matches the question.
    # Question-anchored detection closes the prior leak where "glp-1" in incidental
    # EVIDENCE for a non-drug question flipped the topic on.
    requires_drug_intervention: true
    keywords:
      - "pancreatitis"
      - "gallbladder"
      - "cholelithiasis"
      - "thyroid"
      - "medullary thyroid"
      - "men 2"
      - "c-cell"
    applies_if:
      - "semaglutide"
      - "tirzepatide"
      - "liraglutide"
      - "dulaglutide"
      - "exenatide"
      - "glp-1"
      - "glp1"
      - "incretin"
    expand_queries:
      - "{drug} pancreatitis risk"
      - "{drug} gallbladder cholelithiasis"
      - "{drug} medullary thyroid carcinoma"

  - id: regulatory_status
    label: Regulatory approval status
    # BUG-7 (#1262): drug regulatory-approval topic — FDA/EMA approval is a
    # drug/intervention concept; gate on drug presence so a non-drug clinical
    # question is not held for missing "FDA approval" coverage.
    requires_drug_intervention: true
    keywords:
      - "fda"
      - "approved"
      - "ema"
      - "health canada"
      - "mhra"
      - "indicated for"
      - "indication"
    expand_queries:
      - "{drug} FDA approved indication"
      - "{drug} EMA approval label"

  - id: drug_interactions
    label: Drug interactions
    # BUG-7 (#1262): drug-interaction topic — gate on the robust recognizer. The
    # `applies_if` (drug/medication/therapy) is retained as a question-anchored
    # class signal; combined with the recognizer it stops the topic applying to a
    # non-drug clinical question whose evidence merely contains the word "therapy".
    requires_drug_intervention: true
    keywords:
      - "drug interaction"
      - "interact"
      - "co-administration"
      - "concomitant"
    applies_if:
      - "drug"
      - "medication"
      - "therapy"
    expand_queries:
      - "{drug} drug interactions contraindicated medications"

  - id: population_subgroups
    label: Population subgroups (elderly, renal, hepatic)
    keywords:
      - "elderly"
      - "renal impairment"
      - "hepatic impairment"
      - "kidney"
      - "liver"
      - "pregnancy"
      - "adolescent"
      - "pediatric"
    expand_queries:
      - "{drug} renal hepatic impairment dosing"
      - "{drug} elderly adolescent use"
