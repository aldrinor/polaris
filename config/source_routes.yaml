  # ============================ LEGAL PRIMARY (jurisdiction-scoped) ==================================

  - adapter_id: courtlistener
    evidence_roles: [evidence.case_law]
    document_types: [official_text]
    jurisdiction_coverage: [US]
    query_dialects: [courtlistener_v4]
    identifier_types: [us_reporter_cite, courtlistener_id]
