# ═══════════════════════════════════════════════════════════════════════════════════════════════════
# SOURCE ROUTES — the DECLARATIVE, CAPABILITY-KEYED discovery table (Sol plan 4, item 2).
#
# THE STRATEGY THIS ENCODES
#   The old strategy — "choose the canonical (usually paywalled) work, then chase a free copy of it" —
#   had a 19% hit rate, because it started from the version we were LEAST likely to be able to read.
#   This table encodes the inverse: OA-FIRST DISCOVERY, then VERSION PURSUIT. We enumerate what is
#   openly readable FIRST (DOAJ / PMC / Europe PMC / OpenAlex / CORE / OpenAIRE), we resolve identity
#   and the full set of locations (Crossref / OpenAlex / Unpaywall — and we NEVER treat their version
#   label as final), and only then do we pursue the specific citable expression the plan's policy
#   requires (e.g. the journal Version of Record for a journal-only question).
#
# WHY THIS IS DATA AND NOT CODE
#   The router MUST NOT "know" that economists post to NBER or that clinicians register trials at
#   ClinicalTrials.gov. That knowledge is a hardcoded topic gate — the exact tell this project keeps
#   failing on. So it lives HERE, as ONE ROW PER ROUTE, keyed by the EVIDENCE CAPABILITY the route
#   supplies. Adding a domain that these adapters already serve (a new jurisdiction's courts, a new
#   preprint server) is a NEW ROW in this file and ZERO lines of Python. scripts/source_router.py is a
#   generic matcher + set-cover engine over this table; it contains no adapter name and no topic word.
#
# HOW A QUESTION REACHES A ROUTE  (all three stages are data-driven; see source_router.py)
#   1. compile_contract(question)                       -> a research contract (research_contract.py)
#   2. role_requirements  (this file)  x  contract      -> the REQUIRED evidence roles for this plan
#   3. SET COVER  required_roles  over  routes[*].evidence_roles -> the routes that FIRE
#   The admissibility of what a route returns is a SEPARATE axis (source_policy over document_types):
#   a preprint route may FIRE for discovery/version-pursuit yet yield nothing CITABLE under a
#   journal-only policy. Firing and citability are never the same decision.
#
# EVERY LIVE ATTEMPT GOES THROUGH acquisition.Acquirer, so it lands on the event ledger and the
# distinct outcomes stay distinct:
#   FETCHED | NOT_FOUND | ACCESS_DENIED | THROTTLED | TRANSIENT_ERROR | LANDING_PAGE | ABSTRACT_ONLY |
#   WRONG_WORK | CORRUPT_EXTRACTION.
# Only NOT_FOUND, across every APPLICABLE route that genuinely answered, supports "we did not locate an
# accessible copy." A 429 (THROTTLED) never does, and neither does a 403 (ACCESS_DENIED).
# ═══════════════════════════════════════════════════════════════════════════════════════════════════

schema_version: 1
registry_version: sr-1
mailto_env: POLARIS_MAILTO          # the polite-pool contact the router threads into query dialects
fetch_date: "2026-07-14"

# ───────────────────────────────────────────────────────────────────────────────────────────────────
# THE ROLE VOCABULARY — an EVIDENCE CAPABILITY, not a domain. A route SUPPLIES roles; a plan REQUIRES
# roles; set cover joins them. The four `discover.*/resolve.*/fetch.*` roles are the OA-first backbone
# every scholarly plan needs. The `evidence.*` roles are field-scoped and fire only when the plan's own
# vocabulary calls for them. The dotted `capability.field` form is deliberate: the capability is the
# noun, the field is what a new domain edits.
# ───────────────────────────────────────────────────────────────────────────────────────────────────
roles:
  # -- OA-first backbone (always required for a scholarly artifact) -----------------------------------
  discover.index:        "Enumerate candidate scholarly works by topic (a bibliographic index)."
  resolve.identity:      "Resolve a work's identity, dates and version RELATIONS from an identifier. NOT full text."
  resolve.locations:     "Enumerate the OA copy LOCATIONS/versions of a known work. The version label is a hint, never final."
  fetch.oa_fulltext:     "Retrieve open-access FULL TEXT (XML/PDF/HTML) that we can actually read and mine."
  # -- field-scoped evidence kinds (fire on the plan's own evidence vocabulary) -----------------------
  evidence.peer_reviewed:          "Peer-reviewed journal articles — the citable class under a journal-only / peer-reviewed policy."
  evidence.working_paper.economics: "Economics/policy working papers as SEPARATE works (peer review changes the numbers)."
  evidence.preprint.general:       "General/CS/physics/math preprints as separate works."
  evidence.preprint.biomedical:    "Biomedical/health preprints as separate works."
  evidence.working_paper.social_legal: "Social-science and legal scholarship / working papers."
  evidence.trial_registration:     "Prospective clinical-trial registrations and results."
  evidence.clinical_guideline:     "Clinical practice guidelines and evidence syntheses from guideline bodies."
  evidence.case_law:               "Primary case law — judicial opinions and their holdings."
  evidence.statute_regulation:     "Primary statutes, regulations and official legal instruments."
  evidence.regulatory_guidance:    "Regulator guidance, decisions and official filings."
  evidence.standard:               "Technical standards and normative specifications."
  evidence.dataset:                "Research datasets and their DOIs."

# ───────────────────────────────────────────────────────────────────────────────────────────────────
# ROLE REQUIREMENTS — how the CONTRACT decides which roles the plan needs. Each rule matches DATA
# tokens against the plan's ROUTING TEXT (question + review_subject + method_designs + unit_levels +
# core_concept aliases + framing devices + genre + geographies — assembled by source_router.py). The
# tokens are FIELD-NATIVE vocabulary a real contract in that field prints; the matcher is generic and
# lives in code, the vocabulary lives here. `default: true` = always required (the OA-first backbone).
# `any_of` = required if the routing text contains ANY listed token as a whole word/phrase.
#
# OVER-FIRING IS SAFE (we look in one more place); UNDER-FIRING is the danger. So triggers are
# INCLUSIVE. The one hard invariant the demo checks: a clinical plan must NOT acquire the economics
# working-paper role — so `evidence.working_paper.economics` is triggered ONLY by economics-native
# terms, none of which a clinical or legal question carries.
# ───────────────────────────────────────────────────────────────────────────────────────────────────
role_requirements:
  - role: discover.index
    default: true
  - role: resolve.identity
    default: true
  - role: resolve.locations
    default: true
  - role: fetch.oa_fulltext
    default: true

  - role: evidence.peer_reviewed
    # Any literature-review / scholarly-synthesis artifact, or an explicit journal/peer-reviewed policy.
    any_of: ["literature review", "systematic review", "scholarly", "peer-reviewed", "peer reviewed",
             "journal article", "journal articles", "meta-analysis", "meta analysis", "review the literature",
             "academic literature", "state of the art", "research synthesis"]

  - role: evidence.working_paper.economics
    any_of: ["labor market", "labour market", "labor economics", "wage", "wages", "employment",
             "unemployment", "gdp", "productivity", "inflation", "monetary policy", "fiscal",
             "trade", "tariff", "econometric", "difference-in-differences", "instrumental variable",
             "quasi-experimental", "elasticity", "occupation", "occupations", "firm-level",
             "labor supply", "labor demand", "economic growth", "nber", "iza"]

  - role: evidence.preprint.general
    any_of: ["machine learning", "deep learning", "neural network", "neural networks", "algorithm",
             "algorithms", "transformer", "large language model", "reinforcement learning", "quantum",
             "astrophysics", "condensed matter", "theorem", "benchmark", "computer vision",
             "natural language processing", "artificial intelligence", "generative ai", "gpu"]

  - role: evidence.preprint.biomedical
    any_of: ["clinical", "clinical trial", "randomized", "randomised", "rct", "placebo", "efficacy",
             "adverse event", "adverse events", "mortality", "morbidity", "cohort", "in vitro",
             "in vivo", "patients", "patient", "dose", "dosing", "therapy", "therapeutic", "disease",
             "diagnosis", "biomarker", "hazard ratio", "epidemiolog", "incidence", "prevalence",
             "comorbidit", "pathophysiolog"]

  - role: evidence.working_paper.social_legal
    any_of: ["case law", "statute", "statutes", "statutory", "regulation", "regulations", "regulatory",
             "court", "courts", "judicial", "holding", "liability", "plaintiff", "defendant", "tort",
             "doctrine", "doctrinal", "jurisdiction", "constitutional", "litigation", "precedent",
             "damages", "negligence", "governance", "policy analysis"]

  - role: evidence.trial_registration
    any_of: ["clinical trial", "clinical trials", "randomized controlled", "randomised controlled",
             "rct", "phase iii", "phase ii", "placebo-controlled", "efficacy", "safety", "adverse event",
             "endpoint", "intervention", "treatment arm", "patients", "dose-response"]

  - role: evidence.clinical_guideline
    any_of: ["clinical guideline", "clinical guidelines", "practice guideline", "guidance",
             "recommendation", "recommendations", "standard of care", "cochrane", "systematic review",
             "screening", "management of", "diagnosis and treatment"]

  - role: evidence.case_law
    any_of: ["case law", "case-law", "judicial opinion", "judicial opinions", "court", "courts",
             "holding", "ruling", "rulings", "precedent", "liability", "plaintiff", "defendant",
             "tort", "litigation", "appellate", "supreme court", "damages", "negligence"]

  - role: evidence.statute_regulation
    any_of: ["statute", "statutes", "statutory", "legislation", "regulation", "regulations",
             "regulatory", "code of federal", "directive", "act of", "bill", "ordinance", "rulemaking",
             "compliance", "legal framework", "enacted"]

  - role: evidence.regulatory_guidance
    any_of: ["regulator", "regulatory guidance", "agency guidance", "fda", "ema", "sec filing",
             "supervisory", "central bank", "prudential", "enforcement action", "consultation paper"]

  - role: evidence.standard
    any_of: ["technical standard", "iso ", "iec ", "ieee ", "protocol", "specification",
             "interoperability", "conformance", "reference architecture", "normative"]

  - role: evidence.dataset
    any_of: ["dataset", "datasets", "microdata", "survey data", "administrative data", "open data",
             "replication data", "data release"]

# ───────────────────────────────────────────────────────────────────────────────────────────────────
# JURISDICTION LEXICON — resolves a jurisdiction ADJECTIVE/name in the routing text to an ISO code, so
# a primary-legal/official route fires only where its coverage applies. If NO jurisdiction is detected,
# a jurisdiction-scoped route fires for ALL its covered codes (we do not know the forum, so we look
# broadly — the safe direction). This mirrors config/scope_ontology/source_types.yaml (data, not code).
# ───────────────────────────────────────────────────────────────────────────────────────────────────
jurisdiction_lexicon:
  "u.s.": US
  "us ": US
  "united states": US
  american: US
  federal: US          # in a US-framed legal question "federal statutes" => the US federal forum
  scotus: US
  canadian: CA
  canada: CA
  british: GB
  "u.k.": GB
  "uk ": GB
  england: GB
  european: EU
  "european union": EU
  "eu ": EU
  australian: AU
  australia: AU
  japanese: JP
  japan: JP

# ───────────────────────────────────────────────────────────────────────────────────────────────────
# THE ROUTES — ONE ROW PER ROUTE. Columns (Sol's schema):
#   adapter_id           stable id; ALSO the acquisition `adapter` name, so every attempt is attributable.
#   evidence_roles       the capabilities this route SUPPLIES (join key for set cover).
#   document_types       the expression kinds it yields (provenance EXPRESSION_KINDS) — drives admissibility.
#   jurisdiction_coverage ISO codes it covers, or [ANY] for field/global routes.
#   query_dialects       how to query it (informational + used by the light query builder).
#   identifier_types     identifiers it accepts/resolves.
#   version_resolvers    the version-pursuit mechanism it OFFERS (empty = it is a target, not a resolver).
#   rate_policy          politeness for acquisition._space (host + min spacing + key/pool).
#   coverage_note        what it is and is not.
#   endpoints            real URL templates for the live probes (may be empty where there is no clean API;
#                        `discovery_via` then names the resolver route that finds this route's works).
#
#   ---- the three columns that make a route EXECUTABLE as a FULL-TEXT lane (Sol V9 §2) -------------
#   identifier_transforms  how one identifier becomes another (PMCID -> numeric -> OAI identifier). The
#                        transforms are a tiny DECLARED vocabulary (strip_prefix / format), evaluated by
#                        routes_bio._transform. A NEW REPOSITORY IS A ROW, NOT A FUNCTION.
#   selectors            where the answer lives in the response — dotted paths into JSON, or the JATS/XML
#                        element names. Changing "which field holds the PDF link" is a DATA edit.
#   batch                batch sizes the endpoint documents (PMC ID converter: 200 ids per request).
#
#   Sol V9 §2, verbatim: "Data edit: PMC endpoints, identifier transforms, metadata prefixes, and rate
#   budget. Code changes only for a new protocol/parser primitive." So the ONE parser primitive these
#   three routes needed — a JATS linearizer — is code (routes_bio.jats_to_text); every endpoint, every
#   identifier transform, every response selector and every rate budget below is DATA.
#
#   WHAT AN ADAPTER MAY NOT PUT HERE: a document_type CONCLUSION. `document_types` says what expressions
#   a route CAN yield; it never says what a fetched document IS. That is derived from the bytes, by
#   provenance.derive_expression_kind, and by nothing else.
# ───────────────────────────────────────────────────────────────────────────────────────────────────
routes:

  # ============================ OA-FIRST BACKBONE: index / identity / locations / fulltext ===========

  - adapter_id: openalex
    evidence_roles: [discover.index, resolve.identity, resolve.locations, evidence.peer_reviewed]
    document_types: [journal_version, accepted_manuscript, preprint, working_paper]
    jurisdiction_coverage: [ANY]
    query_dialects: [openalex_search, openalex_filter]
    identifier_types: [doi, openalex_id, pmid, pmcid, mag]
    version_resolvers: [openalex_locations]   # primary_location + locations[] across host venues
    rate_policy: {host: api.openalex.org, min_spacing_s: 1.0, needs_key: false, pool: mailto}
    coverage_note: >-
      250M+ works with per-work location enumeration and version relations. Its `host_venue`/`version`
      labels are HINTS to pursue, never a final verdict on which expression we hold.
    endpoints:
      search:   "https://api.openalex.org/works?search={query}&per_page={limit}&mailto={mailto}"
      identity: "https://api.openalex.org/works/doi:{doi}?mailto={mailto}"

  - adapter_id: crossref
    evidence_roles: [resolve.identity]
    document_types: [journal_version, proceedings_version, working_paper, preprint]
    jurisdiction_coverage: [ANY]
    query_dialects: [crossref_query]
    identifier_types: [doi]
    version_resolvers: [crossref_relations, crossref_dates]   # is-preprint-of / is-version-of, published dates
    rate_policy: {host: api.crossref.org, min_spacing_s: 1.0, needs_key: false, pool: mailto}
    coverage_note: >-
      IDENTITY, DATES AND RELATIONS ONLY — never treated as a full-text source. Its relation edges
      (is-preprint-of, is-version-of) are the backbone of version pursuit from a preprint to the VoR.
    endpoints:
      search:   "https://api.crossref.org/works?query={query}&rows={limit}&mailto={mailto}"
      identity: "https://api.crossref.org/works/{doi}?mailto={mailto}"

  - adapter_id: unpaywall
    evidence_roles: [resolve.locations]
    document_types: [journal_version, accepted_manuscript]
    jurisdiction_coverage: [ANY]
    query_dialects: [unpaywall_doi]
    identifier_types: [doi]
    version_resolvers: [unpaywall_oa_locations]   # best_oa_location + oa_locations[] with host_type + version
    rate_policy: {host: api.unpaywall.org, min_spacing_s: 1.0, needs_key: false, pool: email}
    coverage_note: >-
      Enumerates OA locations for a DOI (repository vs publisher, submitted/accepted/published). We take
      its `version` as a claim to VERIFY against the fetched bytes (event_ledger.derive_semantic_binding),
      not as the answer.
    endpoints:
      identity: "https://api.unpaywall.org/v2/{doi}?email={mailto}"

  - adapter_id: doaj
    evidence_roles: [discover.index, resolve.locations, evidence.peer_reviewed]
    document_types: [journal_version]
    jurisdiction_coverage: [ANY]
    query_dialects: [doaj_query]
    identifier_types: [doi, issn]
    version_resolvers: [doaj_fulltext_links]
    # ~2 req/s (DOAJ documents an average of two/second; brief bursts are queued). ONE in flight.
    rate_policy: {host: doaj.org, min_spacing_s: 0.5, max_in_flight: 1, needs_key: false, pool: public}
    coverage_note: >-
      Directory of Open Access Journals — 13M+ articles from vetted OA journals. Its entire index is
      peer-reviewed journal expressions, so it is the strongest single index for a journal-only policy.
      IT RETURNS LINKS, NOT BYTES. A live probe on 10.1186/s13643-025-03000-0 returned exactly one
      `type: fulltext` link and it was `https://doi.org/10.1186/...` — a DOI RESOLVER, i.e. a landing
      page that redirects to the publisher. So a DOAJ hit is a CANDIDATE URL and never a document, and
      DIRECTORY MEMBERSHIP IS NOT BYTE-LEVEL VERSION PROOF. A DOAJ miss means "not indexed in DOAJ" —
      it does NOT mean "not open", and it may never be reduced to one.
    endpoints:
      search:   "https://doaj.org/api/search/articles/{query}?pageSize={limit}"
      # EXACT-DOI article search. The DOI is embedded in the PATH, so it is quoted whole (safe='').
      identity: "https://doaj.org/api/search/articles/doi%3A{doi}"
    selectors:
      results:        "results"              # the array of article records
      total:          "total"                # 0 = not indexed in DOAJ. NOT "not open".
      links:          "bibjson.link"         # [] of {type, url, content_type}
      link_kind_key:  "type"                 # the key whose value names the link kind
      link_kind_want: "fulltext"             # the kind we want. NOTE: this literal token is DATA, and
      #                                      # routes_bio compares against it — it never EMITS it, because
      #                                      # `fulltext` is a RESERVED_VALUE in the ledger's conclusion
      #                                      # guard. The adapter records n_links_matched (a count) and
      #                                      # puts DOAJ's own bytes in the blob store instead.
      link_url:       "url"
      link_media:     "content_type"         # "HTML" / "PDF" — an OBSERVATION, checked against the bytes
      record_page:    "id"                   # -> https://doaj.org/article/{id}

  - adapter_id: europe_pmc
    evidence_roles: [discover.index, resolve.locations, fetch.oa_fulltext]
    document_types: [journal_version, accepted_manuscript, preprint]
    jurisdiction_coverage: [ANY]
    query_dialects: [europepmc_query]
    identifier_types: [doi, pmid, pmcid]
    version_resolvers: [europepmc_fulltext]
    # Sol V9 §2: "official documentation does not publish a stable numeric public quota. Start at one
    # request/second and one in flight, then obey 429, Retry-After, and any returned limit headers."
    rate_policy: {host: www.ebi.ac.uk, min_spacing_s: 1.0, max_in_flight: 1, needs_key: false, pool: public}
    coverage_note: >-
      Life-sciences + cross-discipline index over PMC with OA full-text XML retrieval. Full text where
      the licence permits; abstract-only otherwise (which the reducer reports as ABSTRACT_ONLY, not a gap).
      A RECORD IS NOT A DOCUMENT: three NIH author manuscripts found live (PMC13200213, PMC13071806,
      PMC12353900) all carry a PMCID and all 404 on fullTextXML — "record found, no accessible full
      text" is a DIFFERENT fact from "identifier not found", and both are different from "not open".
    endpoints:
      search:   "https://www.ebi.ac.uk/europepmc/webservices/rest/search?query={query}&format=json&pageSize={limit}"
      # EXACT-DOI search, resultType=core (the only resultType that carries the OA/fullText fields).
      identity: 'https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=DOI%3A%22{doi}%22&resultType=core&format=json&pageSize=1'
      # ** THE SHAPE FIX (Sol V9 §2: "the currently configured /{source}/{id}/fullTextXML shape is WRONG
      # ** for PMCID retrieval"). PROVEN LIVE, 2026-07-14:
      #      /PMC/PMC12754963/fullTextXML  -> HTTP 404, 0 bytes
      #      /PMC12754963/fullTextXML      -> HTTP 200, 86,022 bytes, 34 <sec>
      # The {source}/{id} shape is for the MED/PMID-keyed endpoints, not for full text. Full text is
      # keyed by the BARE PMCID.
      fulltext: "https://www.ebi.ac.uk/europepmc/webservices/rest/{pmcid}/fullTextXML"
    selectors:
      results:          "resultList.result"
      hit_count:        "hitCount"           # 0 = not in the EPMC index. NOT "no full text exists".
      pmcid:            "pmcid"
      pmid:             "pmid"
      doi:              "doi"
      is_open_access:   "isOpenAccess"       # "Y"/"N" — an OBSERVATION. The bytes decide.
      in_epmc:          "inEPMC"
      has_pdf:          "hasPDF"
      license:          "license"
      full_text_ids:    "fullTextIdList.fullTextId"
      # ---- THE PAYWALL TRAP, ENCODED AS DATA ------------------------------------------------------
      # fullTextUrlList is NOT a list of open documents. Live on 10.1186/s13643-025-03000-0 its FIRST
      # entry was {"availability": "Subscription required", "site": "DOI", url: doi.org/...}. An adapter
      # that took fullTextUrlList[0] would fetch a PUBLISHER PAYWALL and hand it to the miner. We select
      # ONLY entries whose availabilityCode is in the open set.
      full_text_urls:        "fullTextUrlList.fullTextUrl"
      url_availability_key:  "availabilityCode"
      url_availability_open: [OA, F]         # OA = Open access; F = Free (neither means "is the VoR")
      url_value:             "url"
      url_style:             "documentStyle" # html / pdf / doi
      # ---- THE NIH-AUTHOR-MANUSCRIPT TELLS -------------------------------------------------------
      # EPMC states these plainly, and they are exactly the "NIH accepted manuscript mistaken for the
      # publisher VoR" silent failure. Recorded as version_hint OBSERVATIONS on the candidate — they
      # decide NOTHING (V9 P0: a repository label is not a fact about bytes). The VERSION VERDICT is
      # derived from the fetched front matter by provenance.derive_expression_kind.
      auth_man:         "authMan"            # "Y"/"N"
      nih_auth_man:     "nihAuthMan"         # "Y"/"N"
      epmc_auth_man:    "epmcAuthMan"        # "Y"/"N"

  - adapter_id: pmc
    evidence_roles: [resolve.identity, resolve.locations, fetch.oa_fulltext]
    document_types: [journal_version, accepted_manuscript]
    jurisdiction_coverage: [ANY]
    query_dialects: [pmc_id]
    identifier_types: [doi, pmcid, pmid]
    version_resolvers: [pmc_oai_jats, pmc_oa_service]
    # PMC OAI allows AT MOST 3 req/s and NO CONCURRENT REQUESTS. `min_spacing_s: 0.34` is that 3/s
    # ceiling and `max_in_flight: 1` is the no-concurrency rule; BOTH are read and enforced by
    # scripts/host_scheduler.py (Sol §7), cross-process, under an flock — not by the adapter. Register
    # tool+email (NCBI usage guidance): `tool` and `email` are threaded into every ID-converter call.
    rate_policy: {host: pmc.ncbi.nlm.nih.gov, min_spacing_s: 0.34, max_in_flight: 1,
                  needs_key: false, pool: public, tool: polaris}
    coverage_note: >-
      PubMed Central, as a FULL-TEXT route: DOI/PMID -> PMCID (ID converter, batched) -> JATS via the
      OAI GetRecord -> PDF/tarball links via the OA service. A PMCID DOES NOT GUARANTEE DOWNLOADABLE OA
      FULL TEXT, and this is not a theoretical caveat: PMC13200213 has a PMCID, and the OA service
      answers `idDoesNotExist` while the OAI answers `cannotDisseminateFormat` — it is an NIH author
      manuscript outside the OA subset. Neither answer is "no document exists"; both are observations
      about PMC's OA subset, and the reducer must never collapse them into an evidence gap.
    endpoints:
      # ---- HOP 1: ID CONVERSION (DOI/PMID -> PMCID), BATCHED --------------------------------------
      # The legacy /pmc/utils/idconv/v1.0/ path 302-redirects here. We name the CANONICAL host, because
      # a redirect charges the WRONG host in the politeness budget and hides the real endpoint.
      id_convert: "https://pmc.ncbi.nlm.nih.gov/tools/idconv/api/v1/articles/?tool={tool}&email={mailto}&format=json&ids={ids}"
      # ---- HOP 2: THE DOCUMENT (JATS full text) ---------------------------------------------------
      # The configured www.ncbi.nlm.nih.gov/pmc/oai/oai.cgi 301s here; pmc.ncbi.nlm.nih.gov/oai/oai.cgi
      # is a 404 that returns FORTY-EIGHT KILOBYTES OF HTML with a <body> tag in it. A route that
      # believed "<body> is present" would have called that error page a full-text document. Proven
      # live 2026-07-14: this URL returns 108,635 bytes of JATS with 17 <sec> for PMC12754963.
      oai_getrecord: "https://pmc.ncbi.nlm.nih.gov/api/oai/v1/mh/?verb=GetRecord&identifier={oai_identifier}&metadataPrefix={metadata_prefix}"
      # ---- HOP 3: THE OA SERVICE (PDF / tarball links) --------------------------------------------
      oa_service: "https://www.ncbi.nlm.nih.gov/pmc/utils/oa/oa.fcgi?id={pmcid}"
    identifier_transforms:
      # A TINY DECLARED VOCABULARY, evaluated by routes_bio._transform. Adding a repository whose OAI
      # identifier is shaped differently is A ROW HERE, not a function.
      # strip_prefix:<source_field>:<prefix> — the SOURCE FIELD IS NAMED. It is not inferred from the
      # output's name: a transform that guesses its own input returns '' when it guesses wrong, and an
      # empty identifier becomes `?identifier=&metadataPrefix=` — a 400 that reads exactly like PMC
      # refusing us. It did. See routes_bio._transform.
      pmcid_numeric:  "strip_prefix:pmcid:PMC"                    # PMC12754963 -> 12754963
      oai_identifier: "format:oai:pubmedcentral.nih.gov:{pmcid_numeric}"
    metadata_prefix: pmc                     # `pmc` = full-text JATS. `oai_dc` is metadata only.
    batch:
      id_convert_max_ids: 200                # the ID converter documents a 200-id ceiling
    selectors:
      # -- ID converter
      id_records:        "records"
      id_record_pmcid:   "pmcid"
      id_record_pmid:    "pmid"
      id_record_doi:     "doi"
      # A PER-RECORD ERROR INSIDE AN HTTP 200. The transport RESPONDED; this record did not resolve.
      # Live: {"status":"error","errmsg":"Identifier not found in PMC"} for 3 of our 4 probe DOIs. That
      # is a fact about PMC'S INDEX, and the ledger must keep it distinct from a 429 and from a gap.
      id_record_error:   "status"            # "error" when the id did not resolve
      id_record_errmsg:  "errmsg"
      # -- OA service (XML)
      oa_error_code:     "error/@code"       # idDoesNotExist | idIsNotOpenAccess  -> OBSERVATIONS
      oa_links:          "records/record/link"
      oa_link_format:    "@format"           # pdf | tgz
      oa_link_href:      "@href"             # NOTE: an ftp:// URL. Recorded as a candidate; the
      #                                      # executor fetches http(s) only, so the tarball stays a
      #                                      # LEAD rather than being silently dropped.
      oa_license:        "records/record/@license"
      oa_retracted:      "records/record/@retracted"
      # -- OAI GetRecord (JATS)
      oai_error_code:    "error/@code"       # cannotDisseminateFormat | idDoesNotExist
      jats_article:      "GetRecord/record/metadata/article"

  - adapter_id: core
    evidence_roles: [discover.index, fetch.oa_fulltext, resolve.locations]
    document_types: [journal_version, accepted_manuscript, preprint, working_paper]
    jurisdiction_coverage: [ANY]
    query_dialects: [core_v3_query]
    identifier_types: [doi, core_id]
    version_resolvers: [core_fulltext_links]
    rate_policy: {host: api.core.ac.uk, min_spacing_s: 2.0, needs_key: true, key_env: CORE_API_KEY, pool: keyed}
    coverage_note: >-
      Aggregates 200M+ full texts from institutional & subject REPOSITORIES — the channel most likely to
      hold a readable copy when the publisher blocks us. Needs a free API key (rate_policy.needs_key).
      ** THE CONFIGURED CREDENTIAL RETURNS 401 (probed live, 2026-07-14). ** That is a fact about OUR
      KEY. The route is UNAVAILABLE and the literature is UNEXAMINED — `routes_repo.preflight()` refuses
      to run it, and a refused route can never be read as "no OA copy exists".
    endpoints:
      search: "https://api.core.ac.uk/v3/search/works?q={query}&limit={limit}"
    resolver:
      kind: json_api
      auth:
        scheme: bearer            # Authorization: Bearer <key>
        key_env: CORE_API_KEY
        required: true            # no key / rejected key -> UNAVAILABLE, never an absence
      queries:
        - {id: doi_exact, accepts: doi, q: 'doi:"{doi}"',
           url: "https://api.core.ac.uk/v3/search/works?q={q}&limit={limit}"}
      records: "results[]"
      # Which record is the work we ASKED for. A wrong-DOI record is dropped here, before it can
      # become a candidate — CORE's index is an aggregate and a DOI query can surface a citing work.
      identity:
        doi_paths: [doi, identifiers.doi, "identifiers[].doi"]
        title_path: title
      # ONE ROW PER CANDIDATE-BEARING FIELD. `fullText` is DERIVED TEXT (Sol V9 §2: "Treat a returned
      # `fullText` field as a derived text manifestation, NOT automatically as a complete PDF
      # equivalent") — so it carries its own media_hint and can never be scored as publisher bytes.
      selectors:
        - {path: downloadUrl,          media_hint: document,     origin: record_download}
        - {path: "links[].url",        media_hint: document,     origin: record_link,
           where: {type: download}}
        - {path: "sourceFulltextUrls[]", media_hint: document,   origin: repository_fulltext}
        - {path: fullText,             media_hint: derived_text, origin: api_extracted_text,
           inline: true}   # the text arrives IN the metadata: the executor reads it from the blob
      # The OAI identifiers CORE exposes are the SEED of the institutional OAI-PMH lane (Sol V9 §2:
      # "Obtain the OAI identifier and repository base URL through CORE"). Observation, not a fetch.
      oai_id_paths: [oaiIds, "dataProviders[].id"]
      version_hint_paths: [documentType, "repositoryDocument.pdfStatus"]
      license_paths: [license]
      rate:
        min_spacing_s: 2.0
        headers: [x-ratelimit-limit, x-ratelimit-remaining, x-ratelimit-reset, retry-after]

  - adapter_id: openaire
    evidence_roles: [discover.index, resolve.locations, evidence.dataset]
    document_types: [journal_version, accepted_manuscript, preprint, working_paper, dataset]
    jurisdiction_coverage: [ANY]
    query_dialects: [openaire_graph_v3]
    identifier_types: [doi, openaire_id, handle]
    version_resolvers: [openaire_instances]
    rate_policy: {host: api.openaire.eu, min_spacing_s: 1.5, needs_key: false, pool: public}
    coverage_note: >-
      Cross-repository graph (publications + datasets + software) with per-record access INSTANCES.
      Strong for European repository copies and for linking a work to its underlying data. Its URLs are
      CANDIDATES: OpenAIRE metadata is NOT document proof, and an `accessRight: OPEN` label sits on
      records whose only URL is a doi.org landing page (observed live).
    endpoints:
      # THE LEGACY ENDPOINT WAS `/search/publications?keywords=` (Sol V9 §2: "replace the legacy
      # endpoint in the YAML with the Graph v3 operation"). It is a keyword search — the wrong shape for
      # a lane that must resolve an EXACT identifier, and lexical matching is how a query for one DOI
      # comes home with somebody else's paper. Graph v3 resolves `?pid=<doi>` exactly.
      search: "https://api.openaire.eu/graph/v3/research-products?pid={doi}"
    resolver:
      kind: json_api
      auth:
        scheme: bearer
        key_env: OPENAIRE_TOKEN
        required: false           # runs unauthenticated at the lower budget; a token only RAISES it
      queries:
        - {id: pid_exact, accepts: doi, q: "{doi}",
           url: "https://api.openaire.eu/graph/v3/research-products?pid={q}&pageSize={limit}"}
      records: "results[]"
      identity:
        doi_paths: ["pids[].value", "instances[].pids[].value"]
        title_path: mainTitle
      # An INSTANCE is a claimed location. Several instances routinely name the SAME file (Sol's named
      # silent failure), so candidates are deduplicated on the URL by the generic emitter.
      selectors:
        - {path: "instances[].urls[]", media_hint: from_url, origin: graph_instance}
      version_hint_paths: ["instances[].refereed", "instances[].type", version]
      license_paths: ["instances[].license", "instances[].accessRight.label",
                      "instances[].accessRight.openAccessRoute"]
      rate:
        # Sol V9 §2: 60/hr unauthenticated, 7,200/hr authenticated. §7: an OBSERVED limit may only
        # REDUCE the configured rate — so the `x-ratelimit-limit: 7199` this endpoint returns to an
        # UNAUTHENTICATED caller (observed live, 2026-07-14) does NOT raise us to 7,199/hr.
        per_hour_unauthenticated: 60
        per_hour_authenticated: 7200
        min_spacing_s: 1.5
        headers: [x-ratelimit-limit, x-ratelimit-used, x-ratelimit-remaining, retry-after]

  - adapter_id: zenodo
    evidence_roles: [fetch.oa_fulltext, evidence.dataset, resolve.locations]
    document_types: [preprint, working_paper, dataset, accepted_manuscript]
    jurisdiction_coverage: [ANY]
    query_dialects: [zenodo_query]
    identifier_types: [doi, zenodo_id]
    version_resolvers: [zenodo_versions]   # concept-DOI -> version DOIs
    rate_policy: {host: zenodo.org, min_spacing_s: 1.5, needs_key: false, pool: public}
    coverage_note: >-
      CERN OA repository — deposited manuscripts, datasets and software, with explicit version DOIs.
      A discovery + fetch target, NOT a peer-review signal. Its artifact type is EXPLICIT and stays
      explicit: a dataset, a slide deck or a supplement is not an article, however complete its bytes.
    endpoints:
      search: "https://zenodo.org/api/records?q={q}&size={limit}"
    resolver:
      kind: json_api
      auth: {scheme: none, required: false}
      # THREE FIELDED PROBES. Never an unfielded one: `q="10.5281/zenodo.1215934"` (bare) returns
      # 5,723,169 hits — a match on any word of the string — and the first of them is a dataset that has
      # nothing to do with the DOI. An unfielded query is a false-positive generator, so the code
      # REFUSES a query form with no field prefix.
      # `match.kind` names WHICH of the three generic identity primitives proves the record is about the
      # identifier we asked for: it IS that id (self_identifier), it is an ALIAS of it (alias_identifier),
      # or it merely RELATES to it (relation — and then the whitelist rules).
      queries:
        - {id: doi_exact,   accepts: doi, q: 'doi:"{doi}"',
           url: "https://zenodo.org/api/records?q={q}&size={limit}",
           match: {kind: self_identifier}}
        # A CONCEPT DOI IS NOT FOUND BY `doi:` (observed live: 0 hits for the concept DOI of a record
        # that exists). It needs its own field — and what comes back is a DIFFERENT DOI, the version's.
        # `alias_identifier` is what forces that substitution onto the candidate as an observation
        # instead of letting the concept DOI quietly stand as the version's identity.
        - {id: concept_doi, accepts: doi, q: 'conceptdoi:"{doi}"',
           url: "https://zenodo.org/api/records?q={q}&size={limit}",
           match: {kind: alias_identifier, alias_path: conceptdoi, self_path: doi}}
        # The relation probe finds a deposit that IS the work. It also finds every deposit that merely
        # CITES the work — see `relations.identity` below, which is the only thing standing between us
        # and filing somebody's training slides as the AlphaFold paper.
        - {id: related_id,  accepts: doi, q: 'related.identifier:"{doi}"',
           url: "https://zenodo.org/api/records?q={q}&size={limit}",
           match: {kind: relation, list_path: "metadata.related_identifiers[]",
                   id_field: identifier, rel_field: relation}}
      records: "hits.hits[]"
      identity:
        # ** THE RECORD'S OWN IDENTIFIER. NOTHING ELSE. **
        # This list read `[doi, conceptdoi, metadata.related_identifiers[].identifier]` and the
        # adversary killed it: `related_identifiers` is where a deposit names the works it CITES, so
        # including it here made "the record IS this work" true of every record that so much as
        # mentions it — reintroducing the citing-deposit trap through the identity door after the
        # relation whitelist had shut the relation door. `conceptdoi` had to go too: with it here, a
        # concept-DOI query matched as a plain self-identity and the version-substitution observation
        # was never written. Each query form now has exactly ONE identity semantic, and they are not
        # allowed to lend each other their evidence.
        doi_paths: [doi]
        title_path: metadata.title
      # ── THE RELATION WHITELIST ────────────────────────────────────────────────────────────────────
      # Sol's silent failure "the DOI belongs to a cited reference", live: a `related.identifier` query
      # for the AlphaFold DOI (10.1038/s41586-021-03819-2) returns zenodo.7865494 — a training-materials
      # deposit whose relation to it is `cites`, and whose files are "Event metadata.pdf" and "Index of
      # training materials.pdf". Admitting it would file those two PDFs as the AlphaFold paper.
      # Only a relation that asserts the record IS the work may generate a candidate.
      relations:
        identity: [isidenticalto, isversionof, isnewversionof, ispreviousversionof, isvariantformof]
        # everything else (cites, references, iscitedby, haspart, ispartof, issupplementto,
        # issupplementedby, documents, compiles, ...) means the deposit is ABOUT the work, not the work.
      # ── ARTIFACT TYPE STAYS EXPLICIT ──────────────────────────────────────────────────────────────
      # `metadata.resource_type.type` (+ `.subtype`). The map does not GRANT article-hood: it records
      # what the depositor declared, and the reducer judges the bytes. `article: true` marks the only
      # declarations that can fill an ARTICLE role at all.
      artifact_types:
        path: metadata.resource_type
        article_declarations: ["publication/article", "publication/preprint",
                               "publication/workingpaper", "publication/report",
                               "publication/conferencepaper", "publication/thesis"]
      # ── ONE CANDIDATE PER FILE. NEVER A CONCATENATION. ───────────────────────────────────────────
      # Sol: "multiple files are concatenated into a fictitious document." A record's files are separate
      # artifacts — a manuscript, its appendix, a slide deck, a README — and joining them manufactures a
      # document that does not exist and never existed. Each file is its own candidate, with its own
      # bytes, its own hash and its own reducer verdict.
      selectors:
        - {path: "files[]", media_hint: from_filename, origin: record_file,
           url_field: links.self, name_field: key, size_field: size, checksum_field: checksum}
      access_paths: [metadata.access_right, access]     # restricted -> metadata, no bytes
      version_hint_paths: [metadata.version, revision, "metadata.resource_type.subtype"]
      license_paths: ["metadata.license.id", "metadata.license"]
      rate:
        # Observed live: x-ratelimit-limit 30 (per minute), with -remaining and -reset. Obey them.
        min_spacing_s: 1.5
        headers: [x-ratelimit-limit, x-ratelimit-remaining, x-ratelimit-reset, retry-after]

  - adapter_id: hal
    evidence_roles: [fetch.oa_fulltext, resolve.locations]
    document_types: [accepted_manuscript, preprint, working_paper, journal_version]
    jurisdiction_coverage: [ANY, FR]
    query_dialects: [hal_solr]
    identifier_types: [doi, hal_id]
    version_resolvers: [hal_versions]
    rate_policy: {host: api.archives-ouvertes.fr, min_spacing_s: 1.5, needs_key: false, pool: public}
    coverage_note: >-
      French national open archive — strong for European (esp. francophone) accepted manuscripts and
      working papers that are otherwise paywalled at the publisher.
    endpoints:
      search: "https://api.archives-ouvertes.fr/search/?q={query}&rows={limit}&wt=json"

  - adapter_id: datacite
    evidence_roles: [resolve.identity, evidence.dataset]
    document_types: [dataset, preprint, working_paper]
    jurisdiction_coverage: [ANY]
    query_dialects: [datacite_query]
    identifier_types: [doi]
    version_resolvers: [datacite_related_identifiers]   # IsVersionOf / IsSupplementTo edges
    rate_policy: {host: api.datacite.org, min_spacing_s: 1.5, needs_key: false, pool: public}
    coverage_note: >-
      DOI identity + relations for DATASETS and repository deposits (the Crossref of research data).
      Identity/relations only — never a full-text source.
    endpoints:
      search: "https://api.datacite.org/dois?query={query}&page[size]={limit}"

  # ============================ SEPARATE-WORK + PREPRINT DISCOVERY (field-scoped) ====================
  # These supply a DIFFERENT WORK from the journal Version of Record (peer review changes the numbers —
  # Acemoglu-Restrepo is 0.37pp in NBER WP 23285 and 0.2pp in the published JPE). They FIRE for
  # discovery and version pursuit whenever the plan's field vocabulary calls for them; whether their
  # output is CITABLE is decided separately by the plan's source_policy over document_types.

  - adapter_id: arxiv
    # NOT a backbone index: arXiv is a PREPRINT server, so it fires only when the plan's field
    # vocabulary calls for general/CS/physics/math preprints — never as a universal scholarly index
    # (the field-agnostic indices openalex/doaj/core/openaire/europe_pmc cover discover.index). This is
    # what keeps a clinical or legal plan from acquiring an AI-preprint channel it never asked for.
    evidence_roles: [evidence.preprint.general]
    document_types: [preprint]
    jurisdiction_coverage: [ANY]
    query_dialects: [arxiv_query]
    identifier_types: [arxiv_id, doi]
    version_resolvers: [arxiv_versions]   # v1/v2...; pair with crossref_relations to reach the VoR
    rate_policy: {host: export.arxiv.org, min_spacing_s: 3.0, needs_key: false, pool: public}
    coverage_note: >-
      CS / physics / math / quant preprints, full-text PDF. A SEPARATE WORK from any later journal
      version; admissible as a citation only when policy permits a preprint expression.
    endpoints:
      search: "http://export.arxiv.org/api/query?search_query=all:{query}&max_results={limit}"

  - adapter_id: medrxiv
    # Preprint-specific, not a general DOI resolver (that is crossref/openalex/datacite). It fires only
    # on the biomedical-preprint role; its published-DOI resolver is a version-pursuit capability used
    # WHEN it fires, declared in version_resolvers — not a reason to fire on every plan.
    evidence_roles: [evidence.preprint.biomedical]
    document_types: [preprint]
    jurisdiction_coverage: [ANY]
    query_dialects: [biorxiv_detail]
    identifier_types: [doi]
    version_resolvers: [biorxiv_published_doi]   # detail record carries the published-DOI link
    rate_policy: {host: api.biorxiv.org, min_spacing_s: 2.0, needs_key: false, pool: public}
    coverage_note: >-
      Health-sciences preprints. Topical discovery runs through openalex/crossref filtered to the
      medRxiv server (discovery_via); this route resolves a preprint DOI to its published version.
    discovery_via: [openalex, crossref]
    endpoints:
      identity: "https://api.biorxiv.org/details/medrxiv/{doi}"

  - adapter_id: biorxiv
    evidence_roles: [evidence.preprint.biomedical]
    document_types: [preprint]
    jurisdiction_coverage: [ANY]
    query_dialects: [biorxiv_detail]
    identifier_types: [doi]
    version_resolvers: [biorxiv_published_doi]
    rate_policy: {host: api.biorxiv.org, min_spacing_s: 2.0, needs_key: false, pool: public}
    coverage_note: "Life-sciences preprints; same pattern as medRxiv (discovery_via openalex/crossref)."
    discovery_via: [openalex, crossref]
    endpoints:
      identity: "https://api.biorxiv.org/details/biorxiv/{doi}"

  - adapter_id: nber
    evidence_roles: [evidence.working_paper.economics]
    document_types: [working_paper]
    jurisdiction_coverage: [ANY]
    query_dialects: [repec_resolver]
    identifier_types: [doi, nber_wp_id]
    version_resolvers: [crossref_relations]   # NBER WP -> published journal DOI via Crossref relations
    rate_policy: {host: www.nber.org, min_spacing_s: 3.0, needs_key: false, pool: public}
    coverage_note: >-
      National Bureau of Economic Research working papers — a PRIMARY economics channel and a SEPARATE
      work from the journal version. MUST NOT fire for a clinical or legal plan (no economics tokens ->
      role not required -> route not covered). Topical discovery via RePEc/OpenAlex/Crossref.
    discovery_via: [openalex, crossref]
    endpoints:
      landing: "https://www.nber.org/papers/w{nber_wp_id}"

  - adapter_id: iza
    evidence_roles: [evidence.working_paper.economics]
    document_types: [working_paper]
    jurisdiction_coverage: [ANY]
    query_dialects: [repec_resolver]
    identifier_types: [doi, iza_dp_id]
    version_resolvers: [crossref_relations]
    rate_policy: {host: www.iza.org, min_spacing_s: 3.0, needs_key: false, pool: public}
    coverage_note: "IZA Institute of Labor Economics discussion papers. Economics working-paper channel; discovery via RePEc/OpenAlex."
    discovery_via: [openalex, crossref]
    endpoints: {}

  - adapter_id: repec
    # RePEc/IDEAS is the ECONOMICS index, not a general one — so it is gated behind the economics
    # working-paper role, never the universal discover.index backbone. A clinical plan must not reach
    # it (the canary in source_router.py checks exactly this).
    evidence_roles: [evidence.working_paper.economics]
    document_types: [working_paper, journal_version]
    jurisdiction_coverage: [ANY]
    query_dialects: [repec_query]
    identifier_types: [repec_handle, doi]
    version_resolvers: [repec_relations]
    rate_policy: {host: ideas.repec.org, min_spacing_s: 3.0, needs_key: false, pool: public}
    coverage_note: >-
      RePEc / IDEAS — the union index over economics working papers (NBER, IZA, CEPR, Fed series) and
      journals. The economics discovery backbone that keeps this domain a DATA row, not a code branch.
    endpoints:
      search: "https://ideas.repec.org/cgi-bin/htsearch?q={query}"

  - adapter_id: ssrn
    evidence_roles: [evidence.working_paper.social_legal]
    document_types: [preprint, working_paper]
    jurisdiction_coverage: [ANY]
    query_dialects: [crossref_filter]
    identifier_types: [doi, ssrn_id]
    version_resolvers: [crossref_relations]
    rate_policy: {host: papers.ssrn.com, min_spacing_s: 3.0, needs_key: false, pool: public}
    coverage_note: >-
      Social Science Research Network — law + economics + policy scholarship (DOI prefix 10.2139).
      Separate-work discovery via Crossref/OpenAlex; the SSRN site itself is not an open API.
    discovery_via: [crossref, openalex]
    endpoints: {}

  # ============================ CLINICAL PRIMARY ====================================================

  - adapter_id: clinicaltrials_gov
    evidence_roles: [evidence.trial_registration]
    document_types: [registry_record]
    jurisdiction_coverage: [ANY, US]
    query_dialects: [ctgov_v2]
    identifier_types: [nct_id]
    version_resolvers: []
    rate_policy: {host: clinicaltrials.gov, min_spacing_s: 1.5, needs_key: false, pool: public}
    coverage_note: >-
      ClinicalTrials.gov v2 API — prospective trial registrations and posted results. A registry record
      is a COMPLETE artifact at its own length (provenance stub_floor=None), never judged by an article's
      word count.
    endpoints:
      search: "https://clinicaltrials.gov/api/v2/studies?query.term={query}&pageSize={limit}"

  - adapter_id: clinical_guidelines
    evidence_roles: [evidence.clinical_guideline]
