    rate_policy: {host: www.courtlistener.com, min_spacing_s: 2.0, needs_key: false, key_env: COURTLISTENER_TOKEN, pool: token_optional}
    coverage_note: >-
      Free Law Project — US federal & state judicial opinions (the case-law primary source). A judicial
      opinion is a finding-bearing document with NO effect size; its evidence is a doctrinal holding.
    endpoints:
      search: "https://www.courtlistener.com/api/rest/v4/search/?q={query}&type=o"

  - adapter_id: govinfo
    evidence_roles: [evidence.statute_regulation, evidence.case_law, evidence.regulatory_guidance]
    document_types: [official_text]
    jurisdiction_coverage: [US]
    query_dialects: [govinfo_search]
    identifier_types: [us_code_cite, cfr_cite, package_id]
    version_resolvers: []
    rate_policy: {host: api.govinfo.gov, min_spacing_s: 2.0, needs_key: true, key_env: GOVINFO_API_KEY, pool: keyed}
    coverage_note: >-
      GovInfo (US GPO) — statutes (USC), regulations (CFR/Federal Register), federal court opinions.
      The authoritative US federal legal text. Needs a free api.data.gov key.
    endpoints:
      search: "https://api.govinfo.gov/search?api_key={key}"

  - adapter_id: eurlex
    evidence_roles: [evidence.statute_regulation, evidence.case_law, evidence.regulatory_guidance]
    document_types: [official_text]
    jurisdiction_coverage: [EU]
    query_dialects: [eurlex_cellar]
    identifier_types: [celex, ecli]
    version_resolvers: []
    rate_policy: {host: eur-lex.europa.eu, min_spacing_s: 2.0, needs_key: false, pool: public}
    coverage_note: >-
      EUR-Lex — EU treaties, regulations, directives and CJEU case law by CELEX/ECLI. Fires only for an
      EU-scoped (or jurisdiction-unspecified) legal plan; a US-only legal plan does NOT reach it.
    endpoints:
      search: "https://eur-lex.europa.eu/search.html?text={query}"

  - adapter_id: official_legal_scoped
    evidence_roles: [evidence.statute_regulation, evidence.case_law, evidence.regulatory_guidance]
    document_types: [official_text]
    jurisdiction_coverage: [US, CA, GB, EU, AU, JP]
    query_dialects: [site_scoped]
    identifier_types: [url]
    version_resolvers: []
    rate_policy: {host: scoped, min_spacing_s: 2.0, needs_key: false, pool: public}
    coverage_note: >-
      Catch-all for official statute/court/regulator hosts per jurisdiction (legislation.gov.uk,
      canlii.org, austlii.edu.au, courts.go.jp, ...). The host set is DATA in
      config/discovery/jurisdiction_scopes.yaml — adding a jurisdiction is a row THERE, not code here.
    scope_ref: {file: config/discovery/jurisdiction_scopes.yaml, need: legal}
    endpoints: {}

  # ============================ STANDARDS / REGULATORY (cross-jurisdiction) ==========================

  - adapter_id: standards_bodies
    evidence_roles: [evidence.standard]
    document_types: [official_text]
    jurisdiction_coverage: [ANY]
    query_dialects: [site_scoped]
    identifier_types: [standard_id, url]
    version_resolvers: []
    rate_policy: {host: www.iso.org, min_spacing_s: 2.0, needs_key: false, pool: public}
    coverage_note: >-
      ISO / IEC / IEEE / ITU / IETF normative specifications. Cross-jurisdiction (INTL) standards bodies
      resolved from jurisdiction_scopes.yaml INTL block.
    scope_ref: {file: config/discovery/jurisdiction_scopes.yaml, need: standards}
    endpoints: {}

# ═══════════════════════════════════════════════════════════════════════════════════════════════════
# HOST BUDGETS — Sol V9 §7. THE SCHEDULER READS ITS LIMITS FROM HERE AND NOWHERE ELSE.
#
# `routes[*].rate_policy` above already budgets the RESOLVER/INDEX hosts. These two blocks budget the
# other two kinds of host, and they exist because the scheduler is keyed by HOST, not by adapter:
#
#   default_host_policy   what an UNKNOWN host gets. It is the STRICTEST row in this file, on purpose:
#                         a host we have never met is a host whose limits we do not know, and the
#                         direction to be wrong in is SLOW.
#   host_policies         CONTENT hosts. A publisher that serves us a PDF is a backend — it can 403 us
#                         and it can throttle us — and until now nothing in the table budgeted it at
#                         all, because it is nobody's `adapter_id`. www.aeaweb.org 403'd us all night
#                         and had no row anywhere.
#
# Columns: host, min_spacing_s, max_concurrency, burst, breaker_threshold/window/cooldown.
# DYNAMIC LIMITS MAY ONLY REDUCE THESE (scripts/host_scheduler.py:_spacing) — a server header can slow
# us down and can never speed us up.
# ═══════════════════════════════════════════════════════════════════════════════════════════════════

default_host_policy:
  min_spacing_s: 2.0
  max_concurrency: 1
  burst: 1
  breaker_threshold: 6          # FAILED LOGICAL REQUESTS (a 4-attempt retry that 429s is ONE)
  breaker_window_s: 300
  breaker_cooldown_s: 300       # doubles per consecutive trip, capped at one hour

host_policies:
  # -- PMC / NCBI. Their published ceiling is 3 req/s with NO concurrent requests, and large harvests
  #    are asked to run off-peak. We take 1 req/s and one in flight: we are not the only tenant.
  - {host: pmc.ncbi.nlm.nih.gov,  min_spacing_s: 1.0, max_concurrency: 1, burst: 1}
  - {host: eutils.ncbi.nlm.nih.gov, min_spacing_s: 1.0, max_concurrency: 1, burst: 1}
  # -- content hosts we have actually been refused by. A row here does not buy access; it buys ORDER.
  - {host: www.aeaweb.org,   min_spacing_s: 3.0, max_concurrency: 1, breaker_threshold: 3}
  - {host: www.nber.org,     min_spacing_s: 3.0, max_concurrency: 1}
  - {host: www.jstor.org,    min_spacing_s: 5.0, max_concurrency: 1, breaker_threshold: 2}
  - {host: linkinghub.elsevier.com, min_spacing_s: 5.0, max_concurrency: 1, breaker_threshold: 2}
  - {host: www.sciencedirect.com,   min_spacing_s: 5.0, max_concurrency: 1, breaker_threshold: 2}
  - {host: onlinelibrary.wiley.com, min_spacing_s: 5.0, max_concurrency: 1, breaker_threshold: 2}
  - {host: doi.org,          min_spacing_s: 1.0, max_concurrency: 2, burst: 2}
  - {host: europepmc.org,    min_spacing_s: 1.0, max_concurrency: 1}
  - {host: core.ac.uk,       min_spacing_s: 2.0, max_concurrency: 1}
  - {host: arxiv.org,        min_spacing_s: 3.0, max_concurrency: 1}
  - {host: ora.ox.ac.uk,     min_spacing_s: 2.0, max_concurrency: 1}

# ═══════════════════════════════════════════════════════════════════════════════════════════════════
# OAI-PMH REPOSITORIES — Sol V9 §2, "EACH REPOSITORY IS A DATA ROW".
#
# WHAT THIS TABLE IS NOT: a plan to harvest the world's repositories. Sol is explicit — "Do NOT attempt
# global per-work OAI harvesting." OAI-PMH HAS NO EXACT-DOI LOOKUP. The only thing it answers well is
# `GetRecord(identifier, metadataPrefix)`, and we get the identifier from somewhere else: CORE's
# `oaiIds`, OpenAIRE's `originalId`, a repository's own metadata, or the local DOI->OAI index we build
# as we go (outputs/oai_index/doi_to_oai.jsonl).
#
# `metadata_prefixes` IS ORDERED, RICHEST FIRST, AND THE ORDER IS THE WHOLE DEFENCE. oai_dc's
# <dc:identifier> is usually A LANDING PAGE. JATS/METS/MODS/OAI-ORE expose actual FILE URLs. Asking for
# oai_dc and taking its first http link as "the PDF" is the documented silent failure — you get an HTML
# splash page, it strips to 500 words of navigation chrome, and the reducer has to catch what the
# adapter should never have proposed.
#
# Columns:
#   repository_id       stable id; also the acquisition `adapter` name (oai:<repository_id>)
#   base_url            the OAI-PMH endpoint
#   metadata_prefixes   ORDERED, richest first
#   identifier_pattern  how to build an OAI identifier from an id we hold ({pmcid_numeric}, {handle}, ...)
#   identifier_from     which identifier type feeds the pattern (empty => the OAI id must come from
#                       CORE/OpenAIRE/local index; there is no way to construct it from a DOI)
#   file_selectors      which metadata elements may carry a DOCUMENT url, by dialect
#   rate_policy         host budget (read by host_scheduler.load_policies)
# ═══════════════════════════════════════════════════════════════════════════════════════════════════

oai_repositories:
  - repository_id: pmc
    # THE BASE URL IS THE ONE PROVEN LIVE (2026-07-14), not the one in the docs. `.../oai/oai.cgi` is a
    # 404 THAT RETURNS FORTY-EIGHT KILOBYTES OF HTML WITH A <body> TAG IN IT — an adapter that trusted
    # HTTP 200-shaped bytes would have filed that error page as a document. The endpoint below returned
    # 108,635 bytes of real JATS for PMC12754963. (Same URL as routes[pmc].endpoints.oai_getrecord.)
    base_url: "https://pmc.ncbi.nlm.nih.gov/api/oai/v1/mh/"
    metadata_prefixes: [pmc, oai_dc]
    identifier_pattern: "oai:pubmedcentral.nih.gov:{pmcid_numeric}"
    identifier_from: pmcid
    identifier_transforms: {pmcid_numeric: "strip_prefix:PMC"}
    file_selectors: [jats_self_uri]
    rate_policy: {host: pmc.ncbi.nlm.nih.gov, min_spacing_s: 1.0, max_concurrency: 1}
    coverage_note: >-
      The ONE repository whose OAI identifier we can CONSTRUCT (from a PMCID). Everything else in this
      table needs its identifier handed to it. `metadataPrefix=pmc` returns JATS; oai_dc returns a
      landing page. A PMCID does not guarantee OA full text — PMC13200213 has a PMCID and the OAI
      answers `cannotDisseminateFormat`. That is a fact about PMC'S OA SUBSET, not about the world.

  - repository_id: zenodo
    base_url: "https://zenodo.org/oai2d"
    metadata_prefixes: [oai_datacite, datacite, oai_dc]
    identifier_pattern: "oai:zenodo.org:{record_id}"
    identifier_from: zenodo_id
    file_selectors: [datacite_alternate_identifier, ore_aggregated_resource]
    rate_policy: {host: zenodo.org, min_spacing_s: 1.5, max_concurrency: 1}
    coverage_note: >-
      Deposits, not peer review. A dataset or a supplement carrying a DOI is not the article, and the
      resource type must stay explicit — "it has a DOI" is not "it is the paper".

  - repository_id: hal
    base_url: "https://api.archives-ouvertes.fr/oai/hal/"
    metadata_prefixes: [xml-tei, oai_dc]
    identifier_pattern: "oai:HAL:{hal_id}"
    identifier_from: hal_id
    file_selectors: [tei_ref_target]
    rate_policy: {host: api.archives-ouvertes.fr, min_spacing_s: 1.5, max_concurrency: 1}
    coverage_note: >-
      French national archive. Its TEI carries a direct file <ref type="file" target="...">; its oai_dc
      does not. The accepted manuscript it holds is NOT the journal version (V9 P0).

  - repository_id: dspace_generic
    base_url: ""                       # filled in per repository from CORE/OpenAIRE `repository.oaiPmhUrl`
    metadata_prefixes: [mets, mods, oai_dc]
    identifier_pattern: ""             # DSpace ids are opaque — they MUST be handed to us
    identifier_from: ""
    file_selectors: [mets_flocat, mods_location_url]
    rate_policy: {host: "", min_spacing_s: 2.0, max_concurrency: 1}
    coverage_note: >-
      THE TEMPLATE ROW for the long tail (DSpace/EPrints institutional repositories). A concrete
      repository is DISCOVERED — CORE and OpenAIRE both return the repository's OAI base URL and the
      record's OAI identifier — and it is written here, or into the local index, as a NEW ROW. That is
      what "each repository is a data row" buys: the long tail costs YAML, not Python.
