# Fetch cited-content harness — labeled case set (I-deepfix-004 / Fable design 2026-07-09).
#
# Each case is a REAL, verified URL. `expect` is the class the oracle grades against:
#   article              — must return the cited article (breaking a good control FAILS the harness)
#   article_or_degrade   — real article text via recovery, or an honest degrade
#   recover_or_disclose  — real text via Zyte, or an honest refusal (never delivery chrome)
#   no_front_matter_span — must NOT adopt a cover/TOC/masthead/committee-list span
#   refused              — a hub/landing/error shell must be refused (not eligible)
#
# `contains` / `not_contains` are span fingerprints. They are stored ALREADY SQUASHED
# (NFKD -> strip marks -> casefold -> letters+digits only); the harness squashes again
# at load (idempotent). `contains` is ANY-match; `not_contains` is a banned-head list.
# `doi` / `group` feed the cross-work collision + distinct-group oracles.

cases:
  # ── A. Good controls — expect `article` (breaking these FAILS the harness) ──
  - name: good_arxiv_html
    ev: ev_752
    url: https://arxiv.org/html/2503.00079v1
    expect: article
    contains: [ailiteracy]

  - name: good_feds_note
    ev: ev_508
    url: https://www.federalreserve.gov/econres/notes/feds-notes/ai-adoption-and-firms-job-posting-behavior-20260327.html
    expect: article
    contains: [jobposting]

  - name: good_oa_pdf_nber
    ev: ev_023
    url: https://www.nber.org/system/files/working_papers/w31161/w31161.pdf
    expect: article
    contains: [generativeaiatwork, brynjolfsson]

  - name: good_oecd_fullreport
    ev: ev_590
    url: https://www.oecd.org/en/publications/oecd-employment-outlook-2023_08785bba-en/full-report/artificial-intelligence-and-the-labour-market-introduction_ea35d1c5.html
    expect: article
    contains: [broecke, employmentoutlook2023]

  # ── B. Combined-PDF w/ page anchor — expect `article` (B must RECOVER; degrade = FAIL) ──
  - name: dgpu_sport_managers
    ev: ev_664
    url: https://doi.org/10.58224/2658-5286-2026-9-2-203-210
    doi: 10.58224/2658-5286-2026-9-2-203-210
    group: dgpu_reb_9_2
    expect: article
    contains: [спортивныхменеджеров, волонтерск, карьерныхтраекторий]

  - name: dgpu_poultry
    ev: ev_700
    url: https://doi.org/10.58224/2658-5286-2026-9-2-87-95
    doi: 10.58224/2658-5286-2026-9-2-87-95
    group: dgpu_reb_9_2
    expect: article
    contains: [птицепродуктов, птицеводств]

  - name: ecsoc_parinov
    ev: ev_232
    url: https://doi.org/10.17323/1726-3247-2025-5-53-86
    doi: 10.17323/1726-3247-2025-5-53-86
    expect: article
    contains: [институциональн, паринов]
    not_contains: [социальныйпортреткластеров]

  # ── C. No-anchor multi-work containers — expect `no_front_matter_span` ──
  - name: dgpu_whole_issue
    url: https://doi.org/10.58224/2658-5286-2025-8-5
    doi: 10.58224/2658-5286-2025-8-5
