  - case_id: oos-12
    query: "Carbon capture and storage feasibility under various IPCC emission scenarios"
    expected_action: abstain
    reason: "Climate policy / environmental engineering. Outside current templates."

  - case_id: oos-13
    query: "Pharmacokinetics of warfarin in CYP2C9 polymorphism carriers"
    expected_action: abstain
    reason: "Pharmacogenomics / cardiology clinical question. Outside T2DM template; would need a separate clinical template."

  - case_id: oos-14
    query: "Best evidence on minimum-wage increases and small-business employment elasticity"
    expected_action: abstain
    reason: "Labor economics / policy. Outside Medicare drug-price template."
