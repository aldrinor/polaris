# =============================================================================
# DOMAIN NORMALIZATION (BUG-008 FIX)
# Maps mirror/archive domains to canonical domains
# =============================================================================

domain_normalization:
  # Mirror sites -> canonical
  "restoredcdc.org": "cdc.gov"
  "restored.cdc.gov": "cdc.gov"
  # Archive sites -> null (extract original URL)
  "web.archive.org": null
  "archive.org": null
