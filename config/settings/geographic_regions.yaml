# =============================================================================
# GEOGRAPHIC FILTERING SETTINGS
# =============================================================================

filtering:
  # Strictness levels
  strict: true                         # Require explicit regional match
  fuzzy_matching: true                 # Allow fuzzy geographic matching
  fuzzy_threshold: 0.80                # Similarity threshold for fuzzy

  # Content validation
  validate_geographic_claims: true     # Validate claims against region
  max_geographic_mismatch: 0.10        # Allow 10% geographic mismatch

  # Query modification
  add_regional_keywords: true          # Add region keywords to queries
  add_site_filters: true               # Add site: filters for region
  regional_query_boost: 1.5            # Boost regional results

# =============================================================================
# CROSS-REGIONAL HANDLING
# =============================================================================

cross_regional:
  # Allow cross-regional citations
  allow_global_sources: true           # Always allow GLOBAL sources
  allow_authoritative_sources: true    # Allow WHO, peer-reviewed regardless

  # Authority sources (always allowed)
  authority_domains:
    - "who.int"
    - "nih.gov"
    - "pubmed.ncbi.nlm.nih.gov"
    - "nature.com"
    - "sciencedirect.com"
    - "springer.com"
    - "wiley.com"

