# I-run11-007 (#1051): per-role OpenRouter provider routing — ranked HEALTHY chain.
# Generated by scripts/diagnostics/rank_openrouter_providers.py from live endpoint health.
# Ranking: status==0 + uptime_last_30m>=98.0 GATE, then sorted throughput p50 desc / latency p50 asc / uptime desc (stable-gated, fastest-first).
# Used with allow_fallbacks:false so off-list (flaky) providers are NEVER tried.
# Re-generate before a demo to refresh health. LAW VI: consumed as config, never inlined.
roles:
  generator:
    model: deepseek/deepseek-v4-pro
    # I-arch-003 (#1253, operator 2026-06-14): pin the fp8 FULL-CAP providers first so the generator gets the
    # MAX output budget (WandB/Parasail = 1,048,576; the rest >= 384,000). All fp8 (better than DeepInfra fp4,
    # which is excluded). Verified live: WandB + Parasail both serve deepseek-v4-pro @ max_tokens=384000,
    # finish=stop, valid content (2026-06-14). WandB first (also the reliable Judge provider); the prior
    # health-ranked chain stays as fallback. Parasail removed from `ignore`.
    order: [wandb, siliconflow, baidu, novita, streamlake, gmicloud, deepseek]
    # I-arch-003 (#1253) Codex gate P2: gmicloud reports max_completion_tokens=None on the
    # /endpoints API (no explicit completion cap -> bounded by context_length=1048576). Verified live
    # 2026-06-14: GMICloud serves deepseek-v4-pro at max_tokens=384000 cleanly (finish=stop), so it is
    # NOT a hidden low-cap that could 400 the 384000 generator budget. Kept in the fp8 chain.
    # Parasail RE-IGNORED 2026-06-14: live re-test returned "Provider returned error" 1/3 calls (flaky) —
    # confirms its original demotion. WandB leads (operator pick; 4/4 reliable, one 180s cold-start then warm);
    # the proven fp8 full-cap chain (>=384,000) backs it. DeepInfra (fp4/16384) stays excluded.
    ignore: [atlas-cloud, parasail, fireworks, digitalocean, together]
  mirror:
    model: z-ai/glm-5.1
    # I-ready-018 FIX-GLM (#1100): Parasail DEMOTED out of the Mirror chain. In the drb_72 paid run
    # GLM-5.1 returned blank verdicts on 23/126 Parasail calls (~18%) but 0/39 on Io Net and 1/17 on
    # Friendli — a flaky-PROVIDER empty-200 defect, NOT the model. Model unchanged (operator + Codex
    # confirmed: keep GLM, swap provider only).
    # I-arch-003 (#1253, operator 2026-06-14 "fp8 better quality + max max tokens"): RE-PINNED to the
    # fp8 HIGH-CAP chain. The prior pin DeepInfra was fp4 (q=fp4) with max_completion_tokens=32768 —
    # violating BOTH the fp8-quality and the max-output directives (the transport now sends
    # max_tokens=131072, which would 400 on DeepInfra's 32768 cap). Live OpenRouter endpoints read
    # 2026-06-14 + a 3x/provider bake-off (scripts/diagnostics/mirror_glm_provider_bakeoff.py) at the
    # real Mirror shape (reasoning.max_tokens=100000 numeric cap + max_tokens=131072) returned 3/3
    # CLEAN (0 blank, finish=stop) on atlas-cloud/z-ai/baidu/novita/gmicloud — the NUMERIC reasoning
    # cap (not effort=xhigh) is what makes them clean; the xhigh empty-200 defect does not occur.
    # AtlasCloud leads (fp8, max_out=202752, fastest ~6-8s); Z.AI (first-party) + Baidu + Novita +
    # GMICloud back it (all fp8, max_out>=131072, all clean). DeepInfra (fp4/32768) removed.
    order: [atlas-cloud, z-ai, baidu, novita, gmicloud]
    ignore: [chutes, phala, baseten, together, ambient, parasail, siliconflow, deepinfra, fireworks]
    notes: "I-arch-003 2026-06-14: fp8 high-cap re-pin (atlas-cloud lead, max_out=202752); deepinfra(fp4/32768)+fireworks removed; parasail/siliconflow stay blank-demoted; numeric reasoning cap (not xhigh) verified blank-clean 3/3 on all 5 fp8 providers"
  sentinel:
    model: minimax/minimax-m2
    order: [google-vertex, novita, atlas-cloud, minimax]
    ignore: []
    notes: "some providers have NULL uptime (ranked last)"
  judge:
    model: qwen/qwen3.6-35b-a3b
    # I-arch-003 (#1253, operator 2026-06-14 "max max"): atlas-cloud DROPPED from the chain. Live
    # OpenRouter read 2026-06-14: wandb=262144, io-net=262140, atlas-cloud=65536. The transport now
    # sends max_tokens=262140 (min of the kept chain), which would 400 on atlas-cloud's 65536 cap, so
    # atlas-cloud is removed to keep the chain self-consistent. WandB (4/4 reliable in I-arch-003
    # tests) leads; Io Net (262140) backs it. Both fp8.
    order: [wandb, io-net]
    ignore: [ambient, parasail, akashml, siliconflow, atlas-cloud]
provider_aliases:
