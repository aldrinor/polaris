# I-run11-007 (#1051): per-role OpenRouter provider routing — ranked HEALTHY chain.
# Generated by scripts/diagnostics/rank_openrouter_providers.py from live endpoint health.
# Ranking: status==0 + uptime_last_30m>=98.0 GATE, then sorted throughput p50 desc / latency p50 asc / uptime desc (stable-gated, fastest-first).
# Used with allow_fallbacks:false so off-list (flaky) providers are NEVER tried.
# Re-generate before a demo to refresh health. LAW VI: consumed as config, never inlined.
roles:
  generator:
    model: z-ai/glm-5.2  # I-beatboth-008 #1285 (operator-approved 2026-06-20): generator switched deepseek-v4-pro -> glm-5.2 (all-GLM-5.2; gen+mirror both glm-5.2)
    # I-beatboth-008 (#1285, 2026-06-20): glm-5.2 generator chain. Live probe (glm-5.2, 3x, max_tokens=2000):
    # Friendli 3/3 contentful 3.3s 1M-ctx/1048576-out = STABLEST+FASTEST+MAXCAP (LEAD); Novita 3/3 6.7s 131072;
    # Z.AI 3/3 9.8s first-party 131072; Phala 3/3 22.3s 1048576 (slow tail). Fireworks+Cloudflare 2/3 (429)
    # DROPPED. All 4 chained providers serve glm-5.2 status=0. allow_fallbacks:false keeps off-list hosts out.
    # I-deepfix-001 B3 (#1370, 2026-07-08) — GATE-FIX (Codex+Fable P1-1): the generator pins below are the
    # DEFAULT (byte-identical to the pre-B3 pinned routing). The B3 fanout — dropping `order` and setting
    # allow_fallbacks:true so the per-basket compose BURST load-balances across glm-5.2's 27 healthy
    # endpoints instead of hammering order[0]=friendli (the drb_72 "Server disconnected" root cause #3) —
    # is NOT applied here in the yaml (that leaked into the default paid-run routing). It is now gated behind
    # PG_GENERATOR_PROVIDER_FANOUT (default OFF), applied in openrouter_client where the generator provider
    # block is built: flag OFF => these pins are used (byte-identical); flag ON => the pins are dropped and
    # allow_fallbacks stays the OPENROUTER_ALLOW_FALLBACKS default (true) so OpenRouter spreads the burst.
    # gate-inversion A/B latency fix (2026-07-16, operator-authorized): live /endpoints re-probe of z-ai/glm-5.2.
    # DROPPED z-ai (3898ms slow tail) and phala (status=-2 BROKEN) from the generator lead. friendli leads
    # (578ms/90tps/1M-cap/99.7%up); baseten (1421ms fp8 256k-cap 99.9%up) + novita (1913ms fp8 131072) back it.
    # fireworks KEPT OUT of the generator lead (historical 429 on the heavy compose burst) though it is healthy
    # for the mirror. fp4 hosts AVOIDED (quality). token_limit_resolver clamps max_tokens per provider (no 400).
    order: [friendli, baseten, novita]
    # I-beatboth-008 #1285 ignore: providers that DO NOT serve glm-5.2 or are flaky on it. deepinfra/fireworks/
    # cloudflare/atlas-cloud flaky or 429; baidu/gmicloud/wandb/siliconflow/streamlake serve only deepseek-v4-pro
    # or glm-5.1 (not glm-5.2) -> would 404 every generator call under allow_fallbacks:false.
    # gate-inversion: z-ai + phala added to ignore (slow/broken); fp4 hosts stay out.
    ignore: [deepinfra, fireworks, cloudflare, atlas-cloud, baidu, gmicloud, wandb, siliconflow, streamlake, z-ai, phala, parasail, inceptron, decart, wafer, venice, akashml, digitalocean, io-net, alibaba, morph, chutes, together, ambient]
  mirror:
    model: z-ai/glm-5.2  # I-beatboth-008 #1285 (operator-signed 2026-06-20): mirror upgrade 5.1->5.2 (MIT, 1M ctx, ~4x faster: 2.7s Z.AI vs 11.7s on the 5.1 chain)
    # I-ready-018 FIX-GLM (#1100): Parasail DEMOTED out of the Mirror chain. In the drb_72 paid run
    # GLM-5.1 returned blank verdicts on 23/126 Parasail calls (~18%) but 0/39 on Io Net and 1/17 on
    # Friendli — a flaky-PROVIDER empty-200 defect, NOT the model. Model unchanged (operator + Codex
    # confirmed: keep GLM, swap provider only).
    # I-arch-003 (#1253, operator 2026-06-14 "fp8 better quality + max max tokens"): RE-PINNED to the
    # fp8 HIGH-CAP chain. The prior pin DeepInfra was fp4 (q=fp4) with max_completion_tokens=32768 —
    # violating BOTH the fp8-quality and the max-output directives (the transport now sends
    # max_tokens=131072, which would 400 on DeepInfra's 32768 cap). Live OpenRouter endpoints read
    # 2026-06-14 + a 3x/provider bake-off (scripts/diagnostics/mirror_glm_provider_bakeoff.py) at the
    # real Mirror shape (reasoning.max_tokens=100000 numeric cap + max_tokens=131072) returned 3/3
    # CLEAN (0 blank, finish=stop) on atlas-cloud/z-ai/baidu/novita/gmicloud — the NUMERIC reasoning
    # cap (not effort=xhigh) is what makes them clean; the xhigh empty-200 defect does not occur.
    # I-arch-011 verify-speed (2026-06-18): AtlasCloud DEMOTED OUT of the chain. A live real-shape
    # bake-off (reasoning effort=high, max_tokens=8000, the actual entailment/credibility call shape)
    # measured AtlasCloud at ~38s/call vs ~7-11s on z-ai/baidu/novita/gmicloud — ~4x slower. Under
    # allow_fallbacks:False it was the FORCED leader, so EVERY mirror-role call (entailment verify +
    # the credibility pass + 4-role) ate ~38s, and the drb_78 paid run showed AtlasCloud also returning
    # intermittent blank-200 verdicts (json-parse 'Expecting value' + bad_verdict='' retry storms).
    # That ~38s x hundreds-of-sentences was the verify-tail "wedge" (a 50-min credibility-pass grind to
    # its 3000s wall on drb_76). Re-led with Z.AI (first-party, fastest real-shape ~7-10s, valid) backed
    # by Baidu/Novita/GMICloud (all fp8, max_out>=131072, all valid in the bake-off). Model UNCHANGED
    # (z-ai/glm-5.1); same verdicts, faster+reliable host only (operator pre-approved host
    # non-sovereignty for the judges 2026-06-13). Chain-MIN max_completion_tokens stays 131072
    # (z-ai/baidu/novita), so no token-cap regression.
    # I-beatboth-008 #1285 (2026-06-20): glm-5.2 chain. Live /endpoints probe: baidu + gmicloud DO NOT serve
    # glm-5.2 (only 5.1) -> DROPPED (under allow_fallbacks:false they would 404 on every mirror call). glm-5.2
    # is served status=0 + max_completion_tokens>=131072 by z-ai (first-party, health-probed 2.7s clean),
    # novita (fp8, in the proven 5.1 chain), friendli (1,048,576 cap), phala (1,048,576 cap). Z.AI leads; the
    # behavioral_canary (PG_BEHAVIORAL_CANARY=1) validates the lead pre-spend; provider-rotation handles a
    # blank-200 host. Chain-MIN max_completion_tokens = 131072 (z-ai/novita) — no token-cap regression.
    # I-beatboth-008 #1285 (2026-06-20): mirror chain reordered z-ai-lead -> friendli-lead. Live glm-5.2 probe:
    # Friendli 3.3s 1M-cap = fastest+stablest+max-cap; Novita 6.7s; Z.AI 9.8s; Phala 22.3s (slow tail). Same
    # providers, friendli-first to match the generator lead. Chain-MIN max_completion_tokens stays 131072 (novita/z-ai).
    # gate-inversion A/B latency fix (2026-07-16, operator-authorized): live /endpoints health re-probe of
    # z-ai/glm-5.2 (28 eps, 26 healthy@uptime>=98%). MEASURED p50 latency/tput: friendli 578ms/90tps 1M-cap;
    # fireworks 1091ms/87tps ("fast" quant); baseten 1421ms/73tps fp8 256k-cap 99.9%up; novita 1913ms/34tps fp8
    # 131072. DROPPED z-ai (3898ms = slow tail) and phala (status=-2 BROKEN) from the lead — they were the
    # verify-tail wedge. fp4 hosts (wandb/parasail/inceptron/decart/deepinfra) AVOIDED to protect quality per
    # operator. Chain is fp8/bf16 only; token_limit_resolver clamps max_tokens DOWN to each provider's real cap
    # (no 400) so a sub-131072 cap host cannot regress the request. allow_fallbacks:false unchanged.
    order: [friendli, fireworks, baseten, novita]
    ignore: [chutes, together, ambient, parasail, siliconflow, deepinfra, atlas-cloud, baidu, gmicloud, z-ai, phala, wandb, decart, inceptron, streamlake, cloudflare, wafer, venice, akashml, digitalocean, io-net, alibaba, morph]
    notes: "I-beatboth-008 2026-06-20: glm-5.2 mirror upgrade; baidu+gmicloud DROPPED (do not serve glm-5.2), friendli+phala added (1M-cap status=0); z-ai-led, chain-MIN max_tokens 131072. Prior I-arch-011 2026-06-18 glm-5.1: AtlasCloud demoted (~38s/call); z-ai/baidu/novita/gmicloud fp8 chain."
  sentinel:
    model: minimax/minimax-m2
    # I-deepfix-001 B11 C1 (#1344) preferred_min_throughput / preferred_max_latency keys REMOVED:
    # they mapped to OpenRouter provider.min_throughput / provider.max_latency, which are NOT real
    # OpenRouter fields — with require_parameters:true the call returns 400 "Unrecognized keys"
    # (caught by super_heavy_preflight on the sentinel BEFORE spend). The slow-host concern is served
    # validly by the pinned order/ignore chain below + B11 C2's measured-tok/s rotation
    # (PG_ROLE_MIN_TPS) + the 300s Sentinel total-deadline floor. DO NOT re-add SLO keys here.
    # I-wire-007 (#1321): google-vertex DROPPED from the FRONT of the chain. Under allow_fallbacks:false
    # it was the FORCED leader, so every Sentinel POST first hit google-vertex (slow / NULL-uptime per
    # the note below) before the force-close rotation could advance — the I-wire-006 #1320 root cause of
    # the minimax decomposition trickle-hang. Re-led with novita (fp8, in the proven mirror chain),
    # backed by atlas-cloud + first-party minimax. The 300s Sentinel total-deadline FLOOR is KEPT
    # (PG_ROLE_TRANSPORT_TOTAL_S_SENTINEL default 300; the 30-45s wall is REJECTED — proven to
    # mass-over-drop healthy decomposition into UNSUPPORTED = the drb_72 collapse). Model UNCHANGED
    # (minimax/minimax-m2); only the provider ORDER changes -> faithfulness-NEUTRAL.
    order: [novita, atlas-cloud, minimax]
    ignore: [google-vertex]
    notes: "I-wire-007 2026-06-25: google-vertex dropped from the front (slow/NULL-uptime forced leader, the #1320 trickle-hang root cause); novita-led, atlas-cloud+minimax backing. 300s deadline floor kept. some providers have NULL uptime (ranked last)."
  judge:
    model: moonshotai/kimi-k2.6
    # I-judge-kimi (2026-06-29, operator directive): the Judge is now moonshotai/kimi-k2.6 and is
    # DELIBERATELY UNPINNED (no `order` / no `allow_fallbacks:false`). WHY: the prior qwen Judge was
    # pinned to `order: [wandb, io-net]` + allow_fallbacks:false — a 2-host PRIORITY list (OpenRouter
    # always hits order[0] first, NOT load-balanced), so the per-claim Judge burst hammered ONE host
    # and 429-rate-limited, TEARING the 4-role D8 seam. That pin is also WRONG for kimi: io-net does
    # NOT serve kimi-k2.6 (live /endpoints 2026-06-29), so it would collapse to wandb-only. The swap's
    # whole mechanism is to SPREAD the burst across kimi's 21 endpoints (Chutes/Baidu/DeepInfra/
    # SiliconFlow/Novita/Moonshot/Parasail/DigitalOcean/WandB/AtlasCloud/...). Removing the order key
    # makes role_provider_routing('judge') return None, so the transport keeps only
    # provider.require_parameters=True (route to a reasoning-honoring provider — ALL 21 kimi endpoints
    # advertise `reasoning`) and OpenRouter LOAD-BALANCES the burst across them -> no 429 -> the seam
    # completes -> the report renders FULLY D8-verified. The default verdict budget (16384) is <= every
    # kimi endpoint's max_completion (DeepInfra floor 16384), so OpenRouter's max_tokens provider-filter
    # keeps all 21 in the balance. (If a future operator wants to PIN kimi to a ranked healthy subset,
    # add `order:`/`ignore:` here and re-derive _JUDGE_MAX_TOKENS_CHAIN_MIN in openrouter_role_transport.)
