# I-run11-007 (#1051): per-role OpenRouter provider routing — ranked HEALTHY chain.
# Generated by scripts/diagnostics/rank_openrouter_providers.py from live endpoint health.
# Ranking: status==0 + uptime_last_30m>=98.0, sorted uptime desc / latency asc / throughput desc.
# Used with allow_fallbacks:false so off-list (flaky) providers are NEVER tried.
# Re-generate before a demo to refresh health. LAW VI: consumed as config, never inlined.
roles:
  generator:
    model: deepseek/deepseek-v4-pro
    order: [streamlake, siliconflow, novita, alibaba, deepseek, venice]
    ignore: [baidu, gmicloud, atlas-cloud, fireworks, digitalocean, together]
  mirror:
    model: z-ai/glm-5.1
    order: [friendli, io-net, parasail, fireworks, baidu, siliconflow]
    ignore: [chutes, phala, baseten, together, ambient]
    notes: "some providers have NULL uptime (ranked last)"
  sentinel:
    model: minimax/minimax-m2
    order: [google-vertex, novita, atlas-cloud, minimax]
    ignore: []
    notes: "some providers have NULL uptime (ranked last)"
  judge:
    model: qwen/qwen3.6-35b-a3b
    order: [wandb, io-net, atlas-cloud]
    ignore: [ambient, parasail, akashml, siliconflow]
provider_aliases:
  "AkashML": akashml
  "Alibaba": alibaba
  "Ambient": ambient
  "AtlasCloud": atlas-cloud
  "Baidu": baidu
  "BaseTen": baseten
  "Chutes": chutes
  "DeepInfra": deepinfra
  "DeepSeek": deepseek
  "DigitalOcean": digitalocean
  "Fireworks": fireworks
  "Friendli": friendli
  "GMICloud": gmicloud
  "Google": google-vertex
  "Inceptron": inceptron
  "Io Net": io-net
  "Minimax": minimax
  "Novita": novita
  "Parasail": parasail
  "Phala": phala
  "SiliconFlow": siliconflow
  "StreamLake": streamlake
  "Together": together
  "Venice": venice
  "WandB": wandb
  "Z.AI": z-ai
