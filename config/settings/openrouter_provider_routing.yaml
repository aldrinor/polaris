# I-run11-007 (#1051): per-role OpenRouter provider routing — ranked HEALTHY chain.
# Generated by scripts/diagnostics/rank_openrouter_providers.py from live endpoint health.
# Ranking: status==0 + uptime_last_30m>=98.0 GATE, then sorted throughput p50 desc / latency p50 asc / uptime desc (stable-gated, fastest-first).
# Used with allow_fallbacks:false so off-list (flaky) providers are NEVER tried.
# Re-generate before a demo to refresh health. LAW VI: consumed as config, never inlined.
roles:
  generator:
    model: deepseek/deepseek-v4-pro
    # I-arch-003 (#1253, operator 2026-06-14): pin the fp8 FULL-CAP providers first so the generator gets the
    # MAX output budget (WandB/Parasail = 1,048,576; the rest >= 384,000). All fp8 (better than DeepInfra fp4,
    # which is excluded). Verified live: WandB + Parasail both serve deepseek-v4-pro @ max_tokens=384000,
    # finish=stop, valid content (2026-06-14). WandB first (also the reliable Judge provider); the prior
    # health-ranked chain stays as fallback. Parasail removed from `ignore`.
    order: [wandb, siliconflow, baidu, novita, streamlake, gmicloud, deepseek]
    # Parasail RE-IGNORED 2026-06-14: live re-test returned "Provider returned error" 1/3 calls (flaky) —
    # confirms its original demotion. WandB leads (operator pick; 4/4 reliable, one 180s cold-start then warm);
    # the proven fp8 full-cap chain (>=384,000) backs it. DeepInfra (fp4/16384) stays excluded.
    ignore: [atlas-cloud, parasail, fireworks, digitalocean, together]
  mirror:
    model: z-ai/glm-5.1
    # I-ready-018 FIX-GLM (#1100): Parasail DEMOTED out of the Mirror chain. In the drb_72 paid run
    # GLM-5.1 returned blank verdicts on 23/126 Parasail calls (~18%) but 0/39 on Io Net and 1/17 on
    # Friendli — a flaky-PROVIDER empty-200 defect, NOT the model. Io Net (0 blanks) leads; Parasail
    # is removed from `order` and added to `ignore` so allow_fallbacks:false never routes the binding
    # Mirror through it. Model unchanged (operator + Codex confirmed: keep GLM, swap provider only).
    # 2026-06-12 SILICONFLOW-DEMOTE: SAME defect on SiliconFlow — GLM-5.1 at effort=xhigh returns
    # empty-content 200s on SiliconFlow (reproduced directly), stalling the binding 4-role gate. The
    # 16384 token budget is ample (GLM uses ~860 reasoning tok), and DeepInfra serves xhigh CLEAN
    # (measured: 860 reasoning + 856-char verdict). So SiliconFlow is removed from `order` + added to
    # `ignore`, and DeepInfra is pinned FIRST. Keeps MAX reasoning (xhigh); swaps the flaky provider only.
    order: [deepinfra, io-net, friendli, fireworks, baidu]
    ignore: [chutes, phala, baseten, together, ambient, parasail, siliconflow]
    notes: "parasail demoted (I-ready-018 FIX-GLM ~18% blank); siliconflow demoted 2026-06-12 (xhigh empty-200); deepinfra pinned first (xhigh-clean)"
  sentinel:
    model: minimax/minimax-m2
    order: [google-vertex, novita, atlas-cloud, minimax]
    ignore: []
    notes: "some providers have NULL uptime (ranked last)"
  judge:
    model: qwen/qwen3.6-35b-a3b
    order: [wandb, io-net, atlas-cloud]
    ignore: [ambient, parasail, akashml, siliconflow]
provider_aliases:
  "AkashML": akashml
  "Alibaba": alibaba
  "Ambient": ambient
  "AtlasCloud": atlas-cloud
  "Baidu": baidu
  "BaseTen": baseten
  "Chutes": chutes
  "DeepInfra": deepinfra
  "DeepSeek": deepseek
  "DigitalOcean": digitalocean
  "Fireworks": fireworks
  "Friendli": friendli
