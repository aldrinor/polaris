# Tier 2 institutional domains (authority: 0.85)
tier2_domains:
  - ncbi.nlm.nih.gov
  - pubmed.ncbi.nlm.nih.gov
  - nsf.org
  - iso.org
  - astm.org
  - awwa.org
  - reuters.com
  - apnews.com
  - hopkinsmedicine.org
  - mayoclinic.org
  - clevelandclinic.org

# Tier 3 trade/industry domains (authority: 0.7)
# NOTE: These are domain-specific. Add domains relevant to your query domain.
tier3_domains:
  - wateronline.com
  - chemengonline.com
  - engineering.com
  - process-worldwide.com
  - waterworld.com
  - filtsep.com

# Low-authority URL patterns (regex, authority: 0.1)
# Matches commercial/service-oriented sites
low_authority_patterns:
  - "plumb"
  - "hvac"
  - "filter-?site"
  - "cleanwater"
  - "waterfilter"
  - "purifier"
  - "softener"

# Synonym sets for academic query expansion.
# Each set groups terms that are synonymous in context.
# NOTE: These are domain-specific. Replace for different query domains.
synonym_sets:
  - ["intermittent fasting", "time-restricted eating", "alternate-day fasting", "periodic fasting"]
  - ["metabolic health", "metabolic syndrome", "insulin resistance", "glucose metabolism"]
  - ["cardiovascular", "heart disease", "coronary", "cardiac", "atherosclerosis"]
  - ["obesity", "overweight", "body mass index", "adiposity", "body composition"]
  - ["mortality", "death rate", "survival", "lifespan", "longevity"]
  - ["autophagy", "cellular repair", "proteostasis", "mitophagy"]
  - ["inflammation", "inflammatory markers", "cytokines", "C-reactive protein"]
  - ["diabetes", "type 2 diabetes", "glycemic control", "HbA1c", "HOMA-IR"]
  - ["blood pressure", "hypertension", "systolic", "diastolic"]
  - ["cholesterol", "lipid profile", "triglycerides", "HDL", "LDL"]

# Unit patterns for quantitative data validation (regex)
# NOTE: Domain-specific. These are medical/chemistry units.
unit_patterns: "mmol/L|mg/dL|mmHg|kg|BMI|HbA1c|HOMA-IR|mg|µg|ng|IU|kcal|kJ|%|ppm|ppb|ppt|mg/L|µg/L|ng/L|bar|kPa|MPa|kWh|MWh|Da|kDa|L/min|m³/h"

# Clinical keywords that trigger the academic-only gate
clinical_keywords:
  - "clinical research"
  - "meta-analyses"
  - "systematic review"
  - "randomized controlled"
  - "clinical trials"
  - "peer-reviewed"
