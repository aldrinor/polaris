# Domain-specific lists for source authority, credibility, and filtering.
# Loaded at runtime via PG_DOMAIN_CONFIG_PATH env var.
# LAW VI: No domain-specific values hardcoded in source code.

# Low-credibility consumer/news/commerce domains (authority: 0.2)
# These are popular sites that simplify or sensationalize research,
# or commerce sites that host product listings rather than research.
# The PageRank/tier authority gate (PG_AUTHORITY_GATE) filters these
# downstream — we no longer use a hard blocklist (removed 2026-04-12,
# mirroring commit 74e1bf6 for the wiki path).
# Override per-domain by adding to tier1/tier2 lists instead.
low_credibility_domains:
  - webmd.com
  - healthcentral.com
  - nutritionfacts.org
  - equip.health
  - brokenscience.org
  - ktla.com
  - tctmd.com
  - jeffersonhealth.org
  - healthline.com
  - verywellhealth.com
  - medicalnewstoday.com
  - everydayhealth.com
  - livestrong.com
  - droracle.ai
  - centerwellprimarycare.com
  - orthomolecular.org
  - eatingwell.com
  - sciencefocus.com
  - aarp.org
  - diabetesonthenet.com
  - healthshots.com
  - theconversation.com
  - agencia.fapesp.br
  - sochob.cl
  - endocrinologyadvisor.com
  - eurekalert.org
  - withpower.com
  # Former blocked_domains (commerce — moved 2026-04-12, score 0.2 instead of 0.0)
  - amazon.com
  - ebay.com
  - walmart.com
  - aliexpress.com
  - alibaba.com
