    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: select
    dna_class: presentation
    description: weight (aim) or hard (explicit "no more than").
  - id: summary_first
    block: deliverable
    type: bool
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: toggle
    dna_class: presentation
    description: Lead with an executive summary.
  - id: recommendations_last
    block: deliverable
    type: bool
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: toggle
    dna_class: presentation
    description: Place recommendations / conclusion last.
  - id: wants_tables
    block: deliverable
