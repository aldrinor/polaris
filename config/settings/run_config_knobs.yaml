    dna_class: presentation
  - id: summary_first
    block: deliverable
    type: bool
    code_default: false
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: toggle
    dna_class: presentation
  - id: recommendations_last
    block: deliverable
    type: bool
    code_default: false
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: toggle
    dna_class: presentation
  - id: tables
    block: deliverable
    type: bool
    code_default: false
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: toggle
    dna_class: presentation
  - id: output_format
    block: deliverable
    type: str_enum
    enum: [md, memo]
    code_default: md
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: select
    dna_class: presentation

  # ---------------- STAGES (per-stage tuning) -----------------------------------
  - id: topic_gate_parallel
    block: stages
    type: int
    code_default: 32            # PG_SCOPE_TOPIC_PARALLEL default 32
    env_var: PG_SCOPE_TOPIC_PARALLEL
    earliest_resume_checkpoint: cp1
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
  - id: line_screen_parallel
    block: stages
    type: int
    code_default: 1             # PG_LINE_SCREEN_PARALLEL real code default 1 (serial); slate 32 is the ON value
    env_var: PG_LINE_SCREEN_PARALLEL
    earliest_resume_checkpoint: cp1
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
  - id: outline_digest_budget
    block: stages
    type: int
    code_default: 60000         # PG_OUTLINE_DIGEST_MAX_CHARS default 60000
    env_var: PG_OUTLINE_DIGEST_MAX_CHARS
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
  - id: revise_rounds
    block: stages
    type: int
    code_default: 1             # PG_OUTLINE_REVISE_ROUNDS default 1 (hard max 2 at call site)
    env_var: PG_OUTLINE_REVISE_ROUNDS
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
  - id: max_recompose
    block: stages
    type: int
    code_default: 8            # PG_OUTLINE_MAX_RECOMPOSE default 8
    env_var: PG_OUTLINE_MAX_RECOMPOSE
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
  - id: gap_refetch_budget
    block: stages
    type: int
    code_default: 0             # PG_OUTLINE_GAP_QUERIES default 0 (OFF until WAVE-5)
    env_var: PG_OUTLINE_GAP_QUERIES
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
  - id: holistic_review
    block: stages
    type: bool
    code_default: false         # PG_HOLISTIC_REVIEW default OFF
    env_var: PG_HOLISTIC_REVIEW
    earliest_resume_checkpoint: cp4
    prompt_parseable: false
    panel_widget: toggle
    dna_class: stage_tuning
  - id: section_concurrency
    block: stages
    type: int
    code_default: 6             # PG_PARALLEL_SECTIONS slate default 6 (plan raises to 32)
    env_var: PG_PARALLEL_SECTIONS
    earliest_resume_checkpoint: cp4
    prompt_parseable: false
    panel_widget: number
    dna_class: stage_tuning
