    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: toggle
    dna_class: presentation
    description: Include a comparison table.
  - id: structure_slots
    block: deliverable
    type: list
    code_default: []
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: repeater
    dna_class: presentation
    description: Requested sections / organization (O2 instruction slots).
  - id: output_format
    block: deliverable
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: select
    dna_class: presentation
    description: markdown / html / plain.

  # ── STAGES block — per-stage tuning (parallelism / rounds; never a target) ─────
  - id: section_concurrency
    block: stages
    type: int
    code_default: 6
    env_var: PG_MAX_PARALLEL_SECTIONS
    earliest_resume_checkpoint: cp4
    prompt_parseable: false
    panel_widget: number_input
