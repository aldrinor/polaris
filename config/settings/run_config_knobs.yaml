# run_config_knobs.yaml — THE KNOB REGISTRY (single source of knob truth)
# ---------------------------------------------------------------------------
# POLARIS foundation (WAVE 0, WP-0b) per MASTER_EXECUTION_PLAN v2 §1.2.
# Loaded + validated by src/polaris_graph/run_config.py. This YAML is DATA; the
# resolver code holds ZERO knob-specific literals — every code-default lives here.
#
# One row per knob. Fields:
#   id            snake_case knob id (unique). The name the pipeline resolves by.
#   block         breadth | scope | deliverable | stages   (RunConfig block, §1.1)
#   type          int | float | str | bool | str_enum | list  (env strings coerced to this)
#   code_default  the value when NOTHING is set (panel/prompt/env all absent).
#                 MUST equal the code's own os.getenv default so an empty RunConfig
#                 is byte-identical to today (§1.5). null == "unset => today's behaviour".
#   env_var       the legacy PG_* env alias the code reads today, or null if the axis
#                 is new (no env yet). The resolver reads THIS at the env layer.
#   enum          allowed values for a str_enum (else omitted).
#   earliest_resume_checkpoint
#                 The resume ENTRY checkpoint at or before which an adjustment to this
#                 knob still takes effect. RULE (validity matrix, §1.4 / checkpoint
#                 arch §4.2): an adjustment is VALID iff  entry_index <= erc_index.
#                 It is set to cp(K-1) where cpK is the checkpoint the knob's consuming
#                 stage PRODUCES — resuming later than that means the stage already ran
#                 and the change cannot take effect => fail-loud reject. So:
#                   breadth  -> shapes S1 RETRIEVE (produces cp1) -> erc cp0
#                   scope    -> shapes S2 SELECT   (produces cp2) -> erc cp1
#                   deliverable/outline -> shapes S4 OUTLINE (cp4) -> erc cp3
#                   compose (holistic/section conc) -> shapes S5 (cp5) -> erc cp4
#   prompt_parseable  true == a natural-language prompt directive can set it (surface a).
#   panel_widget  UI hint for the control panel (surface b): number|text|select|
#                 multiselect|toggle|daterange.
#   dna_class     breadth_budget | scope_constraint | presentation | stage_tuning.
#                 §-1.3 DAY-WASTER BAN, enforced at registry load: a knob whose PURPOSE
#                 is "make a quality number hit X" is REJECTED. dna_class must be one of
#                 the four; a knob id on the day-waster denylist is refused.
#
# §1.7 HARD EXCLUSIONS (enforced at load, never registered here):
#   - NO model-selection knob (models are the §9.1.8 operator lock).
#   - NO max_tokens / reasoning-effort knob (token budgets = §9.1.8, read real
#     OpenRouter caps, never a user knob).
#   - NO knob that weakens/bypasses the faithfulness engine.
#   - NO hard drop/cap/thin/target on credible on-topic sources.
schema_version: 1

knobs:
  # ---------------- BREADTH (spend budgets; erc cp0 — shape retrieval) ----------
  - id: query_count
    block: breadth
    type: int
    code_default: 35            # PG_QGEN_FS_RESEARCHER_MAX_QUERIES default "35"
    env_var: PG_QGEN_FS_RESEARCHER_MAX_QUERIES
    earliest_resume_checkpoint: cp0
    prompt_parseable: true
    panel_widget: number
    dna_class: breadth_budget
  - id: searches_per_query
    block: breadth
    type: int
    code_default: 20            # PG_LIVE_MAX_SERPER default "20"
    env_var: PG_LIVE_MAX_SERPER
    earliest_resume_checkpoint: cp0
    prompt_parseable: true
    panel_widget: number
    dna_class: breadth_budget
  - id: s2_k
    block: breadth
    type: int
    code_default: 20            # PG_LIVE_MAX_S2 default "20"
    env_var: PG_LIVE_MAX_S2
    earliest_resume_checkpoint: cp0
    prompt_parseable: false
    panel_widget: number
    dna_class: breadth_budget
  - id: serper_total
    block: breadth
    type: int
    code_default: 20            # PG_SERPER_TOTAL_PER_QUERY defaults to per_page (==serper_k)
    env_var: PG_SERPER_TOTAL_PER_QUERY
    earliest_resume_checkpoint: cp0
    prompt_parseable: false
    panel_widget: number
    dna_class: breadth_budget
  - id: fetch_cap
    block: breadth
    type: int
    code_default: 200           # PG_LIVE_FETCH_CAP default "200"
    env_var: PG_LIVE_FETCH_CAP
    earliest_resume_checkpoint: cp0
    prompt_parseable: false
    panel_widget: number
    dna_class: breadth_budget
  - id: rounds
    block: breadth
    type: int
    code_default: 6             # PG_QGEN_FS_RESEARCHER_MAX_ROUNDS default "6"
    env_var: PG_QGEN_FS_RESEARCHER_MAX_ROUNDS
    earliest_resume_checkpoint: cp0
    prompt_parseable: false
    panel_widget: number
    dna_class: breadth_budget
  - id: breadth_class
    block: breadth
    type: str_enum
    enum: [NARROW, STANDARD, WIDE]
    code_default: null          # unset => structural sizing (today's behaviour)
    env_var: null
    earliest_resume_checkpoint: cp0
    prompt_parseable: true
    panel_widget: select
    dna_class: breadth_budget

  # ---------------- SCOPE (user's own hard filters; erc cp1 — shape selection) --
  - id: date_from
    block: scope
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: daterange
    dna_class: scope_constraint
  - id: date_to
    block: scope
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: daterange
    dna_class: scope_constraint
  - id: recency
    block: scope
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: select
    dna_class: scope_constraint
  - id: source_types
    block: scope
    type: list
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: multiselect
    dna_class: scope_constraint
  - id: geography
    block: scope
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: select
    dna_class: scope_constraint
  - id: jurisdiction
    block: scope
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: text
    dna_class: scope_constraint
  - id: language
    block: scope
    type: str
    code_default: null
    env_var: null              # UserConstraints.language today; no dedicated env alias
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: select
    dna_class: scope_constraint
  - id: authors
    block: scope
    type: list
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: multiselect
    dna_class: scope_constraint
  - id: peer_reviewed_only
    block: scope
    type: bool
    code_default: false
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: toggle
    dna_class: scope_constraint
  - id: scope_focus
    block: scope
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp1
    prompt_parseable: true
    panel_widget: text
    dna_class: scope_constraint

  # ---------------- DELIVERABLE (presentation; erc cp3 — shape outline+) --------
  - id: tone
    block: deliverable
    type: str_enum
    enum: [executive_brief, academic, plain, formal, neutral]
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: select
    dna_class: presentation
  - id: audience
    block: deliverable
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: text
    dna_class: presentation
  - id: reading_level
    block: deliverable
    type: str
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: select
    dna_class: presentation
  - id: structure
    block: deliverable
    type: list
    code_default: null          # unset => the domain's default section set
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: text
    dna_class: presentation
  - id: section_order
    block: deliverable
    type: list
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: false
    panel_widget: text
    dna_class: presentation
  - id: reference_style
    block: deliverable
    type: str_enum
    enum: [numeric, author_year, apa, harvard, vancouver]
    code_default: numeric       # byte-identical to today's numeric bibliography
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: select
    dna_class: presentation
  - id: length_target
    block: deliverable
    type: int
    code_default: null          # words; unset => no length target
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: number
    dna_class: presentation
  - id: length_strictness
    block: deliverable
    type: str_enum
    enum: [soft, hard]
    code_default: soft
    env_var: null
    earliest_resume_checkpoint: cp3
    prompt_parseable: true
    panel_widget: select
    dna_class: presentation
  - id: depth
    block: deliverable
    type: str_enum
    enum: [shallow, standard, deep]
    code_default: null
    env_var: null
    earliest_resume_checkpoint: cp3
