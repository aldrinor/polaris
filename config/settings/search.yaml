# Search configuration
# Domain blocklist removed 2026-04-13 — authority gate
# (src/polaris_graph/agents/analyzer.py, PG_AUTHORITY_GATE default 0.3)
# scores all sources by PageRank + tier instead of maintaining a manual
# list of names. Mirrors commits 74e1bf6 (wiki), 9ee62ff (analyzer).

# Domains to prefer - authoritative sources
preferred_domains:
  # Government
  - .gov
  - .gov.uk
  - .gov.au
  - .gov.ca
  - who.int
  - cdc.gov
  - epa.gov
  - fda.gov
  - nih.gov
  - ncbi.nlm.nih.gov
  - pubmed.ncbi.nlm.nih.gov

  # Academic
  - .edu
  - .ac.uk
  - sciencedirect.com
  - nature.com
  - springer.com
  - wiley.com
  - tandfonline.com
  - jstor.org
  - arxiv.org
  - researchgate.net
  - semanticscholar.org

  # Standards organizations
  - iso.org
  - astm.org
  - ansi.org
  - nsf.org

  # Industry authoritative
  - ieee.org
  - acm.org

# =============================================================================
# SOTA COMPLIANCE: Domain Diversity Enforcement
# W1.2 Task: Prevent single domain dominance (was 38% from one domain)
# =============================================================================
domain_diversity:
  # Maximum results from any single domain
  max_results_per_domain: 10
  # Minimum number of unique domains required
  min_unique_domains: 15
  # Enable diversity enforcement
  enabled: true
  # Log warnings when diversity is low
  warn_on_low_diversity: true
  # Threshold for low diversity warning (single domain percentage)
  low_diversity_threshold: 0.25

# Rate limiting configuration
rate_limiting:
  semantic_scholar:
    max_retries: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 10.0
    jitter_range: 1.0
  serper:
    max_retries: 3
    base_delay_seconds: 0.5
    max_delay_seconds: 5.0
    jitter_range: 0.5
