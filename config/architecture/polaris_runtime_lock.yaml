# === ARCHITECTURE: 4 LLM roles + 2 deterministic layers ===

required_roles:
  generator:
    model_slug: deepseek/deepseek-v4-pro
    family: deepseek
    serving_route: openrouter
    license: MIT
    released: 2026-04-24
    role_description: |
      Recall-heavy synthesis. 1M context window. Top GDPval. Acknowledged 94%
      non-abstention failure mode is mitigated by downstream Mirror/Sentinel/Judge layers.

  mirror:
    model_slug: cohere/command-a-plus
    family: cohere
    serving_route: vast_self_host_bf16
    license: Apache 2.0
    released: 2026-05-20
    role_description: |
      Calibration auditor. Best calibration in pool (14.1% AA-Omniscience).
      Native citation grounding. Tests claims the Generator cannot self-verify.

  sentinel:
    model_slug: ibm-granite/granite-guardian-4.1-8b
    family: ibm-granite
    serving_route: vast_self_host
    license: Apache 2.0
    released: 2026
    role_description: |
      Purpose-built RAG hallucination detector. RAGTruth BAcc 0.841.
      Broad guardrail coverage. Catches Mirror's misses.

  judge:
    model_slug: qwen/qwen3.6-35b-a3b
    family: qwen
    serving_route: vast_self_host_fp8
    license: Apache 2.0
    released: 2026-04-16
    role_description: |
      Native structured-output discipline. Terminal arbiter — must emit
      stable parseable verdicts. Function-call adherence closer to Claude
      than to most open models per AA benchmarks.

deterministic_layers:
  - name: python_validators
    role_description: |
      Citation existence (DOI / OpenAlex), numeric/date checks, span-overlap
      and content-word overlap (strict_verify).
    code_path: src/polaris_graph/clinical_generator/strict_verify.py

  - name: codex_section_1_1_audit
    role_description: |
      Final human-equivalent gate. Claim-by-claim line-by-line audit against
      fetched cited spans. PRISMA 2020 + AMSTAR-2 + GRADE per claim. Per
      CLAUDE.md §-1.1. Manual + Codex-assisted; runs out-of-band of the
      automated pipeline.
    code_path: external_review

# === FAMILY POLICY: all 4 roles must be distinct lineages ===

family_policy:
  default_policy: all_distinct
  allowed_collisions: []          # empty = no collisions permitted
  rationale: |
    Two-family invariant (CLAUDE.md §9.1) extended to N-way. Each role's
    family-lineage must differ from every other role. Closed-source family
    fallbacks (openai, anthropic, google-closed) are FORBIDDEN at runtime
    per the sovereignty threat model (feedback_sovereignty_threat_model).

# === ENVIRONMENT VARIABLES (binding) ===
# Each role's runtime configuration knob. Defaults pulled from required_roles.

env_vars:
  generator:
    primary: PG_GENERATOR_MODEL
    fallbacks: [OPENROUTER_DEFAULT_MODEL]
  mirror:
    primary: PG_MIRROR_MODEL
    fallbacks: []
  sentinel:
    primary: PG_SENTINEL_MODEL
    fallbacks: []
  judge:
    primary: PG_JUDGE_MODEL
    fallbacks: []

# Compatibility map — PG_EVALUATOR_MODEL is OVERLOADED in the 2-LLM-stub legacy
# code paths. It is being retired. Map it to mirror to preserve back-compat
# during transition; legacy code paths still see "evaluator" but the gate
# treats it as the Mirror role.
legacy_compat:
  PG_EVALUATOR_MODEL:
    maps_to_role: mirror
    deprecated_after: 2026-09-06
    deprecation_notice: |
      PG_EVALUATOR_MODEL was overloaded (covered evaluator + judge +
      entailment in one knob). Use PG_MIRROR_MODEL / PG_SENTINEL_MODEL /
      PG_JUDGE_MODEL instead. After 2026-09-06 (Carney demo), this env var
      will fail the gate at preflight.
