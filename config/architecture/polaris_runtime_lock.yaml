# === ARCHITECTURE: 4 LLM roles + 2 deterministic layers ===

required_roles:
  generator:
    # GLM-5.2 COMPARISON ARM (branch bot/glm52-vs-deepseek-compare — EXPERIMENT ONLY, do NOT merge to
    # the production lock): generator swapped deepseek/deepseek-v4-pro -> z-ai/glm-5.2 (MIT, 753B MoE,
    # 1M ctx, served on Friendli = highest OpenRouter stability). Family glm. The Mirror is swapped to
    # deepseek-v4-pro below so all 4 roles remain DISTINCT families (glm/deepseek/minimax/qwen) and the
    # GLM-5.2 generator is never self-judged by its own glm lineage. Same I-arch-007-fixed pipeline.
    model_slug: z-ai/glm-5.2
    family: glm
    serving_route: openrouter
    license: MIT
    released: 2026-06
    role_description: |
      [GLM-5.2 ARM] Recall-heavy synthesis at MAX reasoning. 1M context window, open-weight MIT.
      Comparison arm vs the deepseek-v4-pro generator on the identical 5 corpus snapshots.

  mirror:
    # GLM-5.2 COMPARISON ARM: Mirror swapped z-ai/glm-5.1 -> deepseek/deepseek-v4-pro so the GLM-5.2
    # generator is NOT self-judged by its own glm lineage (anti-self-bias; symmetric with the DeepSeek
    # arm, which is judged by the GLM Mirror). Family deepseek. Keeps all 4 roles distinct.
    model_slug: deepseek/deepseek-v4-pro
    family: deepseek
    serving_route: openrouter
    license: MIT
    released: 2026-04-24
    role_description: |
      Calibration auditor. Native citation grounding via <co> spans.
      Tests claims the Generator cannot self-verify.

  sentinel:
    # I-run11-004: Sentinel replaced (broken Granite Guardian -> CERTIFIED MiniMax-M2 running the
    # claim-DECOMPOSITION + span-coverage prompt). On the 56-item fixture (28 grounded + 28
    # fabricated across NUMBER_SWAP/ENTITY_SWAP/NEGATION/FABRICATED_ATTRIBUTION/SCOPE_INFLATION)
    # it scored 0 false-accepts on all 28 fabrications, over-flag 0.107. The PRODUCTION
    # decomposition mode replicates the certified call (verbatim GLM_PROMPT, span+claim inline in a
    # single user message, JSON response_format, reasoning ON, max_tokens>=3000).
    model_slug: minimax/minimax-m2
    family: minimax
    serving_route: vast_self_host
    license: modified-mit  # HF MiniMaxAI/MiniMax-M2 tag = "modified-mit": MIT + a large-product UI
    # attribution condition (Codex brief-gate P2, web-verified vs HF + github.com/MiniMax-AI/MiniMax-M2
    # /blob/main/LICENSE). Permissive open-weight; POLARIS calls the hosted model (no weight
    # redistribution), so the attribution condition does not bind our use. Still non-US-vendor-OK.
    released: 2026
    role_description: |
      Certified claim-decomposition + span-coverage faithfulness detector
      (MiniMax-M2). Catches Mirror's misses; fail-closed on any parse failure.

  judge:
    model_slug: qwen/qwen3.6-35b-a3b
    family: qwen
    serving_route: vast_self_host_fp8
    license: Apache 2.0
    released: 2026-04-16
    role_description: |
      Native structured-output discipline. Terminal arbiter — must emit
      stable parseable verdicts. Function-call adherence closer to Claude
      than to most open models per AA benchmarks.

deterministic_layers:
  - name: python_validators
    role_description: |
      Citation existence (DOI / OpenAlex), numeric/date checks, span-overlap
      and content-word overlap (strict_verify).
    code_path: src/polaris_graph/clinical_generator/strict_verify.py

  - name: codex_section_1_1_audit
    role_description: |
      Final human-equivalent gate. Claim-by-claim line-by-line audit against
      fetched cited spans. PRISMA 2020 + AMSTAR-2 + GRADE per claim. Per
      CLAUDE.md §-1.1. Manual + Codex-assisted; runs out-of-band of the
      automated pipeline.
    code_path: external_review

# === FAMILY POLICY: all 4 roles must be distinct lineages ===

family_policy:
  default_policy: all_distinct
  allowed_collisions: []          # empty = no collisions permitted
  rationale: |
    Two-family invariant (CLAUDE.md §9.1) extended to N-way. Each role's
    family-lineage must differ from every other role. Closed-source family
    fallbacks (openai, anthropic, google-closed) are FORBIDDEN at runtime
    per the sovereignty threat model (feedback_sovereignty_threat_model).

# === ENVIRONMENT VARIABLES (binding) ===
# Each role's runtime configuration knob. Defaults pulled from required_roles.

env_vars:
  generator:
    primary: PG_GENERATOR_MODEL
    fallbacks: [OPENROUTER_DEFAULT_MODEL]
  mirror:
    primary: PG_MIRROR_MODEL
    fallbacks: []
  sentinel:
    primary: PG_SENTINEL_MODEL
    fallbacks: []
  judge:
    primary: PG_JUDGE_MODEL
    fallbacks: []

# Compatibility map — PG_EVALUATOR_MODEL is OVERLOADED in the 2-LLM-stub legacy
# code paths. It is being retired. Map it to mirror to preserve back-compat
# during transition; legacy code paths still see "evaluator" but the gate
# treats it as the Mirror role.
legacy_compat:
  PG_EVALUATOR_MODEL:
    maps_to_role: mirror
    deprecated_after: 2026-09-06
    deprecation_notice: |
      PG_EVALUATOR_MODEL was overloaded (covered evaluator + judge +
      entailment in one knob). Use PG_MIRROR_MODEL / PG_SENTINEL_MODEL /
      PG_JUDGE_MODEL instead. After 2026-09-06 (Carney demo), this env var
      will fail the gate at preflight.
