# Policy domain scope template — HONEST-REBUILD Phase 2c.
#
# Used when the user is researching regulatory decisions, reimbursement
# policy, public health guidance, health technology assessments, or
# cross-country access comparisons. The corpus should be dominated by
# regulatory documents (T3), HTA agency reports, and commentary (T6)
# from credible policy analysts. Primary clinical studies (T1) and
# SR/MA (T2) are included as supporting evidence.

domain: policy
description: >
  Regulatory-dominant corpus for health policy, reimbursement, and
  access research. Welcome government and HTA reports; treat industry
  pages with scepticism.

inclusion_criteria:
  - Regulatory documents from FDA, EMA, Health Canada, MHRA, TGA, PMDA, NMPA.
  - HTA agency reports (ICER, NICE, CADTH, IQWiG, HAS, AHRQ).
  - Peer-reviewed health policy / health economics journal articles.
  - Government press releases and public statements.
  - UN / WHO reports.
  - NGO reports with traceable funding disclosure.

exclusion_criteria:
  - Law-firm commentary used as primary regulatory interpretation
    (cite the underlying regulation, not the law firm).
  - Press releases from pharmaceutical manufacturers without a regulatory
    decision document to corroborate.
  - Opinion pieces in general-interest media unless written by a named
    policy analyst with disclosed affiliation.

expected_tier_distribution:
  - tier: T3
    min_fraction: 0.35
    max_fraction: 0.70
    rationale: >
      Regulatory documents and HTA reports are the primary evidence base
      for policy research.
  - tier: T1
    min_fraction: 0.10
    max_fraction: 0.30
    rationale: >
      Peer-reviewed primary studies (health economics, epidemiology)
      supporting the policy claims.
  - tier: T2
    min_fraction: 0.05
    max_fraction: 0.25
    rationale: >
      Systematic reviews and HTA-style evidence synthesis.
  - tier: T6
    min_fraction: 0.05
    max_fraction: 0.25
    rationale: >
      Policy commentary from named analysts and NGO reports. Treat as
      interpretive layer on top of primary regulatory documents.
  - tier: T4
    min_fraction: 0.00
    max_fraction: 0.15
    rationale: >
      Narrative reviews of the policy landscape.
  - tier: T5
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Industry policy pages — allowed when corroborated by T3.
  - tier: T7
    min_fraction: 0.00
    max_fraction: 0.05
    rationale: >
      Conference abstracts — rarely relevant for policy research.

date_range:
  start: "2015-01-01"
  end: null

geography: []
languages:
  - en
excluded_sponsors: []

# M-28 Fix #1: regulatory_anchors for policy-domain queries.
regulatory_anchors:
  - federalregister.gov
  - regulations.gov
  - gao.gov
  - congress.gov
  - whitehouse.gov
  - cbo.gov
  - who.int
  - ec.europa.eu


# -------------------------------------------------------------------
# M-62 (2026-04-23): V30 Report Contract Architecture — non-clinical
# generalization guard. Codex plan review rev #8 required proving the
# architecture works with non-DOI / non-paper entity types. This
# policy contract exercises four non-clinical entity types (all
# use `url_pattern` as the retrieval locator; no DOIs; no PMIDs):
#   - statute            — IRA §11001 on congress.gov
#   - regulatory_ruling  — CMS revised guidance on cms.gov
#   - court_decision     — federal-court cases on courtlistener.com
#   - cbo_report         — CBO baseline analysis on cbo.gov
#
# For M-61 human-curated completions, court_decision entities also
# exercise the `source_locator` as a Bluebook case citation (not a
# URL, not a DOI) — the strongest non-DOI identifier path in the
# whole V30 architecture. See
# tests/polaris_graph/test_m62_non_clinical_regression.py
# TestM61NonClinicalHumanCompletion.test_court_decision_completion_with_case_citation_locator.
#
# If M-54..M-61 work for this contract without code changes, that
# proves architecture-not-clinical-hardcoding per Codex rev #7/#8.
# -------------------------------------------------------------------
per_query_report_contract:
  policy_medicare_drug_price:
    schema_version: "v30.1"

    section_order:
      - Statute
      - Implementation
      - Litigation
      - Economic_Analysis

    required_entities:
      - id: ira_2022_section_11001
        type: statute
        anchor: IRA-2022-S11001
        url_pattern: congress.gov/bill/117th-congress/house-bill/5376
        required_fields:
          - enactment_year
          - section_citation
          - effective_date
          - covered_drugs_criteria
          - negotiation_timeline
          - penalty_structure
        min_fields_for_completion: 4
        rendering_slot: statute_ira_s11001

      - id: cms_revised_guidance_2024
        type: regulatory_ruling
        anchor: CMS-Revised-Guidance-2024
        url_pattern: cms.gov/files/document
        required_fields:
          - issuing_agency
          - publication_date
          - scope_of_applicability
          - methodology_change_summary
          - public_comment_period
        min_fields_for_completion: 3
        rendering_slot: implementation_cms_guidance

      - id: merck_v_becerra_2024
        type: court_decision
        anchor: Merck-v-Becerra
        url_pattern: courtlistener.com
        required_fields:
          - court
          - docket_number
          - disposition
          - constitutional_basis
          - date_decided
        min_fields_for_completion: 3
        rendering_slot: litigation_merck

      - id: nfib_v_ira_2024
        type: court_decision
        anchor: NFIB-v-HHS
        url_pattern: courtlistener.com
        required_fields:
          - court
          - docket_number
          - disposition
          - plaintiff_standing
          - date_decided
        min_fields_for_completion: 3
        rendering_slot: litigation_nfib

      - id: cbo_baseline_ira_2022
        type: cbo_report
        anchor: CBO-Baseline-IRA
        url_pattern: cbo.gov/publication
        required_fields:
          - projection_window
          - gross_savings_estimate
          - methodology
          - sensitivity_scenarios
        min_fields_for_completion: 3
        rendering_slot: economic_cbo_baseline

    rendering_slots:
      statute_ira_s11001:
        section: Statute
        subsection_title: "IRA 2022 §11001 (Public Law 117-169)"
        ordering: 1
        required: true
      implementation_cms_guidance:
        section: Implementation
        subsection_title: "CMS revised guidance (2024)"
        ordering: 1
        required: true
      litigation_merck:
        section: Litigation
        subsection_title: "Merck & Co. v. Becerra (D.D.C. 2024)"
        ordering: 1
        required: true
      litigation_nfib:
        section: Litigation
        subsection_title: "NFIB v. HHS (W.D. Tex. 2024)"
        ordering: 2
        required: true
      economic_cbo_baseline:
        section: Economic_Analysis
        subsection_title: "CBO 10-year baseline IRA savings projection"
        ordering: 1
        required: true

  # ===================================================================
  # I-meta-002 PR-10 — DRB-EN benchmark slug #90 (ADAS liability, crime
  # & law), SOURCE-CRITICAL. Authored BLIND to the frozen gold rubric /
  # freeze pins / competitor answers (outputs/dr_benchmark was sealed out
  # of the repo during authoring; see
  # .codex/I-meta-002-pr10-contracts/contract_attestation.txt).
  #
  # Allowed inputs used (NATIVE only): the locked question text ("liability
  # allocation in accidents involving vehicles with advanced driver-
  # assistance systems (ADAS) in a shared human-machine driving context
  # ... integrate technical principles of ADAS, existing legal frameworks,
  # and relevant case law ... conclude with proposed regulatory
  # guidelines"); this policy scope_template + completeness_checklist
  # (regulatory_framework / enforcement / precedent / international-
  # comparison topics); and general law-and-technology domain knowledge
  # of the load-bearing standards, statutes, case law, and agency
  # documents a faithful analysis MUST cite.
  #
  # Severity rationale (NATIVE): no S0. Every D8 s0_must_cover category is
  # clinical; the policy domain defines NO must-cover catastrophic/
  # invalidating omission category, so per the design ruling severities
  # are S1/S2/S3 only. The load-bearing technical standard (SAE J3016
  # automation levels) and the controlling legal-framework / case-law
  # sources without which the liability analysis is invalid -> S1; the
  # supporting agency-report / regulatory-guideline context -> S2; the
  # forward-looking proposed-guideline framing -> S3. Canonical id is
  # `url_pattern` (statutes / standards / case law / agency reports do
  # not carry a biomedical DOI) — the FULL canonical URL (exact-equality
  # coverage, never a fragment).
  drb_90_adas_liability:
    schema_version: "v30.1"

    section_order:
      - Technical_Standard
      - Legal_Framework
      - Case_Law
      - Regulatory_Recommendations

    required_entities:
      - id: sae_j3016_automation_levels
        type: technical_standard
        severity: S1
        anchor: SAE-J3016
        # SAE J3016 driving-automation levels (0-5) — the load-bearing
        # technical taxonomy that defines the human-machine responsibility
        # boundary; a liability analysis is invalid without it.
        url_pattern: https://www.sae.org/standards/content/j3016_202104/
        coverage_content_requirements:
          - j3016
        required_fields:
          - standard_id
          - automation_levels_defined
          - human_role_per_level
          - fallback_responsibility
        min_fields_for_completion: 2
        rendering_slot: technical_sae_levels

      - id: unece_alks_regulation_framework
        type: regulation
        severity: S1
        anchor: UNECE-ALKS
        # UNECE WP.29 automated-lane-keeping (ALKS) regulation — the
        # controlling international regulatory framework allocating
        # system-vs-driver responsibility during automated operation.
        url_pattern: https://unece.org/transport/documents/2021/03/standards/un-regulation-no-157-automated-lane-keeping-systems-alks
        coverage_content_requirements:
          - lane keeping
        required_fields:
          - instrument
          - scope_of_automation
          - driver_obligations
          - system_obligations
          - transition_demand
        min_fields_for_completion: 3
        rendering_slot: legal_framework_unece

      - id: nhtsa_ads_policy_framework
        type: agency_report
        severity: S2
        anchor: NHTSA-ADS
        # NHTSA automated-driving-systems policy / standing general order
        # on crash reporting — the US agency framework and the data
        # source for ADAS-involved crash liability analysis.
        url_pattern: https://www.nhtsa.gov/laws-regulations/standing-general-order-crash-reporting
        coverage_content_requirements:
          - nhtsa
        required_fields:
          - issuing_agency
          - scope
          - reporting_obligation
          - liability_relevance
        min_fields_for_completion: 2
        rendering_slot: legal_framework_nhtsa

      - id: product_liability_doctrine
        type: authoritative_source
        severity: S1
        anchor: Products-liability-Restatement
        # The product-liability / negligence doctrinal framework
        # (Restatement (Third) of Torts: Products Liability; defect
        # categories) under which an ADAS manufacturer's responsibility is
        # assessed — load-bearing for the driver-vs-system boundary.
        # url_pattern corrected: the prior /publications/show/... path
        # returns HTTP 404. Replaced with the live canonical American Law
        # Institute publication page for "Restatement of the Law Third,
        # Torts: Products Liability" (HTTP 200).
        url_pattern: https://www.ali.org/publications/restatement-law-third/torts-third
        coverage_content_requirements:
          - product liability
        required_fields:
          - doctrine
          - defect_categories
          - manufacturer_duty
          - driver_duty
        min_fields_for_completion: 2
        rendering_slot: legal_framework_product_liability

      - id: adas_crash_case_law
        type: legal_case
        severity: S1
        anchor: Benavides-v-Tesla
        # Relevant case law on ADAS/automated-feature-involved crash
        # liability (the question explicitly requires "relevant case
        # law"). The canonical id is the authoritative court-record URL.
        # url_pattern corrected: the prior CourtListener SEARCH-RESULTS URL
        # (a query page) can never bind under exact-equality coverage.
        # Replaced with the STABLE CourtListener docket record for
        # Benavides v. Tesla, Inc., No. 1:21-cv-21940 (S.D. Fla.) — nature
        # of suit "365 Personal Inj. Prod. Liability"; the first US verdict
        # apportioning shared driver-vs-system fault in an Autopilot/ADAS
        # crash (33% Tesla, 67% driver) — directly on-point for the
        # shared-human-machine-control liability question. HTTP 200, stable.
        url_pattern: https://www.courtlistener.com/docket/59932667/benavides-v-tesla-inc/
        coverage_content_requirements:
          - liability
        required_fields:
          - case_name
          - court
          - disposition
          - liability_holding
          - applicability_to_shared_control
        min_fields_for_completion: 3
        rendering_slot: case_law_adas

      - id: proposed_regulatory_guidelines
        type: policy_report
        severity: S3
        anchor: Proposed-guidelines
        # The question's required CONCLUSION — proposed regulatory
        # guidelines / recommendations. Observe-only (S3): a synthesis
        # deliverable, anchored to an authoritative policy framework
        # (e.g. an NTSB / national AV-policy recommendation set) rather
        # than a single load-bearing empirical claim.
        url_pattern: https://www.ntsb.gov/Advocacy/mwl/Pages/mwl-22-23/mwl-hs.aspx
        coverage_content_requirements:
          - recommendation
        required_fields:
          - recommendation
          - allocation_principle
          - implementation_path
        min_fields_for_completion: 1
        rendering_slot: recommendations_synthesis

    rendering_slots:
      technical_sae_levels:
        section: Technical_Standard
        subsection_title: "SAE J3016 driving-automation levels and the human-machine boundary"
        ordering: 1
        required: true
      legal_framework_unece:
        section: Legal_Framework
        subsection_title: "UNECE WP.29 ALKS regulation (system-vs-driver responsibility)"
        ordering: 1
        required: true
      legal_framework_nhtsa:
        section: Legal_Framework
        subsection_title: "NHTSA automated-driving-systems policy and crash-reporting order"
        ordering: 2
        required: true
      legal_framework_product_liability:
        section: Legal_Framework
        subsection_title: "Product-liability / negligence doctrine for ADAS manufacturers"
        ordering: 3
        required: true
      case_law_adas:
        section: Case_Law
        subsection_title: "Relevant ADAS / automated-feature crash-liability case law"
        ordering: 1
        required: true
      recommendations_synthesis:
        section: Regulatory_Recommendations
        subsection_title: "Proposed regulatory guidelines and liability-allocation recommendations"
        ordering: 1
        required: false
