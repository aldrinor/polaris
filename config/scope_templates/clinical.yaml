# Clinical domain scope template — HONEST-REBUILD Phase 2c.
#
# Used when the user is researching drug efficacy, safety, mechanism,
# clinical guidelines, meta-analyses, or treatment comparisons. The
# corpus should be dominated by peer-reviewed primary studies (T1)
# and systematic reviews (T2), with regulatory documents (T3) as the
# authoritative source for labelled indications and safety warnings.
#
# Industry marketing / HCP-portal sources (T5) are allowed but capped
# at <=15% and must not dominate any section. Commentary / blog (T6)
# and conference abstracts / preprints (T7) are allowed only as
# supporting or hypothesis-generating evidence.

domain: clinical
description: >
  Peer-reviewed-primary-evidence-dominant corpus for clinical research.
  Follows PRISMA-style inclusion / exclusion patterns.

# Default PICO framing overrides. The scope gate will attempt heuristic
# extraction from the query first; these are fallback defaults.
pico_defaults:
  comparator: placebo or standard of care

# Inclusion criteria surfaced to the user in the pre-registered protocol.
inclusion_criteria:
  - Peer-reviewed journal article indexed in PubMed / OpenAlex / Semantic Scholar.
  - Human studies.
  - Published in English, or with a certified English translation.
  - Reports quantitative outcomes (efficacy, safety, PK/PD, or QoL).
  - Regulatory documents (FDA/EMA/Health Canada/MHRA/TGA/PMDA/NMPA) when
    discussing labelled indications, contraindications, or safety warnings.

# Exclusion criteria surfaced to the user in the pre-registered protocol.
exclusion_criteria:
  - User-upload document hosts (Scribd, SlideShare, ResearchGate) unless
    the document is also available at the original issuer's URL.
  - Student journals (high school journals, undergraduate journals).
  - Press releases from pharmaceutical manufacturers without a peer-reviewed
    primary source to corroborate claims.
  - Blog posts and law-firm commentary used as primary evidence (allowed as
    supplementary context only).
  - In vitro and animal-only studies when the research question is human-
    clinical (allowed for mechanistic sections only).

# Expected final-corpus tier distribution. The corpus-approval gate
# (Phase 2g) checks actual retrieval against this and shows the delta
# to the user.
expected_tier_distribution:
  - tier: T1
    min_fraction: 0.30
    max_fraction: 0.60
    rationale: >
      Peer-reviewed primary studies (RCTs, cohort, case-control) are the
      foundation of clinical efficacy and safety claims.
  - tier: T2
    min_fraction: 0.15
    max_fraction: 0.40
    rationale: >
      Systematic reviews and meta-analyses consolidate primary evidence
      and are the preferred source for magnitude estimates.
  - tier: T3
    min_fraction: 0.05
    max_fraction: 0.25
    rationale: >
      Regulatory documents (FDA labels, EMA EPARs, Health Canada monographs)
      are authoritative for labelled indications and safety warnings.
  - tier: T4
    min_fraction: 0.00
    max_fraction: 0.20
    rationale: >
      Narrative reviews and clinical guideline articles — useful for
      context and mechanism, but not for novel efficacy claims.
  - tier: T5
    min_fraction: 0.00
    max_fraction: 0.15
    rationale: >
      Industry HCP portals and marketing pages — allowed for labelled
      claims that are already corroborated by T3 regulatory sources.
  - tier: T6
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Commentary, news, and blog posts — allowed only as context,
      not as primary evidence.
  - tier: T7
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Conference abstracts and preprints — hypothesis-generating only.
      Should not dominate a systematic review corpus.

# Date range. null means unbounded.
date_range:
  start: "2010-01-01"
  end: null

# Geography filter. Empty = no filter.
geography: []

# Languages filter.
languages:
  - en

# Sponsor exclusion. Common pattern: exclude pharma-only-funded studies
# where no independent adjudication committee was involved. The corpus-
# approval gate shows funding sources alongside each source.
excluded_sponsors: []

# M-28 Fix #1 (2026-04-20): regulatory_anchors are URL hosts that the
# amplification layer should target with dedicated `site:{anchor}`
# queries so the corpus includes authoritative label / monograph /
# guidance content. The list is configurable per domain; empty or
# missing list means no regulatory expansion (backwards-compat).
# Absolutely no hard-coded host lists in Python — only this template.
regulatory_anchors:
  - accessdata.fda.gov   # FDA Drugs@FDA (label, approval history, BLA/NDA docs)
  - ema.europa.eu        # EMA SmPC (Summary of Product Characteristics)
  - fda.gov              # FDA news / safety announcements / guidance
  - hres.ca              # Health Canada Regulatory Decision Summary PDFs
  - pdf.hres.ca          # M-37: Health Canada DPD Product Monograph PDFs
  - canada.ca            # Health Canada Product Monograph search
  - recalls-rappels.canada.ca  # M-37: Canadian safety recalls / DHPP
  - health-products.canada.ca  # M-37: Health Canada Drug Products DB
  - hpfb-dgpsa.ca        # M-42d: HPFB Drug and Health Product Portal (DHPP root)
  - who.int              # WHO Essential Medicines, guidelines
  - nice.org.uk          # UK National Institute for Health and Care Excellence

# M-35 (2026-04-21): primary-trial anchors are trial-name tokens that
# the amplification layer should wrap in quotes and append to the
# question to surface pivotal-trial primary publications (typically
# NEJM / Lancet / JAMA / Nature). Trial names are query-specific (the
# trial program that matters depends on the drug / condition under
# study), so this field is keyed by SWEEP SLUG rather than applied
# globally to the whole clinical domain. Missing slug = no expansion.
# Zero trial names are hard-coded in Python — they live only here.
#
# Covers Codex DR pass-11 gap #1: "Replace the citation mix with
# primary SURPASS-1..SURPASS-6, SURPASS-CVOT, SURMOUNT-2/4 trial
# papers as first-class sources." V23 corpus had 62 trial-mention
# rows but mostly conference abstracts and post-hoc pooled analyses;
# the primary NEJM / Lancet publications for SURPASS-1/2/3 and
# SURMOUNT-1 were absent. Targeted `"SURPASS-1" {question}` queries
# surface the pivotal trial publication directly.
per_query_primary_trial_anchors:
  clinical_tirzepatide_t2dm:
    - SURPASS-1       # Rosenstock et al., Lancet 2021 — monotherapy
    - SURPASS-2       # Frías et al., NEJM 2021 — vs semaglutide
    - SURPASS-3       # Ludvik et al., Lancet 2021 — vs insulin degludec
    - SURPASS-4       # Del Prato et al., Lancet 2021 — high-CV-risk
    - SURPASS-5       # Dahl et al., JAMA 2022 — + insulin glargine
    - SURPASS-6       # Rosenstock et al., JAMA 2023 — vs insulin lispro
    - SURPASS-CVOT    # Ongoing cardiovascular outcome trial
    - SURMOUNT-1      # Jastreboff et al., NEJM 2022 — obesity
    - SURMOUNT-2      # Garvey et al., Lancet 2023 — obesity + T2D
    - SURMOUNT-3      # Wadden et al., Nat Med 2023 — after ILI
    - SURMOUNT-4      # Aronne et al., JAMA 2023 — weight maintenance
  # I-bug-776 (#817, Codex b1): the four landmark NOAC-vs-warfarin pivotal RCTs
  # that every NVAF anticoagulation guideline (ESC / ACC-AHA) is built on.
  # Without these anchors a "current guidelines" question surfaces only the
  # guidelines/reviews (T2) and never the underlying primaries (T1) -> T1<3 ->
  # corpus_inadequate. Slug-scoped (no global fallback per Codex guardrail).
  clinical_afib_anticoagulation:
    - ARISTOTLE            # Granger et al., NEJM 2011 — apixaban vs warfarin
    - ROCKET-AF            # Patel et al., NEJM 2011 — rivaroxaban vs warfarin
    - RE-LY                # Connolly et al., NEJM 2009 — dabigatran vs warfarin
    - ENGAGE-AF-TIMI-48    # Giugliano et al., NEJM 2013 — edoxaban vs warfarin

# M-48 (2026-04-22): per-anchor first-author + journal query variants.
# Codex V28 plan pass-1 approved; Codex V28 plan pass-2 APPROVED.
# V27 retrieved 4/11 primary trials; Codex required per-anchor variants
# (first-author surname + target journal) to raise primary landing
# probability from ~36% to target ≥90%. Each variant is a SECOND query
# emitted alongside `"{anchor}" {question}`, so retrieval cost per
# anchor roughly doubles (acceptable: 11 * $0.0001 extra ≈ $0.001).
#
# Variants are optional. If anchor has no variant entry, only the
# original anchor query fires (backwards-compatible).
per_query_primary_trial_variants:
  clinical_tirzepatide_t2dm:
    SURPASS-1: Rosenstock Lancet tirzepatide monotherapy
    SURPASS-2: Frías NEJM tirzepatide semaglutide
    SURPASS-3: Ludvik Lancet tirzepatide insulin degludec
    SURPASS-4: Del Prato Lancet tirzepatide glargine cardiovascular
    SURPASS-5: Dahl JAMA tirzepatide glargine add-on
    SURPASS-6: Rosenstock JAMA tirzepatide lispro premeal
    SURPASS-CVOT: Nicholls tirzepatide cardiovascular outcomes MACE
    SURMOUNT-1: Jastreboff NEJM tirzepatide obesity weight loss
    SURMOUNT-2: Garvey Lancet tirzepatide obesity type 2 diabetes
    SURMOUNT-3: Wadden Nature Medicine tirzepatide intensive lifestyle
    SURMOUNT-4: Aronne JAMA tirzepatide weight maintenance
  # I-bug-776 (#817): first-author + journal + drug variants raise the
  # primary-publication landing probability for the afib anchors.
  clinical_afib_anticoagulation:
    ARISTOTLE: Granger NEJM apixaban warfarin atrial fibrillation
    ROCKET-AF: Patel NEJM rivaroxaban warfarin atrial fibrillation
    RE-LY: Connolly NEJM dabigatran warfarin atrial fibrillation
    ENGAGE-AF-TIMI-48: Giugliano NEJM edoxaban warfarin atrial fibrillation

# I-bug-776 (#817) LAYER 4 (Codex decision b): per-anchor primary-trial DOIs,
# injected as DIRECT doi.org candidate URLs (not search queries). For a
# guideline-synthesis question, search ranking buries the pivotal primaries, so
# the layer-3 anchor SEARCH queries don't surface them. These DOIs are OA-verified
# (Unpaywall returns NEJM PDFs) and were fact-checked by Codex against the NEJM
# article DOIs. They pass the same fetch/OA/extraction/tier/adequacy gates — a
# seed counts as T1 only if the classifier identifies the fetched primary trial.
per_query_primary_trial_dois:
  clinical_afib_anticoagulation:
    ARISTOTLE: 10.1056/NEJMoa1107039          # Granger, NEJM 2011 — apixaban
    ROCKET-AF: 10.1056/NEJMoa1009638          # Patel, NEJM 2011 — rivaroxaban
    RE-LY: 10.1056/NEJMoa0905561              # Connolly, NEJM 2009 — dabigatran
    ENGAGE-AF-TIMI-48: 10.1056/NEJMoa1310907  # Giugliano, NEJM 2013 — edoxaban

# M-48 (2026-04-22): per-anchor population-scope labels.
# Codex V28 plan pass-2 verbatim requirement: SURMOUNT-2 is direct T2D
# + obesity evidence; SURMOUNT-1, -3, -4 are obesity-only and indirect
# for a T2D efficacy question. Evidence rows matching these anchors
# must be tagged so the generator does NOT merge their weight-loss
# estimates into direct T2D efficacy claims.
#
# Schema: one of {"direct", "indirect_for_t2d", "indirect"}.
#   direct: row is on-question for a T2D research question.
#   indirect_for_t2d: row is off-question for T2D but useful for
#     weight-management framing; generator must label it as such.
#   indirect: row is tangential; generator should cite at most in a
#     "related evidence" paragraph.
# Missing entry → assumed direct (backwards-compatible).
per_query_trial_population_scope:
  clinical_tirzepatide_t2dm:
    SURPASS-1: direct
    SURPASS-2: direct
    SURPASS-3: direct
    SURPASS-4: direct
    SURPASS-5: direct
    SURPASS-6: direct
    SURPASS-CVOT: direct
    SURMOUNT-1: indirect_for_t2d  # obesity-only population
    SURMOUNT-2: direct            # T2D + obesity population — the KEY SURMOUNT for T2D question
    SURMOUNT-3: indirect_for_t2d  # weight-maintenance-after-ILI, obesity-only
    SURMOUNT-4: indirect_for_t2d  # weight-maintenance, obesity-only


# -------------------------------------------------------------------
# M-54 (2026-04-23): V30 Report Contract Architecture.
# Codex V30 plan pass-1 CONDITIONAL-no-blockers.
#
# per_query_report_contract defines the MANDATORY CONTENT MODEL for
# each research-question slug. Every required entity has an explicit
# rendering slot, every slot has required fields, and the pipeline
# commits to either FILL the slot with field-level structured data OR
# emit explicit "field not extractable" language (M-60). No silent
# omission.
#
# Entity types supported at M-54 schema level:
#   pivotal_trial     - named clinical trial with primary publication
#   mechanism_primary - pharmacology primary (clamp/PK/receptor study)
#   regulatory        - jurisdiction-specific label / guidance / monograph
#   (extensible; compiler must not hard-code these - see M-62)
# -------------------------------------------------------------------
per_query_report_contract:
  clinical_tirzepatide_t2dm:
    schema_version: "v30.1"

    # Explicit cross-section rendering order (M-55 Codex audit
    # Medium fix). M-55 compiler uses this; falls back to
    # alphabetic-by-label with warning if absent.
    section_order:
      - Efficacy
      - Mechanism
      - Regulatory

    # I-meta-002 PR-9/M3b — native Gate-B per-entity severity annotations
    # (pre-registered, NATIVE, derived from each entity's clinical role; NOT
    # from any benchmark rubric/competitor source). Consumed ONLY by the native
    # 4-role builder (src/polaris_graph/roles/native_gate_b_inputs.py); the V30
    # contract loader (nodes/report_contract.py) ignores these keys. Mapping
    # rationale: pivotal efficacy/CVOT trials carry decision-relevant efficacy
    # evidence -> S1; the mechanism clamp study is supporting context -> S2;
    # the regulatory labels/HTAs carry the S0 safety categories (boxed warnings,
    # contraindications, dosing limits, pregnancy/renal/hepatic cautions,
    # regulatory status) -> S0 with a valid s0_category + non-blank
    # coverage_content_requirements (an S0 category is credited only when a
    # VERIFIED claim deterministically matches its content tokens).
    required_entities:
      - id: surpass_1_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-1
        doi: 10.1016/S0140-6736(21)01324-6
        pmid: 34186022
        journal: Lancet
        year: 2021
        population_scope: direct
        required_fields:
          - N
          - population
          - comparator
          - baseline_hba1c
          - primary_endpoint
          - timepoint
          - etd_with_uncertainty
          - safety_signal
          - study_design
          - sponsor
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_1

      - id: surpass_2_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-2
        doi: 10.1056/NEJMoa2107519
        pmid: 34170647
        journal: NEJM
        year: 2021
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, primary_endpoint, timepoint, etd_with_uncertainty, safety_signal, study_design, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_2

      - id: surpass_3_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-3
        doi: 10.1016/S0140-6736(21)01443-4
        pmid: 34370970
        journal: Lancet
        year: 2021
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, primary_endpoint, timepoint, etd_with_uncertainty, safety_signal, study_design, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_3

      - id: surpass_4_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-4
        doi: 10.1016/S0140-6736(21)02188-7
        pmid: 34672967
        journal: Lancet
        year: 2021
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, primary_endpoint, timepoint, etd_with_uncertainty, durability_104wk, safety_signal, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_4

      - id: surpass_5_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-5
        doi: 10.1001/jama.2022.0078
        pmid: 35133415
        journal: JAMA
        year: 2022
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, primary_endpoint, timepoint, etd_with_uncertainty, safety_signal, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_5

      - id: surpass_6_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-6
        # M-69 Fix #1 (Codex run-9 audit): both DOI and PMID
        # were wrong — pointed at "Glioblastoma and Other
        # Primary Brain Malignancies in Adults" (JAMA review),
        # not Rosenstock SURPASS-6. Verified via PubMed
        # title-search for "Rosenstock SURPASS-6 tirzepatide
        # insulin lispro": correct PMID 37786396, DOI
        # 10.1001/jama.2023.20294. Run-9 [7] was misbound to
        # the glioblastoma paper because of this.
        doi: 10.1001/jama.2023.20294
        pmid: 37786396
        journal: JAMA
        year: 2023
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, primary_endpoint, timepoint, etd_with_uncertainty, safety_signal, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_6

      - id: surpass_cvot_primary
        type: pivotal_trial
        severity: S1
        anchor: SURPASS-CVOT
        doi: 10.1056/NEJMoa2509079
        pmid: null
        journal: NEJM
        year: 2025
        population_scope: direct
        required_fields: [N, population, comparator, primary_endpoint, timepoint, hr_with_uncertainty, noninferiority_p, superiority_p, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_cvot

      - id: surmount_2_primary
        type: pivotal_trial
        severity: S1
        anchor: SURMOUNT-2
        doi: 10.1016/S0140-6736(23)01200-X
        pmid: 37385275
        journal: Lancet
        year: 2023
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, baseline_weight, primary_endpoint, timepoint, etd_with_uncertainty, safety_signal, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surmount_2

      - id: thomas_clamp_2022
        type: mechanism_primary
        severity: S2
        anchor: Thomas-clamp
        doi: 10.1016/S2213-8587(22)00085-7
        pmid: 35468322
        journal: Lancet Diabetes Endocrinol
        year: 2022
        # Codex M-66 pass-3 — Thomas abstract reports: clamp
        # disposition index (primary endpoint combining secretion
        # and sensitivity), M value (insulin sensitivity), total
        # insulin secretion rate, glucagon concentrations (fasting
        # + postprandial), glucose control, phase-1 study design,
        # participants on metformin, 15 mg + semaglutide 1 mg +
        # placebo 3:3:2 random assignment, week-28 endpoint.
        # Original fields (first_phase/second_phase_insulin_secretion,
        # half_life_days) are not reported in the abstract.
        required_fields: [population, comparator, primary_endpoint, timepoint, m_value_insulin_sensitivity, total_insulin_secretion_rate, glucagon_suppression, study_design, participant_n, sponsor]
        min_fields_for_completion: 3
        rendering_slot: mechanism_clamp

      # V30 Phase-2 M-66b-R (commit after run-3 diagnosis):
      # url_pattern now carries the FULL canonical URL — not a
      # domain fragment — so M-56 _fetch_url_pattern can resolve
      # it via AccessBypass. Domain-fragment patterns produced
      # empty fetches in run-3 because the URL was un-dispatchable.
      # Each URL below was manually verified to return >2K chars
      # of relevant regulatory content.
      - id: fda_mounjaro_label
        type: regulatory
        severity: S0
        s0_category: black_box_warnings
        # Deterministic tokens credited only when a VERIFIED claim cited to this
        # label states the thyroid C-cell boxed warning (FDA Mounjaro PI Boxed Warning).
        coverage_content_requirements:
          - boxed warning
          - thyroid
        jurisdiction: FDA
        label_name: Mounjaro
        url_pattern: https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=d2d7da5d-ad07-4228-955f-cf7e355c8cc0
        required_fields: [indications, boxed_warning, contraindications, warnings_and_precautions, dosing]
        min_fields_for_completion: 3
        rendering_slot: regulatory_fda_t2d

      - id: fda_zepbound_label
        type: regulatory
        severity: S0
        s0_category: contraindications
        # Credited only when a VERIFIED claim cited to this label states the
        # contraindication (medullary thyroid carcinoma history / MEN 2).
        coverage_content_requirements:
          - contraindicated
          - medullary thyroid
        jurisdiction: FDA
        label_name: Zepbound
        url_pattern: https://www.accessdata.fda.gov/drugsatfda_docs/label/2023/217806s000lbl.pdf
        required_fields: [indications, bmi_thresholds, boxed_warning, contraindications, dosing]
        min_fields_for_completion: 3
        rendering_slot: regulatory_fda_obesity

      - id: ema_mounjaro_epar
        type: regulatory
        severity: S0
        s0_category: regulatory_status
        # Credited only when a VERIFIED claim cited to the EPAR states the EMA
        # marketing-authorisation status for Mounjaro.
        coverage_content_requirements:
          - marketing authorisation
          - mounjaro
        jurisdiction: EMA
        label_name: Mounjaro
        url_pattern: https://www.ema.europa.eu/en/medicines/human/EPAR/mounjaro
        required_fields: [indications, pediatric_indication, contraindications, additional_monitoring, osa_extension]
        min_fields_for_completion: 3
        rendering_slot: regulatory_ema

      - id: nice_ta924_t2d
        type: regulatory
        severity: S0
        s0_category: regulatory_status
        # Credited only when a VERIFIED claim cited to TA924 states the NICE
        # recommendation status for tirzepatide in type 2 diabetes.
        coverage_content_requirements:
          - nice
          - recommended
        jurisdiction: NICE
        label_name: TA924
        url_pattern: https://www.nice.org.uk/guidance/ta924
        required_fields: [triple_therapy_criteria, bmi_threshold, ethnic_adjusted_thresholds, occupational_implications, commercial_arrangement]
        min_fields_for_completion: 3
        rendering_slot: regulatory_nice_t2d

      - id: nice_ta1026_obesity
        type: regulatory
        severity: S0
        s0_category: regulatory_status
        # Credited only when a VERIFIED claim cited to TA1026 states the NICE
        # recommendation status for tirzepatide in obesity / weight management.
        coverage_content_requirements:
          - nice
          - recommended
        jurisdiction: NICE
        label_name: TA1026
        url_pattern: https://www.nice.org.uk/guidance/ta1026
        required_fields: [indication, managed_access_agreement, specialist_services_requirement]
        min_fields_for_completion: 2
        rendering_slot: regulatory_nice_obesity

      - id: hc_mounjaro_monograph
        type: regulatory
        severity: S0
        s0_category: contraindications
        # Credited only when a VERIFIED claim cited to the Canadian Product
        # Monograph states the contraindication (hypersensitivity to tirzepatide).
        coverage_content_requirements:
          - contraindicated
          - hypersensitivity
        jurisdiction: HC
        label_name: Mounjaro Canadian Product Monograph
        url_pattern: https://health-products.canada.ca/dpd-bdpp/dispatch-repartition?q=Mounjaro&type=prod
        required_fields: [indications, serious_warnings_box, contraindications, dosing]
        min_fields_for_completion: 3
        rendering_slot: regulatory_hc

    rendering_slots:
      efficacy_surpass_1:
        section: Efficacy
        subsection_title: "SURPASS-1 (Rosenstock et al., Lancet 2021)"
        ordering: 1
        required: true
      efficacy_surpass_2:
        section: Efficacy
        subsection_title: "SURPASS-2 (Frias et al., NEJM 2021)"
        ordering: 2
        required: true
      efficacy_surpass_3:
        section: Efficacy
        subsection_title: "SURPASS-3 (Ludvik et al., Lancet 2021)"
        ordering: 3
        required: true
      efficacy_surpass_4:
        section: Efficacy
        subsection_title: "SURPASS-4 (Del Prato et al., Lancet 2021)"
        ordering: 4
        required: true
      efficacy_surpass_5:
        section: Efficacy
        subsection_title: "SURPASS-5 (Dahl et al., JAMA 2022)"
        ordering: 5
        required: true
      efficacy_surpass_6:
        section: Efficacy
        subsection_title: "SURPASS-6 (Rosenstock et al., JAMA 2023)"
        ordering: 6
        required: true
      efficacy_cvot:
        section: Efficacy
        subsection_title: "SURPASS-CVOT (Nicholls et al., NEJM 2025)"
        ordering: 7
        required: true
      efficacy_surmount_2:
        section: Efficacy
        subsection_title: "SURMOUNT-2 T2D+Obesity (Garvey et al., Lancet 2023)"
        ordering: 8
        required: true
      mechanism_clamp:
        section: Mechanism
        subsection_title: "Human hyperinsulinemic-euglycemic clamp (Thomas et al., Lancet D&E 2022)"
        ordering: 1
        required: true
      regulatory_fda_t2d:
        section: Regulatory
        subsection_title: "US FDA (Mounjaro for T2D)"
        ordering: 1
        required: true
      regulatory_fda_obesity:
        section: Regulatory
        subsection_title: "US FDA (Zepbound for chronic weight management)"
        ordering: 2
        required: true
      regulatory_ema:
        section: Regulatory
        subsection_title: "EU EMA (Mounjaro including pediatric >=10 yrs)"
        ordering: 3
        required: true
