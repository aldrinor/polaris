# Clinical domain scope template — HONEST-REBUILD Phase 2c.
#
# Used when the user is researching drug efficacy, safety, mechanism,
# clinical guidelines, meta-analyses, or treatment comparisons. The
# corpus should be dominated by peer-reviewed primary studies (T1)
# and systematic reviews (T2), with regulatory documents (T3) as the
# authoritative source for labelled indications and safety warnings.
#
# Industry marketing / HCP-portal sources (T5) are allowed but capped
# at <=15% and must not dominate any section. Commentary / blog (T6)
# and conference abstracts / preprints (T7) are allowed only as
# supporting or hypothesis-generating evidence.

domain: clinical
description: >
  Peer-reviewed-primary-evidence-dominant corpus for clinical research.
  Follows PRISMA-style inclusion / exclusion patterns.

# Default PICO framing overrides. The scope gate will attempt heuristic
# extraction from the query first; these are fallback defaults.
pico_defaults:
  comparator: placebo or standard of care

# Inclusion criteria surfaced to the user in the pre-registered protocol.
inclusion_criteria:
  - Peer-reviewed journal article indexed in PubMed / OpenAlex / Semantic Scholar.
  - Human studies.
  - Published in English, or with a certified English translation.
  - Reports quantitative outcomes (efficacy, safety, PK/PD, or QoL).
  - Regulatory documents (FDA/EMA/Health Canada/MHRA/TGA/PMDA/NMPA) when
    discussing labelled indications, contraindications, or safety warnings.

# Exclusion criteria surfaced to the user in the pre-registered protocol.
exclusion_criteria:
  - User-upload document hosts (Scribd, SlideShare, ResearchGate) unless
    the document is also available at the original issuer's URL.
  - Student journals (high school journals, undergraduate journals).
  - Press releases from pharmaceutical manufacturers without a peer-reviewed
    primary source to corroborate claims.
  - Blog posts and law-firm commentary used as primary evidence (allowed as
    supplementary context only).
  - In vitro and animal-only studies when the research question is human-
    clinical (allowed for mechanistic sections only).

# Expected final-corpus tier distribution. The corpus-approval gate
# (Phase 2g) checks actual retrieval against this and shows the delta
# to the user.
expected_tier_distribution:
  - tier: T1
    min_fraction: 0.30
    max_fraction: 0.60
    rationale: >
      Peer-reviewed primary studies (RCTs, cohort, case-control) are the
      foundation of clinical efficacy and safety claims.
  - tier: T2
    min_fraction: 0.15
    max_fraction: 0.40
    rationale: >
      Systematic reviews and meta-analyses consolidate primary evidence
      and are the preferred source for magnitude estimates.
  - tier: T3
    min_fraction: 0.05
    max_fraction: 0.25
    rationale: >
      Regulatory documents (FDA labels, EMA EPARs, Health Canada monographs)
      are authoritative for labelled indications and safety warnings.
  - tier: T4
    min_fraction: 0.00
    max_fraction: 0.20
    rationale: >
      Narrative reviews and clinical guideline articles — useful for
      context and mechanism, but not for novel efficacy claims.
  - tier: T5
    min_fraction: 0.00
    max_fraction: 0.15
    rationale: >
      Industry HCP portals and marketing pages — allowed for labelled
      claims that are already corroborated by T3 regulatory sources.
  - tier: T6
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Commentary, news, and blog posts — allowed only as context,
      not as primary evidence.
  - tier: T7
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Conference abstracts and preprints — hypothesis-generating only.
      Should not dominate a systematic review corpus.

# Date range. null means unbounded.
date_range:
  start: "2010-01-01"
  end: null

# Geography filter. Empty = no filter.
geography: []

# Languages filter.
languages:
  - en

# Sponsor exclusion. Common pattern: exclude pharma-only-funded studies
# where no independent adjudication committee was involved. The corpus-
# approval gate shows funding sources alongside each source.
excluded_sponsors: []

# M-28 Fix #1 (2026-04-20): regulatory_anchors are URL hosts that the
# amplification layer should target with dedicated `site:{anchor}`
# queries so the corpus includes authoritative label / monograph /
# guidance content. The list is configurable per domain; empty or
# missing list means no regulatory expansion (backwards-compat).
# Absolutely no hard-coded host lists in Python — only this template.
regulatory_anchors:
  - accessdata.fda.gov   # FDA Drugs@FDA (label, approval history, BLA/NDA docs)
  - ema.europa.eu        # EMA SmPC (Summary of Product Characteristics)
  - fda.gov              # FDA news / safety announcements / guidance
  - hres.ca              # Health Canada Regulatory Decision Summary PDFs
  - pdf.hres.ca          # M-37: Health Canada DPD Product Monograph PDFs
  - canada.ca            # Health Canada Product Monograph search
  - recalls-rappels.canada.ca  # M-37: Canadian safety recalls / DHPP
  - health-products.canada.ca  # M-37: Health Canada Drug Products DB
  - hpfb-dgpsa.ca        # M-42d: HPFB Drug and Health Product Portal (DHPP root)
  - who.int              # WHO Essential Medicines, guidelines
  - nice.org.uk          # UK National Institute for Health and Care Excellence

# M-35 (2026-04-21): primary-trial anchors are trial-name tokens that
# the amplification layer should wrap in quotes and append to the
# question to surface pivotal-trial primary publications (typically
# NEJM / Lancet / JAMA / Nature). Trial names are query-specific (the
# trial program that matters depends on the drug / condition under
# study), so this field is keyed by SWEEP SLUG rather than applied
# globally to the whole clinical domain. Missing slug = no expansion.
# Zero trial names are hard-coded in Python — they live only here.
#
# Covers Codex DR pass-11 gap #1: "Replace the citation mix with
# primary SURPASS-1..SURPASS-6, SURPASS-CVOT, SURMOUNT-2/4 trial
# papers as first-class sources." V23 corpus had 62 trial-mention
# rows but mostly conference abstracts and post-hoc pooled analyses;
# the primary NEJM / Lancet publications for SURPASS-1/2/3 and
# SURMOUNT-1 were absent. Targeted `"SURPASS-1" {question}` queries
# surface the pivotal trial publication directly.
per_query_primary_trial_anchors:
  clinical_tirzepatide_t2dm:
    - SURPASS-1       # Rosenstock et al., Lancet 2021 — monotherapy
    - SURPASS-2       # Frías et al., NEJM 2021 — vs semaglutide
    - SURPASS-3       # Ludvik et al., Lancet 2021 — vs insulin degludec
    - SURPASS-4       # Del Prato et al., Lancet 2021 — high-CV-risk
    - SURPASS-5       # Dahl et al., JAMA 2022 — + insulin glargine
    - SURPASS-6       # Rosenstock et al., JAMA 2023 — vs insulin lispro
    - SURPASS-CVOT    # Ongoing cardiovascular outcome trial
    - SURMOUNT-1      # Jastreboff et al., NEJM 2022 — obesity
    - SURMOUNT-2      # Garvey et al., Lancet 2023 — obesity + T2D
    - SURMOUNT-3      # Wadden et al., Nat Med 2023 — after ILI
    - SURMOUNT-4      # Aronne et al., JAMA 2023 — weight maintenance

# M-48 (2026-04-22): per-anchor first-author + journal query variants.
# Codex V28 plan pass-1 approved; Codex V28 plan pass-2 APPROVED.
# V27 retrieved 4/11 primary trials; Codex required per-anchor variants
# (first-author surname + target journal) to raise primary landing
# probability from ~36% to target ≥90%. Each variant is a SECOND query
# emitted alongside `"{anchor}" {question}`, so retrieval cost per
# anchor roughly doubles (acceptable: 11 * $0.0001 extra ≈ $0.001).
#
# Variants are optional. If anchor has no variant entry, only the
# original anchor query fires (backwards-compatible).
per_query_primary_trial_variants:
  clinical_tirzepatide_t2dm:
    SURPASS-1: Rosenstock Lancet tirzepatide monotherapy
    SURPASS-2: Frías NEJM tirzepatide semaglutide
    SURPASS-3: Ludvik Lancet tirzepatide insulin degludec
    SURPASS-4: Del Prato Lancet tirzepatide glargine cardiovascular
    SURPASS-5: Dahl JAMA tirzepatide glargine add-on
    SURPASS-6: Rosenstock JAMA tirzepatide lispro premeal
    SURPASS-CVOT: Nicholls tirzepatide cardiovascular outcomes MACE
    SURMOUNT-1: Jastreboff NEJM tirzepatide obesity weight loss
    SURMOUNT-2: Garvey Lancet tirzepatide obesity type 2 diabetes
    SURMOUNT-3: Wadden Nature Medicine tirzepatide intensive lifestyle
    SURMOUNT-4: Aronne JAMA tirzepatide weight maintenance

# M-48 (2026-04-22): per-anchor population-scope labels.
# Codex V28 plan pass-2 verbatim requirement: SURMOUNT-2 is direct T2D
# + obesity evidence; SURMOUNT-1, -3, -4 are obesity-only and indirect
# for a T2D efficacy question. Evidence rows matching these anchors
# must be tagged so the generator does NOT merge their weight-loss
# estimates into direct T2D efficacy claims.
#
# Schema: one of {"direct", "indirect_for_t2d", "indirect"}.
#   direct: row is on-question for a T2D research question.
#   indirect_for_t2d: row is off-question for T2D but useful for
#     weight-management framing; generator must label it as such.
#   indirect: row is tangential; generator should cite at most in a
#     "related evidence" paragraph.
# Missing entry → assumed direct (backwards-compatible).
per_query_trial_population_scope:
  clinical_tirzepatide_t2dm:
    SURPASS-1: direct
    SURPASS-2: direct
    SURPASS-3: direct
    SURPASS-4: direct
    SURPASS-5: direct
    SURPASS-6: direct
    SURPASS-CVOT: direct
    SURMOUNT-1: indirect_for_t2d  # obesity-only population
    SURMOUNT-2: direct            # T2D + obesity population — the KEY SURMOUNT for T2D question
    SURMOUNT-3: indirect_for_t2d  # weight-maintenance-after-ILI, obesity-only
    SURMOUNT-4: indirect_for_t2d  # weight-maintenance, obesity-only


# -------------------------------------------------------------------
# M-54 (2026-04-23): V30 Report Contract Architecture.
# Codex V30 plan pass-1 CONDITIONAL-no-blockers.
#
# per_query_report_contract defines the MANDATORY CONTENT MODEL for
# each research-question slug. Every required entity has an explicit
# rendering slot, every slot has required fields, and the pipeline
# commits to either FILL the slot with field-level structured data OR
# emit explicit "field not extractable" language (M-60). No silent
# omission.
#
# Entity types supported at M-54 schema level:
#   pivotal_trial     - named clinical trial with primary publication
#   mechanism_primary - pharmacology primary (clamp/PK/receptor study)
#   regulatory        - jurisdiction-specific label / guidance / monograph
#   (extensible; compiler must not hard-code these - see M-62)
# -------------------------------------------------------------------
per_query_report_contract:
  clinical_tirzepatide_t2dm:
    schema_version: "v30.1"

    # Explicit cross-section rendering order (M-55 Codex audit
    # Medium fix). M-55 compiler uses this; falls back to
    # alphabetic-by-label with warning if absent.
    section_order:
      - Efficacy
      - Mechanism
      - Regulatory

    required_entities:
      - id: surpass_1_primary
        type: pivotal_trial
        anchor: SURPASS-1
        doi: 10.1016/S0140-6736(21)01324-6
        pmid: 34186022
        journal: Lancet
        year: 2021
        population_scope: direct
        required_fields:
          - N
          - population
          - comparator
          - baseline_hba1c
          - primary_endpoint
          - timepoint
          - etd_with_uncertainty
          - safety_signal
          - study_design
          - sponsor
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_1

      - id: surpass_2_primary
        type: pivotal_trial
        anchor: SURPASS-2
        doi: 10.1056/NEJMoa2107519
        pmid: 34170647
        journal: NEJM
        year: 2021
        population_scope: direct
        required_fields: [N, population, comparator, baseline_hba1c, primary_endpoint, timepoint, etd_with_uncertainty, safety_signal, study_design, sponsor]
        min_fields_for_completion: 5
        rendering_slot: efficacy_surpass_2

