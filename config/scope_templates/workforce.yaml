# Workforce / labour scope template — Carney delivery (I-tpl-008).
#
# Used when the user is researching workforce, labour-market,
# employment, skills, automation displacement, immigration policy
# affecting labour, or productivity questions. The corpus should be
# dominated by labour-statistical agency outputs (T3) plus
# peer-reviewed labour economics research (T1) and policy-institute
# commentary (T6).

domain: workforce
description: >
  Workforce and labour-market corpus for employment trends, skills
  policy, automation displacement, and labour-economics research.
  Statistical-agency outputs and peer-reviewed labour economics are
  the primary evidence; advocacy-group reports require explicit
  funding-disclosure provenance.

inclusion_criteria:
  - "Statistics Canada (StatCan) Labour Force Survey, Survey of Employment Payrolls and Hours, Census long-form."
  - "US Bureau of Labor Statistics (BLS) — Current Employment Statistics, Current Population Survey, Job Openings and Labor Turnover Survey, Productivity and Costs."
  - "OECD Employment Outlook, OECD Skills Outlook, OECD Future of Work."
  - "International Labour Organization (ILO) reports + ILOSTAT."
  - "Eurostat labour-market statistics."
  - "Peer-reviewed labour economics journals — Quarterly Journal of Economics, Journal of Labor Economics, Labour Economics, Industrial Labor Relations Review."
  - "Government-of-Canada Employment and Social Development Canada (ESDC) outputs + provincial labour-market analytics."
  - "Policy-institute reports — Brookings Hamilton Project, Aspen Institute Future of Work, Pew Research Center labour, RBC Climate Institute Future of Work."
  - "World Bank labour-market reports for international comparisons."

exclusion_criteria:
  - "Industry-association studies presented as primary research (allowed only as T6 with funding disclosure)."
  - "Advocacy-group reports without methodology section."
  - "Recruiting / staffing-agency surveys presented as labour-market data (allowed only as T5 vendor tier)."
  - "Op-eds in business media without disclosed analyst affiliation."

expected_tier_distribution:
  - tier: T3
    min_fraction: 0.35
    max_fraction: 0.65
    rationale: >
      Statistical-agency outputs (StatCan, BLS, OECD, ILO, Eurostat)
      are the primary quantitative evidence. Required for any claim
      involving labour-market metrics.
  - tier: T1
    min_fraction: 0.10
    max_fraction: 0.30
    rationale: >
      Peer-reviewed labour economics research papers.
  - tier: T6
    min_fraction: 0.10
    max_fraction: 0.25
    rationale: >
      Policy-institute reports — Brookings Hamilton Project, Aspen,
      Pew, RBC Climate Institute. Analyst tier, NOT peer-reviewed.
  - tier: T2
    min_fraction: 0.05
    max_fraction: 0.20
    rationale: >
      Systematic reviews / meta-analyses of labour-market literature.
  - tier: T5
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Industry / staffing-agency surveys. Treat with skepticism;
      cite for technical-trade claims only.
  - tier: T4
    min_fraction: 0.00
    max_fraction: 0.10
    rationale: >
      Narrative reviews of workforce trends.

# -------------------------------------------------------------------
# source_restriction: journal_only — DORMANT prospective per-question-type profile.
# Gated by the runtime flag PG_SOURCE_RESTRICTION_JOURNAL_ONLY (default OFF); both this
# protocol field AND the flag must hold for any effect. NO benchmark question currently
# activates it (JOURNAL_ONLY_BENCHMARK_SLUGS is empty in scripts/dr_benchmark/run_gate_b.py),
# so this profile is inert and default runs are byte-identical.
#
# HISTORY (I-ready-019 #1146): I-ready-017 FIX-JO (#1134) had activated journal_only for
# drb_72 because that AI-labor LITERATURE REVIEW question's text says "only cites high-quality,
# English-language journal articles." The operator REVERSED that (2026-06-07): "many things are
# not journal, but still credibility — mainstream news, gov, some credible sites; don't
# tunnel-vision." The drb_72 paid re-run proved the harm: the GENERAL corpus was adequate
# ("adequacy=proceed uncovered=0"), but the journal-only distinct-journal COUNT floor (5<12 — a
# §-1.1-banned metadata-as-quality proxy) starved it and forced abort_corpus_inadequate. So
# drb_72 (and every question) now uses the broad credibility corpus; faithfulness is enforced by
# the verify gates (strict_verify / 4-role D8 / provenance / two-family), NOT by source-type purity.
#
# This profile (the field below + tier bands + adequacy floor) is RETAINED but dormant so a future
# DELIBERATE, operator-approved journal-only question can be re-enabled by appending its slug to
# JOURNAL_ONLY_BENCHMARK_SLUGS. It is NOT used by any current question.
source_restriction: journal_only

# -------------------------------------------------------------------
# I-deepfix-001 M2: per-citation document-TYPE WEIGHT-and-DISCLOSE preference.
# This is a NEW, DISTINCT mechanism from the dormant reversed `source_restriction:
# journal_only` DROP/COUNT-floor above — it NEVER drops a source. When active it (a)
# surfaces a per-citation document-genre label, (b) attaches an orthogonal multiplicative
# display weight to the credibility disclosure (a SECOND adjusted mean; the raw
# credibility_weight is untouched and read by every gate exactly as before), and (c) re-ranks
# the rendered Corroborated Weighted Findings so a non-journal/predatory venue falls below the
# journal articles but STAYS in the list, labelled.
#
# DOUBLE-GATED + default-OFF byte-identical: BOTH the runtime flag PG_DOCUMENT_TYPE_WEIGHT=1
# AND this `document_type_preference: journal_article` field must hold. Activation for a real
# run is a one-line operator decision for a DELIBERATE journal-only question. The faithfulness
# engine (strict_verify / NLI / 4-role D8 / span-grounding / provenance) is untouched; no
# abort/approval/release gate reads the document-type weight.
document_type_preference: journal_article
document_type_weights:        # LAW VI overridable multipliers (else module defaults). NOT a floor/cap.
  journal_article: 1.0
  review_article: 1.0
  preprint: 0.7
  working_paper: 0.6
  conference_paper: 0.7
  report: 0.5
  book: 0.5
  news: 0.4
  press_release: 0.35
  blog_commentary: 0.3
  encyclopedia: 0.25
  predatory_oa_journal: 0.25
  unknown: 0.5

journal_only_tier_distribution:
  - tier: T1
    min_fraction: 0.40
    max_fraction: 1.00
    rationale: >
      Peer-reviewed primary journal articles dominate a journal-restricted
      literature review.
  - tier: T2
    min_fraction: 0.00
    max_fraction: 0.60
    rationale: >
      Systematic reviews / meta-analyses that are themselves journal articles.

corpus_adequacy:
  journal_only:
    # Guards against a thin-corpus false pass after the citeability partition
    # (Codex design P1-4). Both must hold or the run aborts corpus_inadequate.
    min_distinct_journals: 12
    # Every S1 canonical anchor (the foundational papers any faithful AI-labor
    # review MUST cite) must be present as a citeable journal source. DOIs match
    # the per_query_report_contract S1 required_entities below.
    required_anchor_dois:
      - "10.1257/jep.33.2.3"   # Acemoglu & Restrepo, JEP 2019 (task framework)
      - "10.1257/jep.29.3.3"   # Autor, JEP 2015 (polarization)
      - "10.1086/705716"       # Acemoglu & Restrepo, JPE 2020 (robots & jobs)
      - "10.1093/qje/qjae044"  # Brynjolfsson et al., QJE 2025 (GenAI at work)

required_jurisdictions:
  - CA
  - US
  - OECD  # cross-country comparisons via OECD aggregates

audit_emphasis:
  - statistical_agency_citation_required_for_quantitative_claims
  - per_jurisdiction_metric_definition_disclosed
  - advocacy_group_funding_disclosure_required

# -------------------------------------------------------------------
# per_query_report_contract — NATIVE required-element denominator for
# the 4-role Gate-B builder (src/polaris_graph/roles/native_gate_b_inputs.py).
# Same shape M3a validates. ADDED by I-meta-002 PR-10.
#
# I-meta-002 PR-10 — DRB-EN benchmark slug #72 (AI / labor market),
# SOURCE-CRITICAL. Authored BLIND to the frozen gold rubric / freeze
# pins / competitor answers (outputs/dr_benchmark was sealed out of the
# repo during authoring; see
# .codex/I-meta-002-pr10-contracts/contract_attestation.txt).
#
# Allowed inputs used (NATIVE only): the locked question text ("a
# literature review on the restructuring impact of AI on the labor
# market ... AI as a key driver of the Fourth Industrial Revolution ...
# only cites high-quality, English-language journal articles"); this
# workforce scope_template (inclusion criteria naming QJE / Journal of
# Labor Economics / Labour Economics / AER-tier journals); the
# tracked, gold-blind `amplified` retrieval set already committed in
# scripts/run_honest_sweep_r3.py for drb_72_ai_labor (Autor;
# Acemoglu-Restrepo; Frey-Osborne; Brynjolfsson; Eloundou; Goos-
# Manning-Salomons); and general labor-economics domain knowledge of the
# canonical peer-reviewed papers a faithful review of this literature
# MUST cite. Naming canonical papers is convergent validity, NOT gold
# leakage — the diff-time verbatim-overlap check is the contamination
# guard.
#
# Severity rationale (NATIVE): no S0. Every D8 s0_must_cover category is
# clinical (contraindications / dosing / black-box / pregnancy-renal-
# hepatic / regulatory-status); the workforce domain defines NO must-
# cover catastrophic/invalidating omission category, so per the design
# ruling severities are S1/S2/S3 only. The foundational
# automation/displacement econometric papers that any faithful review
# MUST cite to be valid -> S1; the supporting exposure/measurement and
# Fourth-Industrial-Revolution framing papers -> S2. The canonical id is
# `doi` where the journal article exposes one (exact-equality coverage:
# M3b regex-extracts the bare DOI token), with `url_pattern` reserved for
# the journal landing page where a DOI is the native citation anchor.
per_query_report_contract:
  drb_72_ai_labor:
    schema_version: "v30.1"

    section_order:
      - Foundational_Theory
      - Empirical_Displacement
      - Generative_AI_Evidence

    required_entities:
      - id: acemoglu_restrepo_automation_tasks
        type: economic_report
        severity: S1
        anchor: Acemoglu-Restrepo-tasks
        # Acemoglu & Restrepo — the task-based displacement/reinstatement
        # framework that any faithful AI-labor review MUST cite to be
        # valid. Peer-reviewed economics journal; doi is the canonical id.
        doi: 10.1257/jep.33.2.3
        journal: Journal of Economic Perspectives
        year: 2019
        coverage_content_requirements:
          - task
        required_fields:
          - thesis
          - mechanism
          - displacement_vs_reinstatement
          - empirical_support
          - journal_quality_tier
        min_fields_for_completion: 3
        rendering_slot: theory_task_framework

      - id: autor_why_still_jobs
        type: economic_report
        severity: S1
        anchor: Autor-polarization
        # Autor — labor-market polarization / complementarity-vs-
        # substitution; foundational English-language peer-reviewed
        # journal article the review's structure should rest on.
        doi: 10.1257/jep.29.3.3
        journal: Journal of Economic Perspectives
        year: 2015
        coverage_content_requirements:
          - polarization
        required_fields:
          - thesis
          - polarization_evidence
          - complementarity_argument
          - journal_quality_tier
        min_fields_for_completion: 2
        rendering_slot: theory_polarization

      - id: acemoglu_restrepo_robots_jobs
        type: economic_report
        severity: S1
        anchor: Robots-and-jobs
        # Acemoglu & Restrepo — robots and jobs commuting-zone
        # identification; the canonical empirical displacement estimate.
        doi: 10.1086/705716
        journal: Journal of Political Economy
        year: 2020
        coverage_content_requirements:
          - robot
        required_fields:
          - identification_strategy
          - population
          - effect_estimate_with_uncertainty
          - outcome
          - journal_quality_tier
        min_fields_for_completion: 3
        rendering_slot: empirical_robots

      - id: frey_osborne_computerisation
        type: economic_report
        severity: S2
        anchor: Frey-Osborne
        # Frey & Osborne — occupational computerisation susceptibility
        # ("47%"); high-citation peer-reviewed journal article, supporting
        # the exposure-measurement strand of the review.
        doi: 10.1016/j.techfore.2016.08.019
        journal: Technological Forecasting and Social Change
        year: 2017
        coverage_content_requirements:
          - automation
        required_fields:
          - method
          - exposure_measure
          - headline_estimate
          - limitations
          - journal_quality_tier
        min_fields_for_completion: 2
        rendering_slot: empirical_exposure

      - id: brynjolfsson_genai_at_work
        type: economic_report
        severity: S1
        anchor: GenAI-at-work
        # Brynjolfsson, Li & Raymond — generative-AI productivity field
        # evidence; the contemporary peer-reviewed journal article a
        # current AI-labor review MUST incorporate.
        doi: 10.1093/qje/qjae044
        journal: Quarterly Journal of Economics
        year: 2025
        coverage_content_requirements:
          - generative
        required_fields:
          - design
          - population
          - intervention
          - effect_estimate_with_uncertainty
          - generalizability
          - journal_quality_tier
        min_fields_for_completion: 3
        rendering_slot: genai_productivity

      - id: eloundou_gpts_are_gpts
        type: economic_report
        severity: S2
        anchor: GPTs-are-GPTs
        # Eloundou et al. — LLM occupational-exposure measurement; a
        # supporting exposure-estimate the generative-AI section should
        # cite. (Published in a peer-reviewed venue with a DOI.)
        doi: 10.1126/science.adj0998
        journal: Science
        year: 2024
        coverage_content_requirements:
          - exposure
        required_fields:
          - exposure_method
          - occupations_covered
          - headline_exposure_estimate
          - limitations
          - journal_quality_tier
        min_fields_for_completion: 2
        rendering_slot: genai_exposure

      - id: fourth_industrial_revolution_framing
        type: policy_report
        severity: S3
        anchor: 4IR-framing
        # The Fourth-Industrial-Revolution framing the question explicitly
        # invokes. Observe-only (S3): contextual framing, not a load-
        # bearing empirical claim; the question demands JOURNAL articles
        # for substantive claims, so this authoritative framing source is
        # context. url_pattern is the canonical id (no DOI native).
        type_note: authoritative_source
        url_pattern: https://www.weforum.org/about/the-fourth-industrial-revolution-by-klaus-schwab/
        coverage_content_requirements:
          - fourth industrial revolution
        required_fields:
          - definition
          - relation_to_ai
          - scope_caveat
        min_fields_for_completion: 1
        rendering_slot: theory_4ir_framing

    rendering_slots:
      theory_task_framework:
        section: Foundational_Theory
        subsection_title: "Task-based automation framework (Acemoglu & Restrepo, JEP 2019)"
        ordering: 1
        required: true
      theory_polarization:
        section: Foundational_Theory
        subsection_title: "Labor-market polarization and complementarity (Autor, JEP 2015)"
        ordering: 2
        required: true
      theory_4ir_framing:
        section: Foundational_Theory
        subsection_title: "Fourth Industrial Revolution framing (contextual)"
        ordering: 3
        required: false
      empirical_robots:
        section: Empirical_Displacement
        subsection_title: "Robots and jobs commuting-zone evidence (Acemoglu & Restrepo, JPE 2020)"
        ordering: 1
        required: true
      empirical_exposure:
        section: Empirical_Displacement
        subsection_title: "Occupational computerisation susceptibility (Frey & Osborne, TFSC 2017)"
        ordering: 2
        required: true
      genai_productivity:
        section: Generative_AI_Evidence
        subsection_title: "Generative-AI productivity field evidence (Brynjolfsson et al., QJE 2025)"
        ordering: 1
        required: true
      genai_exposure:
        section: Generative_AI_Evidence
        subsection_title: "LLM occupational-exposure measurement (Eloundou et al., Science 2024)"
        ordering: 2
        required: true
