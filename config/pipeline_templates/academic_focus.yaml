pipeline_id: tpl_academic_focus
name: Academic Focus
description: >-
  Research pipeline prioritizing peer-reviewed academic sources.
  Higher academic search caps, OpenAlex integration, citation chasing,
  stricter quality thresholds. Ideal for systematic literature reviews
  and evidence-based research.
version: "1.0.0"
author: system
is_template: true
tags: [academic, peer-reviewed, systematic, literature-review]
config_overrides:
  PG_MAX_ITERATIONS: "3"
  PG_MAX_EXECUTION_MINUTES: "90"
  PG_ACADEMIC_QUERY_CAP: "100"
  PG_MAX_TOTAL_ACADEMIC: "1000"
  PG_MIN_FAITHFULNESS: "0.80"
  PG_TARGET_TOTAL_WORDS: "15000"
  PG_MIN_TOTAL_WORDS: "10000"
  PG_CITATION_CHASE_ENABLED: "1"

macro_stages:
  - macro_id: planning
    label: Academic Planning
    description: Generate research queries biased toward academic literature
    color: "#6C5CE7"
    estimated_minutes: 2.0
    stages:
      - stage_id: plan_queries
        stage_type: plan
        label: Query Planning
        config:
          queries_per_vector: 60
          academic_focus: true

  - macro_id: collection
    label: Academic Collection
    description: Deep academic search with citation chasing
    color: "#00B894"
    estimated_minutes: 15.0
    depends_on_macros: [planning]
    stages:
      - stage_id: academic_search
        stage_type: search
        label: Academic Search
        description: Semantic Scholar, OpenAlex, CrossRef with citation chasing
        config:
          academic_priority: true
          citation_chase: true
      - stage_id: storm_research
        stage_type: storm_interviews
        label: STORM Interviews
        description: Expert perspective interviews
        depends_on: [academic_search]

  - macro_id: analysis
    label: Academic Analysis
    description: Extract evidence with strict peer-review enforcement
    color: "#FDCB6E"
    estimated_minutes: 20.0
    depends_on_macros: [collection]
    stages:
      - stage_id: content_analysis
        stage_type: analyze
        label: Evidence Extraction
        config:
          peer_reviewed_enforcement: true
          content_per_source: 15000

  - macro_id: verification
    label: Rigorous Verification
    description: Strict NLI verification with higher thresholds
    color: "#E17055"
    estimated_minutes: 15.0
    depends_on_macros: [analysis]
    stages:
      - stage_id: nli_verify
        stage_type: verify
        label: NLI Verification
        config:
          min_faithfulness: 0.80
      - stage_id: quality_eval
        stage_type: evaluate
        label: Quality Evaluation
        depends_on: [nli_verify]

  - macro_id: synthesis
    label: Academic Synthesis
    description: Generate publication-quality report with formal citations
    color: "#0984E3"
    estimated_minutes: 25.0
    depends_on_macros: [verification]
    stages:
      - stage_id: report_synthesis
        stage_type: synthesize
        label: Report Generation
        config:
          academic_style: true
      - stage_id: gap_search
        stage_type: search_gaps
        label: Literature Gap Search
        depends_on: [report_synthesis]
